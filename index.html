iSelfGrade(correct){\n    const st=this.state; const cur=this.eiCur(); if(!cur) return;\n    const done={...st.eiDone}, wrong={...st.eiWrong}; let queue=st.eiQueue.slice();\n    if(correct){ done[cur.num]=true; } else { wrong[cur.num]=true; const at=Math.min(queue.length, st.eiPos+4); queue.splice(at,0, st.eiQueue[st.eiPos]); }\n    const np=st.eiPos+1;\n    if(np>=queue.length){ this.setState({ eiDone:done, eiWrong:wrong, eiQueue:queue, eiPos:np, screen:'eiselfresult' }); }\n    else { this.setState({ eiDone:done, eiWrong:wrong, eiQueue:queue, eiPos:np, eiReveal:false }, ()=>{ const f=this._frameEl(); if(f)f.scrollTop=0; }); }\n  }\n  eiSelfPrev(){ const st=this.state; if(st.eiPos>0) this.setState({ eiPos:st.eiPos-1, eiReveal:false }, ()=>{ const f=this._frameEl(); if(f)f.scrollTop=0; }); }\n  retryEiSelfWrong(){ const st=this.state; const nums=Object.keys(st.eiWrong); const pool=st.eiPool.filter(x=>nums.includes(x.num)); if(!pool.length) return; this.setState({ screen:'eiself', eiPool:pool, eiQueue:pool.map((_,i)=>i), eiPos:0, eiTotal:pool.length, eiReveal:false, eiDone:{}, eiWrong:{} }, ()=>{ const f=this._frameEl(); if(f)f.scrollTop=0; }); }\n\n  // ---- 並び替え型 ----\n  startEiArr(id){\n    const g=this.eiData().find(x=>x.id===id); if(!g||!g.arrange.length) return;\n    const bank=this._eiBank(g.arrange[0]);\n    this.setState({ screen:'eiarr', eiMat:id, eiKind:'arr', eiPool:g.arrange, eiQueue:g.arrange.map((_,i)=>i), eiPos:0, eiTotal:g.arrange.length, eiBank:bank, eiPlaced:[], eiChecked:false, eiCorrect:false, eiDone:{}, eiWrong:{} }, ()=>{ const f=this._frameEl(); if(f)f.scrollTop=0; });\n  }\n  _eiBank(item){ return this._shuffle(item.tiles.map((t,i)=>({t,i}))); }\n  eiArrPlace(bi){ const st=this.state; if(st.eiChecked) return; if(st.eiPlaced.indexOf(bi)>=0) return; this.setState({ eiPlaced:[...st.eiPlaced, bi] }); }\n  eiArrUnplace(pos){ const st=this.state; if(st.eiChecked) return; const p=st.eiPlaced.slice(); p.splice(pos,1); this.setState({ eiPlaced:p }); }\n  eiArrReset(){ if(this.state.eiChecked) return; this.setState({ eiPlaced:[] }); }\n  eiArrCheck(){\n    const st=this.state; const cur=this.eiCur(); if(!cur) return; if(st.eiPlaced.length<st.eiBank.length) return;\n    const ordered=st.eiPlaced.map(bi=>st.eiBank[bi].t);\n    const assembled=[cur.pre, ...ordered, cur.post].filter(Boolean).join(' ');\n    const correct=this._eiNorm(assembled)===this._eiNorm(cur.answer);\n    const done={...st.eiDone}, wrong={...st.eiWrong};\n    if(correct){ done[cur.num]=true; } else { wrong[cur.num]=true; }\n    this.setState({ eiChecked:true, eiCorrect:correct, eiDone:done, eiWrong:wrong });\n  }\n  eiArrNext(){\n    const st=this.state; let queue=st.eiQueue.slice();\n    if(!st.eiCorrect){ const at=Math.min(queue.length, st.eiPos+3); queue.splice(at,0, st.eiQueue[st.eiPos]); }\n    const np=st.eiPos+1;\n    if(np>=queue.length){ this.setState({ eiQueue:queue, eiPos:np, screen:'eiarrresult' }); }\n    else { const bank=this._eiBank(st.eiPool[queue[np]]); this.setState({ eiQueue:queue, eiPos:np, eiBank:bank, eiPlaced:[], eiChecked:false, eiCorrect:false }, ()=>{ const f=this._frameEl(); if(f)f.scrollTop=0; }); }\n  }\n  retryEiArrWrong(){ const st=this.state; const nums=Object.keys(st.eiWrong); const pool=st.eiPool.filter(x=>nums.includes(x.num)); if(!pool.length) return; const bank=this._eiBank(pool[0]); this.setState({ screen:'eiarr', eiPool:pool, eiQueue:pool.map((_,i)=>i), eiPos:0, eiTotal:pool.length, eiBank:bank, eiPlaced:[], eiChecked:false, eiCorrect:false, eiDone:{}, eiWrong:{} }, ()=>{ const f=this._frameEl(); if(f)f.scrollTop=0; }); }\n\n  // ===== 英単語（シスタン） =====\n  siData(){ return (typeof window!=='undefined' && window.SISTAN) ? window.SISTAN : []; }\n  siSetFrom(v){ let n=parseInt(v,10); if(isNaN(n))return; n=Math.max(1,Math.min(2027,n)); this.setState({siFrom:n}); }\n  siSetTo(v){ let n=parseInt(v,10); if(isNaN(n))return; n=Math.max(1,Math.min(2027,n)); this.setState({siTo:n}); }\n  siPreset(a,b){ this.setState({siFrom:a, siTo:b}); }\n  siSetDir(d){ this.setState({siDir:d}); }\n  siSetMode(m){ this.setState({siMode:m}); }\n  siSetOrder(o){ this.setState({siOrder:o}); }\n\n  _shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }\n\n  // 4択の選択肢を生成（表示テキストで重複排除し、正解と同じ訳/語は除外）\n  _choicesFrom(pool, poolIdx, dir, data){\n    const cur=pool[poolIdx]; if(!cur) return [];\n    const e2j = dir==='e2j';\n    const labelOf = (w)=> e2j ? w[2] : w[1];\n    const ansLabel = labelOf(cur);\n    const usedLabels = new Set([ansLabel]);\n    const cand=[];\n    const others = this._shuffle(pool.filter((_,i)=>i!==poolIdx));\n    for(const o of others){ if(cand.length>=3) break; const l=labelOf(o); if(!usedLabels.has(l)){ cand.push(o); usedLabels.add(l); } }\n    if(cand.length<3){\n      const g=this._shuffle(data.slice());\n      for(const o of g){ if(cand.length>=3) break; if(o[0]===cur[0]) continue; const l=labelOf(o); if(!usedLabels.has(l)){ cand.push(o); usedLabels.add(l); } }\n    }\n    return this._shuffle([cur,...cand]);\n  }\n\n  siStart(){\n    const data=this.siData();\n    let from=Math.min(this.state.siFrom,this.state.siTo);\n    let to=Math.max(this.state.siFrom,this.state.siTo);\n    const pool=data.filter(r=>r[0]>=from && r[0]<=to);\n    if(!pool.length) return;\n    let order=pool.map((_,i)=>i);\n    if(this.state.siOrder==='random') order=this._shuffle(order);\n    const choices=this._choicesFrom(pool, order[0], this.state.siDir, data);\n    this.setState({ screen:'siquiz', siPool:pool, siQueue:order, siPos:0, siReveal:false, siSel:null, siDone:{}, siWrong:{}, siTotal:pool.length, siCurChoices:choices });\n  }\n\n  siCur(){ const st=this.state; if(!st.siQueue||st.siPos>=st.siQueue.length) return null; return st.siPool[st.siQueue[st.siPos]]; }\n\n  siRevealCard(){ this.setState({siReveal:true}); }\n\n  _frameEl(){ try{ return document.querySelector('.se-frame'); }catch(e){ return null; } }\n\n  siAnswer(correct){\n    const st=this.state; const curPoolIdx=st.siQueue[st.siPos]; const cur=st.siPool[curPoolIdx]; if(!cur) return;\n    const done={...st.siDone}; const wrong={...st.siWrong};\n    let queue=st.siQueue.slice();\n    if(correct){ done[cur[0]]=true; }\n    else {\n      wrong[cur[0]]=true;\n      const insertAt=Math.min(queue.length, st.siPos + 4);\n      queue.splice(insertAt,0, curPoolIdx);\n    }\n    const nextPos=st.siPos+1;\n    if(nextPos>=queue.length){\n      this.setState({ siDone:done, siWrong:wrong, siQueue:queue, siPos:nextPos, siReveal:false, siSel:null, screen:'siresult' });\n    } else {\n      const choices=this._choicesFrom(st.siPool, queue[nextPos], st.siDir, this.siData());\n      this.setState({ siDone:done, siWrong:wrong, siQueue:queue, siPos:nextPos, siReveal:false, siSel:null, siCurChoices:choices }, ()=>{ const f=this._frameEl(); if(f) f.scrollTop=0; });\n    }\n  }\n\n  siPickQuad(idx, choiceWord){\n    if(this.state.siSel) return;\n    const cur=this.siCur(); const correct = choiceWord[0]===cur[0];\n    this.setState({ siSel:{ idx, correct, picked:choiceWord[0] } });\n  }\n  siNextAfterQuad(){\n    const sel=this.state.siSel; if(!sel) return;\n    this.siAnswer(sel.correct);\n  }\n  siPrev(){\n    const st=this.state;\n    if(st.siPos>0){\n      const np=st.siPos-1;\n      const choices=this._choicesFrom(st.siPool, st.siQueue[np], st.siDir, this.siData());\n      this.setState({ siPos:np, siReveal:false, siSel:null, siCurChoices:choices }, ()=>{ const f=this._frameEl(); if(f) f.scrollTop=0; });\n    }\n  }\n\n  componentDidMount(){\n    try{\n      const raw = localStorage.getItem(this.STORE);\n      if(raw){ const s = JSON.parse(raw); this.setState({ results:s.results||{}, _resumeDeck:s.deck||'basic', _resumeIdx:s.idx||0, _hasProg:!!(s.deck&&typeof s.idx==='number') }); }\n    }catch(e){}\n    this._onResize=()=>this.forceUpdate();\n    window.addEventListener('resize', this._onResize);\n    const done=()=>this.setState({loaded:true});\n    let fired=false; const go=()=>{ if(fired)return; fired=true; done(); };\n    try{ if(document.fonts&&document.fonts.ready){ document.fonts.ready.then(()=>setTimeout(go,450)); } }catch(e){}\n    setTimeout(go, 2600);\n  }\n  persist(){\n    try{ localStorage.setItem(this.STORE, JSON.stringify({ deck:this.state.deck, idx:this.state.idx })); }catch(e){}\n  }\n\n  // ---- helpers ----\n  deckData(d){ return (d||this.state.deck)==='alt' ? this.dataAlt : this.data; }\n  flatOf(data){ const o=[]; data.forEach((s,si)=> s.qs.forEach(q=> o.push({...q, sec:s.name, tag:s.tag, secIndex:si}))); return o; }\n  flat(){ return this.flatOf(this.deckData()); }\n  qByNum(n){ return this.flat().find(q=>q.num===n); }\n  curNum(){ return this.state.order[this.state.idx]; }\n  rkey(num){ return this.state.deck+':'+num; }\n\n  startDeck(deck, fromIdx){ const all=this.flatOf(this.deckData(deck)).map(q=>q.num); this.setState({ screen:'quiz', deck, order:all, idx:fromIdx||0, reveal:{} }, ()=>this.persist()); }\n  startSection(deck, si){ const data=this.deckData(deck); const all=this.flatOf(data).map(q=>q.num); const first=this.flatOf(data).findIndex(q=>q.secIndex===si); this.setState({ screen:'quiz', deck, order:all, idx:first<0?0:first, reveal:{} }, ()=>this.persist()); }\n  reviewVague(){ const nums=this.flat().map(q=>q.num).filter(n=>this.state.results[this.rkey(n)]==='vague'); if(!nums.length)return; this.setState({ screen:'quiz', order:nums, idx:0, reveal:{} }); }\n  goHome(){ this.setState({ screen:'home' }); this.persist(); }\n\n  tapBlank(n){ const num=this.curNum(); const r={...this.state.reveal}; const set={...(r[num]||{})}; set[n]=true; r[num]=set; this.setState({reveal:r}); }\n  revealAll(){ const num=this.curNum(); const q=this.qByNum(num); const r={...this.state.reveal}; const set={...(r[num]||{})}; const allOn=q.ans.every((a,i)=>set[i+1]); q.ans.forEach((a,i)=>{ set[i+1]=!allOn; }); r[num]=set; this.setState({reveal:r}); }\n\n  grade(kind){\n    const num=this.curNum(); const res={...this.state.results}; res[this.rkey(num)]=kind;\n    const last = this.state.idx >= this.state.order.length-1;\n    if(last){ this.setState({results:res, screen:'result'}, ()=>this.persist()); }\n    else { this.setState({results:res, idx:this.state.idx+1, reveal:{...this.state.reveal}}, ()=>{ this.persist(); window.scrollTo&&window.scrollTo(0,0); }); }\n  }\n  prevQ(){ if(this.state.idx>0) this.setState({idx:this.state.idx-1, reveal:{...this.state.reveal}}, ()=>{ this.persist(); window.scrollTo&&window.scrollTo(0,0); }); }\n  jumpTo(num){ const idx=this.state.order.indexOf(num); const order = idx>=0?this.state.order:this.flat().map(q=>q.num); const i = idx>=0?idx:order.indexOf(num); this.setState({screen:'quiz', order, idx:i, reveal:{}}); }\n\n  // ---- ouyou (応用問題) ----\n  openOuyou(){ this.setState({ screen:'ouyou', oIdx:0, oReveal:{} }); }\n  oRevealCur(){ const r={...this.state.oReveal}; r[this.ouyou[this.state.oIdx].num]=true; this.setState({oReveal:r}); }\n  oPrev(){ if(this.state.oIdx>0) this.setState({oIdx:this.state.oIdx-1}, ()=>{ window.scrollTo&&window.scrollTo(0,0); }); }\n  oGrade(kind){\n    const cur=this.ouyou[this.state.oIdx]; const res={...this.state.results}; res['ouyou:'+cur.num]=kind;\n    const last=this.state.oIdx>=this.ouyou.length-1;\n    if(last){ this.setState({results:res, screen:'oresult'}); }\n    else { this.setState({results:res, oIdx:this.state.oIdx+1}, ()=>{ window.scrollTo&&window.scrollTo(0,0); }); }\n  }\n\n  // ---- 物理基礎（力と運動） ----\n  openPhys(){ this.setState({ screen:'phome' }); }\n  _pList(){ const g=this.state.pGrp; return this.phyCalc.filter(c=>c.grp===g); }\n  startPCalc(grp){ this.setState({ screen:'pcalc', pGrp:grp, pIdx:0, pReveal:{} }, ()=>{ const f=this._frameEl(); if(f)f.scrollTop=0; }); }\n  pRevealCur(){ const list=this._pList(); const r={...this.state.pReveal}; r[list[this.state.pIdx].num]=true; this.setState({pReveal:r}); }\n  pPrev(){ if(this.state.pIdx>0) this.setState({pIdx:this.state.pIdx-1}, ()=>{ const f=this._frameEl(); if(f)f.scrollTop=0; }); }\n  pGrade(kind){\n    const list=this._pList(); const cur=list[this.state.pIdx]; const res={...this.state.results}; res['phy:'+cur.num]=kind;\n    const last=this.state.pIdx>=list.length-1;\n    if(last){ this.setState({results:res, screen:'presult'}); }\n    else { this.setState({results:res, pIdx:this.state.pIdx+1}, ()=>{ const f=this._frameEl(); if(f)f.scrollTop=0; }); }\n  }\n  openPGoku(){ this.setState({ screen:'pgoku' }); }\n  openPFx(){ this.setState({ screen:'pfx' }); }\n  pPeekRow(k){ const p={...this.state.pPeek}; p[k]=!p[k]; this.setState({pPeek:p}); }\n  pfxPeekRow(k){ const p={...this.state.pfxPeek}; p[k]=!p[k]; this.setState({pfxPeek:p}); }\n\n  // ---- 古文単語（重要古語） ----\n  openKobun(){ this.setState({ screen:'kohome' }); }\n  koSetMode(m){ this.setState({ koMode:m }); }\n  koSetOrder(o){ this.setState({ koOrder:o }); }\n  _koPoolFor(grp){ return grp==='all' ? this.koData.slice() : this.koData.filter(c=>c.d===grp); }\n\n  // 4択の選択肢（短い意味cで重複排除、正解と同じラベルは除外、全体から補充）\n  _koChoices(pool, poolIdx){\n    const cur=pool[poolIdx]; if(!cur) return [];\n    const ansLabel=cur.c; const used=new Set([ansLabel]); const cand=[];\n    const others=this._shuffle(pool.filter((_,i)=>i!==poolIdx));\n    for(const o of others){ if(cand.length>=3) break; if(!used.has(o.c)){ cand.push(o); used.add(o.c); } }\n    if(cand.length<3){ const g=this._shuffle(this.koData.slice()); for(const o of g){ if(cand.length>=3) break; if(o.n===cur.n) continue; if(!used.has(o.c)){ cand.push(o); used.add(o.c); } } }\n    return this._shuffle([cur,...cand]);\n  }\n\n  startKoDeck(grp){\n    const pool=this._koPoolFor(grp); if(!pool.length) return;\n    let order=pool.map((_,i)=>i); if(this.state.koOrder==='random') order=this._shuffle(order);\n    const choices=this._koChoices(pool, order[0]);\n    this.setState({ screen:'kocard', koGrp:grp, koqPool:pool, koqQueue:order, koqPos:0, koqReveal:false, koqSel:null, koqDone:{}, koqWrong:{}, koqTotal:pool.length, koqChoices:choices }, ()=>{ const f=this._frameEl(); if(f)f.scrollTop=0; });\n  }\n  koCurWord(){ const st=this.state; if(!st.koqQueue||st.koqPos>=st.koqQueue.length) return null; return st.koqPool[st.koqQueue[st.koqPos]]; }\n  koRevealCur(){ this.setState({koqReveal:true}); }\n\n  // まちがえたら数問あと（+4）に再挿入し、全問正解できるまでくり返す\n  koAnswer(correct){\n    const st=this.state; const cur=st.koqPool[st.koqQueue[st.koqPos]]; if(!cur) return;\n    const done={...st.koqDone}; const wrong={...st.koqWrong}; let queue=st.koqQueue.slice();\n    if(correct){ done[cur.n]=true; } else { wrong[cur.n]=true; const at=Math.min(queue.length, st.koqPos+4); queue.splice(at,0, st.koqQueue[st.koqPos]); }\n    const np=st.koqPos+1;\n    if(np>=queue.length){ this.setState({ koqDone:done, koqWrong:wrong, koqQueue:queue, koqPos:np, koqReveal:false, koqSel:null, screen:'koresult' }); }\n    else { const choices=this._koChoices(st.koqPool, queue[np]); this.setState({ koqDone:done, koqWrong:wrong, koqQueue:queue, koqPos:np, koqReveal:false, koqSel:null, koqChoices:choices }, ()=>{ const f=this._frameEl(); if(f)f.scrollTop=0; }); }\n  }\n  koPickQuad(idx, word){ if(this.state.koqSel) return; const cur=this.koCurWord(); this.setState({ koqSel:{ idx, correct: word.n===cur.n, picked: word.n } }); }\n  koNextAfterQuad(){ const sel=this.state.koqSel; if(!sel) return; this.koAnswer(sel.correct); }\n  koPrev(){ const st=this.state; if(st.koqPos>0){ const np=st.koqPos-1; const choices=this._koChoices(st.koqPool, st.koqQueue[np]); this.setState({ koqPos:np, koqReveal:false, koqSel:null, koqChoices:choices }, ()=>{ const f=this._frameEl(); if(f)f.scrollTop=0; }); } }\n  koRetryWrong(){ const st=this.state; const nums=Object.keys(st.koqWrong).map(n=>parseInt(n,10)); const pool=this.koData.filter(c=>nums.includes(c.n)); if(!pool.length) return; let order=this._shuffle(pool.map((_,i)=>i)); const choices=this._koChoices(pool, order[0]); this.setState({ screen:'kocard', koqPool:pool, koqQueue:order, koqPos:0, koqReveal:false, koqSel:null, koqDone:{}, koqWrong:{}, koqTotal:pool.length, koqChoices:choices }); }\n\n  openKoList(){ this.setState({ screen:'kolist' }); }\n  koPeekRow(k){ const p={...this.state.koPeek}; p[k]=!p[k]; this.setState({koPeek:p}); }\n\n  // ---- 古文・応用問題集 ----\n  openKoOuyou(){ this.setState({ screen:'koouyou', koOIdx:0, koOReveal:{}, koOSel:{} }, ()=>{ const f=this._frameEl(); if(f)f.scrollTop=0; }); }\n  koOPick(num, choice){ if(this.state.koOSel[num]!==undefined) return; const sel={...this.state.koOSel}; sel[num]=choice; const r={...this.state.koOReveal}; r[num]=true; this.setState({koOSel:sel, koOReveal:r}); }\n  koOPrev(){ if(this.state.koOIdx>0) this.setState({koOIdx:this.state.koOIdx-1}, ()=>{ const f=this._frameEl(); if(f)f.scrollTop=0; }); }\n  koONext(){\n    const cur=this.koOuyou[this.state.koOIdx]; const correct=this.state.koOSel[cur.num]===cur.ans;\n    const res={...this.state.results}; res['koo:'+cur.num]= correct?'good':'vague';\n    const last=this.state.koOIdx>=this.koOuyou.length-1;\n    if(last){ this.setState({results:res, screen:'kooresult'}); }\n    else { this.setState({results:res, koOIdx:this.state.koOIdx+1}, ()=>{ const f=this._frameEl(); if(f)f.scrollTop=0; }); }\n  }\n\n  rankFor(pct){\n    if(pct>=90) return {letter:'S',label:'実力者・合格圏',desc:'ほぼ完璧。この調子で語句の意味も固めよう。',color:'#e8c170'};\n    if(pct>=75) return {letter:'A',label:'あと一歩',desc:'土台は十分。あいまいな数問を潰せば安定する。',color:'#7fb88f'};\n    if(pct>=55) return {letter:'B',label:'基礎は固まりつつある',desc:'主要語は押さえている。反復で取りこぼしを減らそう。',color:'#6fa3c4'};\n    if(pct>=35) return {letter:'C',label:'まずは反復を',desc:'文章ごと音読して、用語と意味をセットで覚えよう。',color:'#d99a6c'};\n    return {letter:'D',label:'ここから伸ばそう',desc:'焦らず1節ずつ。まず文章を丸ごと覚えるのが近道。',color:'#cf7e72'};\n  }\n\n  rankG(pct){\n    if(pct>=90) return {letter:'S',label:'語彙力じゅうぶん',desc:'ほぼ完璧。出典も意識して読書に活かそう。',color:'#e8c170'};\n    if(pct>=75) return {letter:'A',label:'あと少し',desc:'よく読めている。取りこぼした語を復習しよう。',color:'#7fb88f'};\n    if(pct>=55) return {letter:'B',label:'基礎は固まってきた',desc:'文脈から推測する力がついてきた。反復を。',color:'#6fa3c4'};\n    if(pct>=35) return {letter:'C',label:'まずは反復を',desc:'例文ごと声に出して、語と意味をセットで覚えよう。',color:'#d99a6c'};\n    return {letter:'D',label:'ここから伸ばそう',desc:'焦らず一語ずつ。例文の場面と結びつけて覚えよう。',color:'#cf7e72'};\n  }\n\n  componentWillUnmount(){ if(this._onResize) window.removeEventListener('resize', this._onResize); }\n\n  viewport(){\n    const vw=(typeof window!=='undefined'?window.innerWidth:430);\n    const vh=(typeof window!=='undefined'?window.innerHeight:820);\n    const physScreens=['phome','pcalc','presult','pgoku','pfx'];\n    // PC（横長・広い画面）で物理の演習を開いているときは、図と問題を横に並べられる広い枠にする\n    const wide = physScreens.indexOf(this.state.screen)>=0 && vw>=1024 && vw>vh;\n    const baseW = wide ? 880 : 430;\n    let scale=Math.min(vw/(baseW+12), vh/600);\n    if(scale>2.4) scale=2.4;\n    if(scale<0.55) scale=0.55;\n    const frameH=Math.round(vh/scale);\n    return { frameScale:Math.round(scale*1000)/1000, frameH, frameW:baseW, wide };\n  }\n\n  renderVals(){\n    const st=this.state;\n    const screen=st.screen;\n    const total=this.flat().length;\n    const vp=this.viewport();\n\n    // home\n    const sectionList=this.data.map((s,si)=>({ tag:s.tag, name:s.name, count:s.qs.length, range:'問'+s.qs[0].num+'〜'+s.qs[s.qs.length-1].num, onJump:()=>this.startSection('basic',si) }));\n    const resumeData=this.deckData(st._resumeDeck||'basic'); const resumeFlat=this.flatOf(resumeData);\n    const resumeNum=(resumeFlat[st._resumeIdx||0]||{num:1}).num;\n    const resumeLabel=(st._resumeDeck==='alt'?'別ver ':'')+'問'+resumeNum;\n    const clearDeck=(deck)=>{ const r={...st.results}; Object.keys(r).forEach(k=>{ if(k.indexOf(deck+':')===0) delete r[k]; }); return r; };\n\n    // quiz current\n    let q={tag:'',sec:'',num:'',note:'',noteVisible:false}, parts=[], answerRows=[], idx1=1, progressPct=0, revealAllLabel='答えをすべて見る', qKey='q', deckBadge='';\n    if(screen==='quiz' && st.order.length){\n      const num=this.curNum(); const qq=this.q
