document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

rif;font-size:90px;color:rgba(196,76,52,.18);font-weight:700;line-height:1\">国<\u002Fdiv>\n      <div style=\"position:relative\">\n        <div style=\"display:flex;align-items:center;gap:11px\">\n          <div style=\"width:44px;height:44px;border-radius:11px;background:#c44c34;display:flex;align-items:center;justify-content:center;font-family:'Shippori Mincho',serif;font-weight:700;font-size:19px\">国語<\u002Fdiv>\n          <div>\n            <div style=\"font-weight:700;font-size:19px;letter-spacing:.04em\">国語<\u002Fdiv>\n            <div style=\"font-size:11.5px;color:#cdbfb2;margin-top:2px\">現代文単語・漢字<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:15px;display:flex;flex-wrap:wrap;gap:7px\">\n          <span style=\"background:rgba(255,255,255,.1);border-radius:7px;padding:5px 10px;font-size:11.5px\">現代文単語 30問<\u002Fspan>\n          <span style=\"background:rgba(255,255,255,.1);border-radius:7px;padding:5px 10px;font-size:11.5px\">漢字 60問<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div onclick=\"{{ onOpenSistan }}\" style=\"position:relative;background:#243b34;color:#fff;border-radius:18px;padding:22px 22px 20px;cursor:pointer;overflow:hidden;box-shadow:0 8px 22px rgba(36,59,52,.28);margin-top:15px\">\n      <div style=\"position:absolute;right:-8px;top:-16px;font-family:'Shippori Mincho',serif;font-size:84px;color:rgba(122,184,143,.16);font-weight:700;line-height:1\">英<\u002Fdiv>\n      <div style=\"position:relative\">\n        <div style=\"display:flex;align-items:center;gap:11px\">\n          <div style=\"width:44px;height:44px;border-radius:11px;background:#3f8f63;display:flex;align-items:center;justify-content:center;font-family:'Shippori Mincho',serif;font-weight:700;font-size:18px\">英単<\u002Fdiv>\n          <div>\n            <div style=\"font-weight:700;font-size:19px;letter-spacing:.04em\">英単語<\u002Fdiv>\n            <div style=\"font-size:11.5px;color:#a9c6b6;margin-top:2px\">シスタ px\">→<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:11px\">\n      <div onclick=\"{{ onStartBasic }}\" style=\"background:#c0392b;color:#fff;border-radius:14px;padding:16px 12px;text-align:center;cursor:pointer;box-shadow:0 6px 18px rgba(192,57,43,.24)\">\n        <div style=\"font-weight:700;font-size:15.5px;letter-spacing:.02em\">穴埋め演習<\u002Fdiv>\n        <div style=\"font-size:11px;color:#f3cfca;margin-top:3px\">基本・全21問<\u002Fdiv>\n      <\u002Fdiv>\n      <div onclick=\"{{ onStartAlt }}\" style=\"background:#c0392b;color:#fff;border-radius:14px;padding:16px 12px;text-align:center;cursor:pointer;box-shadow:0 6px 18px rgba(192,57,43,.24)\">\n        <div style=\"font-weight:700;font-size:15.5px;letter-spacing:.02em\">穴埋め演習<\u002Fdiv>\n        <div style=\"font-size:11px;color:#f3cfca;margin-top:3px\">別ver・全16問<\u002Fdiv>\n      <\u002Fdiv>\n      <div onclick=\"{{ onOpenGoku }}\" style=\"background:#14293f;color:#fff;border-radius:14px;padding:16px 12px;text-align:center;cursor:pointer;box-shadow:0 6px 18px rgba(20,41,63,.22)\">\n        <div style=\"font-weight:700;font-size:15.5px;letter-spacing:.02em\">語句確認<\u002Fdiv>\n        <div style=\"font-size:11px;color:#aebccd;margin-top:3px\">一問一答・赤シート<\u002Fdiv>\n      <\u002Fdiv>\n      <div onclick=\"{{ onOpenOuyou }}\" style=\"background:#14293f;color:#fff;border-radius:14px;padding:16px 12px;text-align:center;cursor:pointer;box-shadow:0 6px 18px rgba(20,41,63,.22)\">\n        <div style=\"font-weight:700;font-size:15.5px;letter-spacing:.02em\">応用問題<\u002Fdiv>\n        <div style=\"font-size:11px;color:#aebccd;margin-top:3px\">本番形式・全16問<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:24px;background:#eef1f4;border-radius:12px;padding:14px 16px;font-size:12.5px;color:#5a6472;line-height:1.7\">\n      青い <span style=\"display:inline-block;background:#14293f;color:#fff;border-radius:6px;padding:1px 8px;font-size:11px;font-weight:700\">①<\u002Fspan> をタップすると答えが出ます。各問を「覚えていた／あいまい」で自己採点すると、最後に実力判定が出ます。\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== QUIZ ===== -->\n<sc-if value=\"{{ isQuiz }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"height:100%;display:flex;flex-direction:column\">\n  <div style=\"flex-shrink:0;background:#f6f3ee;padding:14px 18px 10px;border-bottom:1px solid #ece4d6\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px\">\n      <div style=\"display:flex;align-items:center;gap:8px\">\n        <div onclick=\"{{ onHome }}\" style=\"display:flex;align-items:center;gap:3px;background:#fff;border:1px solid #ded3c4;border-radius:18px;padding:7px 13px 7px 10px;font-size:12.5px;font-weight:700;color:#14293f;cursor:pointer;box-shadow:0 1px 3px rgba(20,30,45,.06)\">‹ メニュー<\u002Fdiv>\n        <sc-if value=\"{{ qCanPrev }}\" hint-placeholder-val=\"{{ true }}\">\n          <div onclick=\"{{ onPrevQ }}\" style=\"display:flex;align-items:center;gap:3px;background:#f0ebe2;border:1px solid #e2d8c8;border-radius:18px;padding:7px 12px;font-size:12.5px;font-weight:700;color:#8a6d50;cursor:pointer\">↩ 前へ<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"font-size:12.5px;color:#5a6472;font-weight:700;white-space:nowrap\">問 {{ idx1 }} <span style=\"color:#bcb0a0\">/ {{ total }}<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:9px;height:5px;background:#e6ddcf;border-radius:3px;overflow:hidden\">\n      <div style=\"height:100%;background:#c0392b;border-radius:3px;width:{{ progressPct }}%;transition:width .35s ease\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"se-frame\" style=\"flex:1;overflow-y:auto;padding:18px 18px 26px\">\n    <div style=\"animation:seFade .3s ease both\">\n      <div style=\"display:inline-block;background:#14293f;color:#fff;font-size:11px;font-weight:700;letter-spacing:.08em;padding:4px 11px;border-radius:20px\">{{ q.tag }}　{{ q.sec \u002Fdiv>\n\n      <div style=\"margin-top:13px;background:#fff;border:1px solid #ebe3d6;border-radius:14px;overflow:hidden\">\n        <div style=\"background:#c0392b;color:#fff;font-weight:700;font-size:13.5px;padding:9px 15px;letter-spacing:.05em\">答え合わせ<\u002Fdiv>\n        <sc-for list=\"{{ answerRows }}\" as=\"r\" hint-placeholder-count=\"4\">\n          <div onclick=\"{{ r.onTap }}\" style=\"display:flex;gap:11px;padding:11px 14px;border-top:1px solid #f0e9dd;background:{{ r.bg }};cursor:pointer;align-items:flex-start\">\n            <div style=\"font-family:'Shippori Mincho',serif;font-weight:700;color:#c0392b;font-size:14px;min-width:18px\">{{ r.label }}<\u002Fdiv>\n            <div style=\"flex:1\">\n              <sc-if value=\"{{ r.isRevealed }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"animation:seFade .25s ease both\">\n                  <div style=\"font-weight:700;font-size:14.5px;color:#1d2530;font-family:'Shippori Mincho',serif\">{{ r.term }}<\u002Fdiv>\n                  <div style=\"font-size:12.5px;color:#6b7382;margin-top:3px;line-height:1.6\">{{ r.desc }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ r.isHidden }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"font-size:13px;color:#b3aa99;font-weight:500\">タップして表示<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <sc-if value=\"{{ q.noteVisible }}\" hint-placeholder-val=\"ヒント\">\n          <div style=\"border-top:1px solid #f0e9dd;background:#fdf8f2;padding:11px 14px;font-size:12px;color:#7c8593;line-height:1.65;display:flex;gap:7px\">\n            <span style=\"color:#c0392b;font-weight:700;flex-shrink:0\">補足<\u002Fspan><span>{{ q.note }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"flex-shrink:0;background:#f6f3ee;border-top:1px solid #e9 "{{ onRetry }}\" style=\"background:#fff;border:1.5px solid #e2d8c8;border-radius:13px;padding:16px;text-align:center;font-weight:700;font-size:15px;color:#14293f;cursor:pointer\">もう一度すべて解く<\u002Fdiv>\n      <div onclick=\"{{ onHome }}\" style=\"text-align:center;padding:8px;font-size:13px;color:#9aa2b0;cursor:pointer\">ホームに戻る<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:24px;background:#14293f;color:#fff;border-radius:12px;padding:15px 17px;font-size:13px;line-height:1.7;text-align:center\">まずは文章ごと覚えるのが近道！<br>次は語句の意味チェックで仕上げよう。<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== GOKU (語句確認・赤シート) ===== -->\n<sc-if value=\"{{ isGoku }}\" hint-placeholder-val=\"{{ true }}\">\n<div>\n  <div style=\"position:sticky;top:0;z-index:5;background:#14293f;color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between\">\n    <div onclick=\"{{ onHome }}\" style=\"display:flex;align-items:center;gap:3px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:7px 13px 7px 10px;font-size:12.5px;font-weight:700;color:#fff;cursor:pointer\">‹ メニュー<\u002Fdiv>\n    <div style=\"font-weight:700;font-size:14px\">語句確認 <span style=\"color:#8298b0;font-size:12px\">一問一答<\u002Fspan><\u002Fdiv>\n    <div onclick=\"{{ onToggleSheet }}\" style=\"font-size:11.5px;font-weight:700;cursor:pointer;padding:6px 12px;border-radius:20px;background:{{ sheetTabBg }};color:{{ sheetTabFg }};border:1px solid #355\">{{ sheetLabel }}<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"padding:6px 16px 60px;animation:seFade .35s ease both\">\n    <div style=\"font-size:12px;color:#9aa2b0;text-align:center;padding:12px 0 4px\">説明を読んで語句を答えよう（全{{ gokuCount }}語）。<br>赤い部分をタップすると個別に確認できます。<\u002Fdiv>\n    <sc-for list=\"{{ gokuSections }}\" as=\"s\" hint-placeholder-count=\"5\">\n      <div style=\"margin-top:16px\">\n        <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:9px\">\n          <div style=\"font-family:'Shippori Mincho',serif;font-weight:700;color:#fff;background:#c0392b;width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px\">{{ s.tag }}<\u002Fdiv>\n          <div style=\"font-weight:700;font-size:14.5px;color:#1d2530\">{{ s.name }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #ebe3d6;border-radius:13px;overflow:hidden\">\n          <sc-for list=\"{{ s.rows }}\" as=\"r\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex;align-items:stretch;border-top:1px solid #f0e9dd\">\n              <div style=\"flex:1.3;padding:11px 13px;font-size:13px;line-height:1.55;color:#34404d;display:flex;align-items:center\">{{ r.q }}<\u002Fdiv>\n              <div onclick=\"{{ r.onTap }}\" style=\"flex:1;min-width:118px;border-left:1px solid #f0e9dd;display:flex;align-items:center;cursor:pointer\">\n                <sc-if value=\"{{ r.isShown }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"padding:11px 13px;font-family:'Shippori Mincho',serif;font-weight:700;color:#c0392b;font-size:13.5px;line-height:1.4;animation:seFade .2s ease both\">{{ r.a }}<\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ r.isCovered }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"margin:7px 9px;padding:9px 13px;background:#e23b2e;border-radius:6px;width:100%;text-align:center;color:#e23b2e;font-size:12px;user-select:none\">タップ<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n    <div style=\"margin-top:22px;background:#14293f;color:#fff;border-radius:12px;padding:15px 17px;font-size:13px;line-height:1.7;text-align:center\">一問一答で語句を固めれば、<br>穴埋めも記述もぐっと楽になる！<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== OUYOU (応用問題) ===== -->\n<sc-if value=\"{{ isOuyou }}\" hi "display:flex;align-items:baseline;gap:9px;margin-bottom:11px\">\n          <span style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:20px;color:#14293f\">問{{ oCard.num }}<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:0;font-size:15.5px;line-height:2;color:#2a313a;font-weight:500;white-space:pre-line;text-wrap:pretty\">{{ oCard.prompt }}<\u002Fp>\n        <sc-if value=\"{{ oCard.hasChoices }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"margin-top:14px;display:flex;flex-direction:column;gap:8px\">\n            <sc-for list=\"{{ oCard.choices }}\" as=\"c\" hint-placeholder-count=\"4\">\n              <div style=\"background:#f4f2ec;border:1px solid #ece4d6;border-radius:9px;padding:10px 13px;font-size:14px;color:#34404d;line-height:1.5\">{{ c }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ oCard.hasHint }}\" hint-placeholder-val=\"ヒント\">\n          <div style=\"margin-top:13px;background:#eef1f4;border-radius:9px;padding:10px 13px;font-size:12.5px;color:#5a6472;line-height:1.6;display:flex;gap:7px\"><span style=\"color:#14293f;font-weight:700;flex-shrink:0\">公式<\u002Fspan><span>{{ oCard.hint }}<\u002Fspan><\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ oCard.revealed }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"margin-top:13px;background:#fff;border:1px solid #ebe3d6;border-radius:14px;overflow:hidden;animation:seFade .25s ease both\">\n          <div style=\"background:#c0392b;color:#fff;font-weight:700;font-size:13.5px;padding:9px 15px\">解答<\u002Fdiv>\n          <div style=\"padding:13px 15px;font-family:'Shippori Mincho',serif;font-weight:700;font-size:16px;color:#c0392b;line-height:1.5\">{{ oCard.ans }}<\u002Fdiv>\n          <div style=\"border-top:1px solid #f0e9dd;background:#eef7f0;padding:12px 15px;font-size:13px;color:#2f6b4a;line-height:1.7;display:flex;gap:7px\"><span style=\"font-weight:70 ,45,.06)\">‹ 国語に戻る<\u002Fdiv>\n        <sc-if value=\"{{ kCanPrev }}\" hint-placeholder-val=\"{{ true }}\">\n          <div onclick=\"{{ onKPrev }}\" style=\"display:flex;align-items:center;gap:3px;background:#f0ebe2;border:1px solid #e2d8c8;border-radius:18px;padding:7px 12px;font-size:12.5px;font-weight:700;color:#8a6d50;cursor:pointer\">↩ 前へ<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"font-size:12.5px;color:#5a6472;font-weight:700;white-space:nowrap\">{{ kCard.k }}　{{ kIdx1 }} <span style=\"color:#bcb0a0\">/ {{ kTotal }}<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:9px;height:5px;background:#e6ddcf;border-radius:3px;overflow:hidden\">\n      <div style=\"height:100%;background:#2b2722;border-radius:3px;width:{{ kProgress }}%;transition:width .35s ease\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"se-frame\" style=\"flex:1;overflow-y:auto;padding:18px 18px 26px\">\n    <div style=\"animation:seFade .3s ease both\">\n      <div style=\"display:inline-block;background:#2b2722;color:#fff;font-size:11px;font-weight:700;letter-spacing:.08em;padding:4px 11px;border-radius:20px\">{{ kCard.k }}　No.{{ kCard.num }}<\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #ebe3d6;border-radius:16px;padding:22px 19px;margin-top:13px;box-shadow:0 3px 14px rgba(20,30,45,.05)\">\n        <p style=\"margin:0;font-size:17px;line-height:2.1;color:#2a2622;font-weight:500;white-space:pre-line;text-wrap:pretty\">{{ kCard.prompt }}<\u002Fp>\n        <sc-if value=\"{{ kCard.hasChoices }}\" hint-placeholder-val=\"ヒント\">\n          <div style=\"margin-top:15px;background:#f4f2ec;border-radius:9px;padding:11px 13px;font-size:13px;color:#5a5249;line-height:1.7;display:flex;gap:8px\"><span style=\"font-weight:700;color:#2b2722;flex-shrink:0\">選択肢<\u002Fspan><span style=\"font-family:'Shippori Mincho',serif;letter-spacing:.08em\">{{ kCard.choices }}<\u002Fspan><\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ kCard.revealed }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"margin-top:13px;background:#fff;border:1px solid #ebe3d6;border-radius:14px;overflow:hidden;animation:seFade .25s ease both\">\n          <div style=\"background:#c44c34;color:#fff;font-weight:700;font-size:13.5px;padding:9px 15px\">解答<\u002Fdiv>\n          <div style=\"padding:14px 16px;display:flex;align-items:baseline;gap:12px\">\n            <div style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:26px;color:#c44c34;line-height:1\">{{ kCard.ans }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border-top:1px solid #f0e9dd;background:#faf6f0;padding:12px 16px;font-size:14px;color:#4a4036;line-height:1.7;display:flex;gap:8px\"><span style=\"font-weight:700;color:#2b2722;flex-shrink:0\">表現<\u002Fspan><span style=\"font-family:'Shippori Mincho',serif;font-weight:600\">{{ kCard.expr }}<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"flex-shrink:0;background:#f6f3ee;border-top:1px solid #e9e0d2;box-shadow:0 -5px 16px rgba(20,30,45,.07);padding:12px 18px 15px\">\n    <sc-if value=\"{{ kCard.hidden }}\" hint-placeholder-val=\"{{ true }}\">\n      <div onclick=\"{{ onKReveal }}\" style=\"text-align:center;padding:15px;border-radius:13px;background:#c44c34;color:#fff;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 5px 14px rgba(196,76,52,.28)\">答えを見る<\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ kCard.revealed }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"font-size:11.5px;color:#9aa2b0;text-align:center;margin-bottom:8px\">書けた？<\u002Fdiv>\n      <div style=\"display:flex;gap:11px\">\n        <div onclick=\"{{ onKVague }}\" style=\"flex:1;text-align:center;padding:14px;border-radius:13px;background:#fff;border:1.5px solid #e2d8c8;color:#8a6d50;font-weight:700;font-size:15px;cursor:pointer\">△ あいまい<\u002Fdiv>\n        <div onclick=\"{{ onKGo eight:700;font-size:14.5px;background:{{ siDirE2JBg }};border:1.5px solid {{ siDirE2JBd }};color:{{ siDirE2JFg }}\">英語 → 日本語<\u002Fdiv>\n      <div onclick=\"{{ onSiDirJ2E }}\" style=\"flex:1;text-align:center;padding:14px;border-radius:12px;cursor:pointer;font-weight:700;font-size:14.5px;background:{{ siDirJ2EBg }};border:1.5px solid {{ siDirJ2EBd }};color:{{ siDirJ2EFg }}\">日本語 → 英語<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 形式 -->\n    <div style=\"font-size:12px;color:#9aa2b0;letter-spacing:.1em;font-weight:700;margin:22px 0 11px\">出題形式<\u002Fdiv>\n    <div style=\"display:flex;gap:10px\">\n      <div onclick=\"{{ onSiModeCard }}\" style=\"flex:1;padding:15px 13px;border-radius:12px;cursor:pointer;background:{{ siModeCardBg }};border:1.5px solid {{ siModeCardBd }}\">\n        <div style=\"font-weight:700;font-size:14.5px;color:{{ siModeCardFg }}\">カード式<\u002Fdiv>\n        <div style=\"font-size:11px;color:{{ siModeCardSub }};margin-top:3px;line-height:1.5\">めくって自己採点<\u002Fdiv>\n      <\u002Fdiv>\n      <div onclick=\"{{ onSiModeQuad }}\" style=\"flex:1;padding:15px 13px;border-radius:12px;cursor:pointer;background:{{ siModeQuadBg }};border:1.5px solid {{ siModeQuadBd }}\">\n        <div style=\"font-weight:700;font-size:14.5px;color:{{ siModeQuadFg }}\">4択<\u002Fdiv>\n        <div style=\"font-size:11px;color:{{ siModeQuadSub }};margin-top:3px;line-height:1.5\">近い番号から選択肢<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 出題順 -->\n    <div style=\"font-size:12px;color:#9aa2b0;letter-spacing:.1em;font-weight:700;margin:22px 0 11px\">出題順<\u002Fdiv>\n    <div style=\"display:flex;gap:10px\">\n      <div onclick=\"{{ onSiOrderRandom }}\" style=\"flex:1;text-align:center;padding:14px;border-radius:12px;cursor:pointer;font-weight:700;font-size:14.5px;background:{{ siOrderRandomBg }};border:1.5px solid {{ siOrderRandomBd }};color:{{ siOrderRandomFg }}\">ランダム<\u002Fdiv>\n      <div onclick=\"{{ onSiOrderSeq }}\" style=\"flex:1;text-align:center;padding:14px;border-radius:12px;cursor:pointer;font-weight:700;font-size:14.5px;background:{{ siOrderSeqBg }};border:1.5px solid {{ siOrderSeqBd }};color:{{ siOrderSeqFg }}\">番号順<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div onclick=\"{{ onSiStart }}\" style=\"margin-top:24px;background:#3f8f63;color:#fff;border-radius:13px;padding:17px;text-align:center;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 6px 18px rgba(63,143,99,.28)\">スタート<\u002Fdiv>\n    <div style=\"margin-top:13px;background:#eef1f4;border-radius:11px;padding:12px 15px;font-size:12px;color:#5a6472;line-height:1.7\">まちがえた語は、数問あとにもう一度出題されます。全部正解できたら終了です。<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== SIQUIZ（英単語・出題） ===== -->\n<sc-if value=\"{{ isSiquiz }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"height:100%;display:flex;flex-direction:column\">\n  <div style=\"flex-shrink:0;background:#f6f3ee;padding:14px 18px 10px;border-bottom:1px solid #ece4d6\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px\">\n      <div style=\"display:flex;align-items:center;gap:8px\">\n        <div onclick=\"{{ onSihome }}\" style=\"display:flex;align-items:center;gap:3px;background:#fff;border:1px solid #ded3c4;border-radius:18px;padding:7px 13px 7px 10px;font-size:12.5px;font-weight:700;color:#243b34;cursor:pointer;box-shadow:0 1px 3px rgba(20,30,45,.06)\">‹ 範囲選択<\u002Fdiv>\n        <sc-if value=\"{{ siCanPrev }}\" hint-placeholder-val=\"{{ true }}\">\n          <div onclick=\"{{ onSiPrev }}\" style=\"display:flex;align-items:center;gap:3px;background:#f0ebe2;border:1px solid #e2d8c8;border-radius:18px;padding:7px 12px;font-size:12.5px;font-weight:700;color:#577;cursor:pointer\">↩ 前へ<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"font-size:12px;color:#5a6472;font-weight:700;white-space:nowrap\">残り {{ siRemain }} 語<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:9px;height:5px;background:#e6ddcf;border-radius:3px;overflow:hidden\">\n      <div style=\"height:100%;background:#3f8f63;border-radius:3px;width:{{ siProgress }}%;transition:width .35s ease\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"se-frame\" style=\"flex:1;overflow-y:auto;padding:18px 18px 26px\">\n    <div style=\"animation:seFade .3s ease both\">\n      <div style=\"display:flex;align-items:center;gap:8px\">\n        <div style=\"display:inline-block;background:#243b34;color:#fff;font-size:11px;font-weight:700;letter-spacing:.06em;padding:4px 11px;border-radius:20px\">No.{{ siCard.num }}<\u002Fdiv>\n        <div style=\"font-size:11px;color:#9aa2b0;font-weight:700\">{{ siCard.sub }}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- カード式 -->\n      <sc-if value=\"{{ siIsCard }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"background:#fff;border:1px solid #e6ddca;border-radius:18px;padding:38px 22px;margin-top:13px;box-shadow:0 4px 18px rgba(20,30,45,.07);text-align:center;min-height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center\">\n          <div style=\"font-size:11px;color:#b3aa99;font-weight:700;letter-spacing:.1em;margin-bottom:12px\">問題<\u002Fdiv>\n          <div style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:30px;color:#243b34;line-height:1.35;word-break:break-word\">{{ siCard.front }}<\u002Fdiv>\n          <sc-if value=\"{{ siRevealed }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"margin-top:20px;padding-top:18px;border-top:1px dashed #e0d8c8;width:100%;animation:seFlip .35s ease both\">\n              <div style=\"font-size:11px;color:#3f8f63;font-weight:700;letter-spacing:.1em;margin-bottom:8px\">こたえ<\u002Fdiv>\n              <div style=\"font-size:21px;color:#2a313a;font-weight:700;line-height:1.6\">{{ siCard.back }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ siHidden }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"margin-top:18px;font-size:12.5px;color:#b3aa99\">下のボタンでこたえを表示<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- 4択 -->\n      <sc-if value=\"{{ siIsQuad }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"background:#fff;border:1px solid #e6ddca;border-radius:18px;padding:26px 22px;margin-top:13px;box-shadow:0 4px 18px rgba(20,30,45,.07);text-align:center\">\n          <div style=\"font-size:11px;color:#b3aa99;font-weight:700;letter-spacing:.1em;margin-bottom:10px\">次の意味は？<\u002Fdiv>\n          <div style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:28px;color:#243b34;line-height:1.35;word-break:break-word\">{{ siCard.front }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:13px;display:flex;flex-direction:column;gap:9px\">\n          <sc-for list=\"{{ siQuad }}\" as=\"c\" hint-placeholder-count=\"4\">\n            <div onclick=\"{{ c.onTap }}\" style=\"display:flex;align-items:center;gap:11px;background:{{ c.bg }};border:1.5px solid {{ c.bd }};border-radius:12px;padding:14px 15px;cursor:pointer\">\n              <div style=\"flex:1;font-size:15px;color:{{ c.fg }};line-height:1.5;font-weight:500\">{{ c.label }}<\u002Fdiv>\n              <div style=\"font-size:14px;font-weight:700;color:{{ c.fg }}\">{{ c.mark }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"flex-shrink:0;background:#f6f3ee;border-top:1px solid #e9e0d2;box-shadow:0 -5px 16px rgba(20,30,45,.07);padding:12px 18px 15px\">\n    <!-- カード式の操作 -->\n    <sc-if value=\"{{ siIsCard }}\" hint-placeholder-val=\"{{ true }}\">\n      <sc-if value=\"{{ siHidden }}\" hint-placeholder-val=\"{{ true }}\">\n        <div onclick=\"{{ onSiReveal }}\" style=\"text-align:center;padding:15px;border-radius:13px;background:#243b34;color:#fff;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 5px 14px rgba(36,59,52,.28)\">こたえを見る<\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ siRevealed }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"font-size:11.5px;color:#9aa2b0;text-align:center;margin-bottom:8px\">覚えていた？<\u002Fdiv>\n        <div style=\"display:flex;gap:11px\">\n          <div onclick=\"{{ onSiBad }}\" style=\"flex:1;text-align:center;padding:14px;border-radius:13px;background:#fff;border:1.5px solid #e2c8c2;color:#b23a2c;font-weight:700;font-size:15px;cursor:pointer\">✗ まちがえた<\u002Fdiv>\n          <div onclick=\"{{ onSiGood }}\" style=\"flex:1.2;text-align:center;padding:14px;border-radius:13px;background:#3f8f63;color:#fff;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 5px 14px rgba(63,143,99,.3)\">✓ 覚えていた<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsc-if>\n    <!-- 4択の操作 -->\n    <sc-if value=\"{{ siIsQuad }}\" hint-placeholder-val=\"{{ true }}\">\n      <sc-if value=\"{{ siQuadHint }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"text-align:center;font-size:12.5px;color:#a59a8c;padding:13px\">選択肢から答えを選んでください<\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ siQuadAnswered }}\" hint-placeholder-val=\"{{ true }}\">\n        <div onclick=\"{{ onSiQuadNext }}\" style=\"text-align:center;padding:15px;border-radius:13px;background:#243b34;color:#fff;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 5px 14px rgba(36,59,52,.28)\">次へ ›<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== SIRESULT（英単語・結果） ===== -->\n<sc-if value=\"{{ isSiresult }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"animation:seFade .4s ease both\">\n  <div style=\"background:#243b34;color:#fff;padding:40px 26px 34px;text-align:center\">\n    <div style=\"font-size:12px;letter-spacing:.28em;color:#a9c6b6\">RESULT · 英単語<\u002Fdiv>\n    <div style=\"margin:22px auto 0;width:150px;height:150px;border-radius:50%;border:3px solid {{ siRank.color }};display:flex;flex-direction:column;align-items:center;justify-content:center;animation:sePop .5s ease both\">\n      <div style=\"font-family:'Shippori Mincho',serif;font-size:60px;font-weight:700;line-height:1;color:{{ siRank.color }}\">{{ siRank.letter }}<\u002Fdiv>\n      <div style=\"font-size:13px;color:#a9c6b6;margin-top:6px\">{{ siPct }}% 一発正解<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-weight:700;font-size:18px;margin-top:18px\">{{ siRank.label }}<\u002Fdiv>\n    <div style=\"font-size:12.5px;color:#a9c6b6;margin-top:6px;line-height:1.6\">{{ siRank.desc }}<\u002Fdiv>\n    <div style=\"font-size:12px;color:#8aa99a;margin-top:12px\">一発正解 {{ siFirstTry }} 語 ／ 全 {{ siDoneCount }} 語<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"padding:24px 22px 34px\">\n    <sc-if value=\"{{ siHasWrong }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"font-size:12px;color:#9aa2b0;letter-spacing:.1em;font-weight:700;margin-bottom:10px\">まちがえた語（{{ siWrongCount }}）<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:7px;margin-bottom:22px\">\n        <sc-for list=\"{{ siWrongList }}\" as=\"w\" hint-placeholder-count=\"3\">\n          <div style=\"display:flex;align-items:baseline;gap:10px;background:#fff;border:1px solid #ece3d4;border-radius:9px;padding:10px 13px\">\n            <span style=\"font-size:10.5px;color:#b3aa99;font-weight:700;min-width:38px\">No.{{ w.num }}<\u002Fspan>\n            <span style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:15px;color:#243b34\">{{ w.en }}<\u002Fspan>\n            <span style=\"font-size:12.5px;color:#6b7382;flex:1\">{{ w.ja }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <div style=\"display:flex;flex-direction:column;gap:11px\">\n      <sc-if value=\"{{ siHasWrong }}\" hint-placeholder-val=\"{{ true }}\">\n        <div onclick=\"{{ onSiRetryWrong }}\" style=\"background:#3f8f63;color:#fff;border-radius:13px;padding:16px;text-align:center;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 5px 14px rgba(63,143,99,.25)\">まちがえた語だけ復習<\u002Fdiv>\n      <\u002Fsc-if>\n      <div onclick=\"{{ onSiRetry }}\" style=\"background:#fff;border:1.5px solid #e2d8c8;border-radius:13px;padding:16px;text-align:center;font-weight:700;font-size:15px;color:#243b34;cursor:pointer\">同じ範囲をもう一度<\u002Fdiv>\n      <div onclick=\"{{ onSihome }}\" style=\"text-align:center;padding:8px;font-size:13px;color:#9aa2b0;cursor:pointer\">範囲選択に戻る<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== GHOME（英文法・設定） ===== -->\n<sc-if value=\"{{ isGhome }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"height:100%;display:flex;flex-direction:column;animation:seFade .4s ease both\">\n  <div style=\"background:#1f3a5f;padding:42px 26px 28px;color:#fff;position:relative;flex-shrink:0\">\n    <div onclick=\"{{ onTop }}\" style=\"font-size:12.5px;color:#a9c2de;cursor:pointer;margin-bottom:14px\">‹ 教科選択<\u002Fdiv>\n    <div style=\"font-family:'Shippori Mincho',serif;font-size:12px;letter-spacing:.28em;color:#9bb6db;font-weight:600\">GRAMMAR · L3 / L4<\u002Fdiv>\n    <h1 style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:29px;line-height:1.3;margin:12px 0 0;letter-spacing:.02em\">英文法<\u002Fh1>\n    <div style=\"margin-top:12px;font-size:13px;color:#a9c2de;line-height:1.7\">予想問題から出題。本文の前後も抜粋して確認できます<\u002Fdiv>\n    <div style=\"position:absolute;right:24px;top:42px;width:58px;height:58px;border:1.5px solid #2a6fb0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Shippori Mincho',serif;color:#9bb6db;font-size:13px;transform:rotate(-8deg)\">文法<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"se-frame\" style=\"flex:1;overflow-y:auto;padding:20px 20px 30px\">\n    <!-- 出題方式（A・B混在） -->\n    <div style=\"font-size:12px;color:#9aa2b0;letter-spacing:.1em;font-weight:700;margin-bottom:11px\">出題方式を選ぶ（予想A・Bは混ざって出題）<\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:10px\">\n      <sc-for list=\"{{ gramModes }}\" as=\"m\" hint-placeholder-count=\"5\">\n        <div onclick=\"{{ m.onTap }}\" style=\"display:flex;align-items:center;gap:13px;padding:15px 16px;border-radius:12px;cursor:pointer;background:{{ m.bg }};border:1.5px solid {{ m.bd }}\">\n          <div style=\"flex:1\">\n            <div style=\"font-weight:700;font-size:15px;color:{{ m.fg }}\">{{ m.label }}<\u002Fdiv>\n            <div style=\"font-size:12px;color:{{ m.sub }};margin-top:3px;line-height:1.55\">{{ m.desc }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:'Shippori Mincho',serif;font-size:13px;font-weight:700;color:{{ m.sub }};white-space:nowrap\">{{ m.count }}問<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div onclick=\"{{ onGramStart }}\" style=\"margin-top:24px;background:#2a6fb0;color:#fff;border-radius:13px;padding:17px;text-align:center;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 6px 18px rgba(42,111,176,.28)\">スタート（全 {{ gramCount }} 問）<\u002Fdiv>\n    <div style=\"margin-top:13px;background:#eef1f4;border-radius:11px;padding:12px 15px;font-size:12px;color:#5a6472;line-height:1.7\">予想問題A・Bの問題が混ざって出題されます。並べかえ・空所補充は自動採点、語形変化・和訳・内容理解は「答えを見る」で模範解答を確認して自己採点します。<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== GQUIZ（英文法・出題） ===== -->\n<sc-if value=\"{{ isGquiz }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"height:100%;display:flex;flex-direction:column\">\n  <div style=\"flex-shrink:0;background:#f4f6f9;padding:14px 18px 10px;border-bottom:1px solid #e2e8f0\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px\">\n      <div style=\"display:flex;align-items:center;gap:8px\">\n        <div onclick=\"{{ onGhome }}\" style=\"display:flex;align-items:center;gap:3px;background:#fff;border:1px solid #d3dde8;border-radius:18px;padding:7px 13px 7px 10px;font-size:12.5px;font-weight:700;color:#1f3a5f;cursor:pointer;box-shadow:0 1px 3px rgba(20,30,45,.06)\">‹ 設定<\u002Fdiv>\n        <sc-if value=\"{{ gramCanPrev }}\" hint-placeholder-val=\"{{ true }}\">\n          <div onclick=\"{{ onGramPrev }}\" style=\"display:flex;align-items:center;gap:3px;background:#e8edf3;border:1px solid #d8e0ea;border-radius:18px;padding:7px 12px;font-size:12.5px;font-weight:700;color:#577;cursor:pointer\">↩ 前へ<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"font-size:12px;color:#5a6472;font-weight:700;white-space:nowrap\">問 {{ gramIdx1 }} / {{ gramTotal }}<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:9px;height:5px;background:#dde5ee;border-radius:3px;overflow:hidden\">\n      <div style=\"height:100%;background:#2a6fb0;border-radius:3px;width:{{ gramProgress }}%;transition:width .35s ease\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"se-frame\" style=\"flex:1;overflow-y:auto;padding:18px 18px 26px\">\n    <div style=\"animation:seFade .3s ease both\">\n      <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap\">\n        <div style=\"display:inline-block;background:#1f3a5f;color:#fff;font-size:11px;font-weight:700;letter-spacing:.06em;padding:4px 11px;border-radius:20px\">予想{{ gramP.set }}<\u002Fdiv>\n        <div style=\"font-size:11px;color:#9aa2b0;font-weight:700\">{{ gramP.lesson }}<\u002Fdiv>\n        <div style=\"font-size:11px;color:#b9c2cd;font-weight:700\">{{ gramTypeLabel }}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 並べかえ -->\n      <sc-if value=\"{{ gramIsReorder }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"background:#fff;border:1px solid #e3e8ef;border-radius:16px;padding:18px;margin-top:13px;box-shadow:0 4px 16px rgba(20,30,45,.06)\">\n          <div style=\"font-size:11px;color:#9aa2b0;font-weight:700;letter-spacing:.08em;margin-bottom:8px\">本文（抜粋）<\u002Fdiv>\n          <div style=\"font-size:15px;color:#2a313a;line-height:1.85\">{{ gramP.before }} <span style=\"display:inline-block;min-width:54px;border-bottom:2px solid #2a6fb0;text-align:center;color:#2a6fb0;font-weight:700\">？<\u002Fspan>{{ gramP.after }}<\u002Fdiv>\n          <div style=\"margin-top:13px;padding:11px 13px;background:#eef3f8;border-radius:9px;font-size:12.5px;color:#34557e;line-height:1.6\"><span style=\"font-weight:700\">日本語：<\u002Fspan>{{ gramP.jp }}<\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- 解答欄 -->\n        <div style=\"font-size:12px;color:#9aa2b0;letter-spacing:.08em;font-weight:700;margin:18px 0 9px\">組み立てた文<\u002Fdiv>\n        <div style=\"min-height:54px;background:#fbfcfd;border:1.5px dashed #cdd8e4;border-radius:12px;padding:11px;display:flex;flex-wrap:wrap;gap:8px;align-items:center\">\n          <sc-if value=\"{{ gramHasPlaced }}\" hint-placeholder-val=\"{{ true }}\">\n            <sc-for list=\"{{ gramPlacedTokens }}\" as=\"t\" hint-placeholder-count=\"4\">\n              <div onclick=\"{{ t.onTap }}\" style=\"background:#1f3a5f;color:#fff;border-radius:9px;padding:9px 13px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 2px 6px rgba(31,58,95,.2)\">{{ t.tok }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ gramNonePlaced }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"font-size:13px;color:#b3bdc9\">下の語群からタップして並べてください<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <!-- 語群 -->\n        <div style=\"font-size:12px;color:#9aa2b0;letter-spacing:.08em;font-weight:700;margin:18px 0 9px\">語群（タップで選ぶ）<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:9px\">\n          <sc-for list=\"{{ gramBankTokens }}\" as=\"t\" hint-placeholder-count=\"6\">\n            <div onclick=\"{{ t.onTap }}\" style=\"background:{{ t.bg }};color:{{ t.fg }};border:1.5px solid {{ t.bd }};border-radius:10px;padding:11px 15px;font-size:15.5px;font-weight:600;cursor:pointer\">{{ t.tok }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- 結果 -->\n        <sc-if value=\"{{ gramChecked }}\" hint-placeholder-val=\"{{ ff;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 5px 14px rgba(42,111,176,.3)\">✓ できた<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fsc-if><\u002Fdiv>\n\n\n<!-- ===== GRAMRESULT（英文法・結果） ===== -->\n<sc-if value=\"{{ isGramresult }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"animation:seFade .4s ease both\">\n  <div style=\"background:#1f3a5f;color:#fff;padding:40px 26px 34px;text-align:center\">\n    <div style=\"font-size:12px;letter-spacing:.28em;color:#a9c2de\">RESULT · 英文法<\u002Fdiv>\n    <div style=\"margin:22px auto 0;width:150px;height:150px;border-radius:50%;border:3px solid {{ gramRank.color }};display:flex;flex-direction:column;align-items:center;justify-content:center;animation:sePop .5s ease both\">\n      <div style=\"font-family:'Shippori Mincho',serif;font-size:60px;font-weight:700;line-height:1;color:{{ gramRank.color }}\">{{ gramRank.letter }}<\u002Fdiv>\n      <div style=\"font-size:13px;color:#a9c2de;margin-top:6px\">{{ gramPct }}% 正解<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-weight:700;font-size:18px;margin-top:18px\">{{ gramRank.label }}<\u002Fdiv>\n    <div style=\"font-size:12.5px;color:#a9c2de;margin-top:6px;line-height:1.6\">{{ gramRank.desc }}<\u002Fdiv>\n    <div style=\"font-size:12px;color:#8aa4c6;margin-top:12px\">正解 {{ gramGood }} ／ 全 {{ gramTotal }} 問<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"padding:24px 22px 34px\">\n    <sc-if value=\"{{ gramHasWrong }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"font-size:12px;color:#9aa2b0;letter-spacing:.1em;font-weight:700;margin-bottom:10px\">まちがえた問題<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:7px;margin-bottom:22px\">\n        <sc-for list=\"{{ gramWrong }}\" as=\"w\" hint-placeholder-count=\"3\">\n          <div style=\"background:#fff;border:1px solid #e6ebf1;border-radius:9px;padding:11px 13px\">\n            <div style=\"font-size:10.5px;color:#9aa2b0;font-weight:700;margin-bottom:3px\">予想{{ w.p.set }} · {{ w.p.lesson }}<\u002Fdiv>\n            <div style=\"font-size:13px;color:#34557e;line-height:1.6\">{{ w.p.exp }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <div style=\"display:flex;flex-direction:column;gap:11px\">\n      <sc-if value=\"{{ gramHasWrong }}\" hint-placeholder-val=\"{{ true }}\">\n        <div onclick=\"{{ onGramRetryWrong }}\" style=\"background:#2a6fb0;color:#fff;border-radius:13px;padding:16px;text-align:center;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 5px 14px rgba(42,111,176,.25)\">まちがえた問題だけ復習<\u002Fdiv>\n      <\u002Fsc-if>\n      <div onclick=\"{{ onGramRetryAll }}\" style=\"background:#fff;border:1.5px solid #d8e0ea;border-radius:13px;padding:16px;text-align:center;font-weight:700;font-size:15px;color:#1f3a5f;cursor:pointer\">同じ設定でもう一度<\u002Fdiv>\n      <div onclick=\"{{ onGhome }}\" style=\"text-align:center;padding:8px;font-size:13px;color:#9aa2b0;cursor:pointer\">設定に戻る<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844}}\">\nclass Component extends DCLogic {\n  data = [\n    { tag:'第1節', name:'求められる経営状態の透明化', qs:[\n      { num:1, note:'ディスクロージャー＝情報開示、コーポレート・ガバナンス＝企業統治',\n        passage:'現代の企業には経営状態の透明化が求められる。企業情報を公開する{1}の推進や、経営を監視する{2}の強化（社外取締役の選任など）が進む。またバブル期には芸術・文化を支援する{3}や、福祉などへの慈善活動である{4}が行われたが、バブル崩壊後は先細りした。',\n        ans:[['ディスクロージャー','企業情報の開示・公開'],['コーポレート・ガバナンス','企業統治。経営を監視する仕組み'],['メセナ','芸術・文化への支援活動'],['フィランソロピー','福祉などへの慈善・寄付活動']] },\n      { num:2, note:'CSRの具体策：コンプライアンス・ダイバーシティ・ステークホルダー配慮・ESG投資',\n        passage:'企業が利益だけでなく社会に対して負う責任を{1}（CSR）という。これには持続可能な開発目標（SDGs）達成への対応、法令を守る{2}、人材における多様性すなわち{3}の推進、利害関係者すなわち{4}への配慮が含まれる。こうした取り組みは、環境・社会・企業統治を重視する{5}によって後押しされている。',\n        ans:[['企業の社会的責任','CSR。企業が社会に対して負う責任'],['コンプライアンス','法令遵守'],['ダイバーシティ','人材の多様性'],['ステークホルダー','利害関係者（株主・従業員・地域など）'],['ESG投資','環境・社会・企業統治を重視する投資']] }\n    ]},\n    { tag:'第2節', name:'市場経済の機能と限界', qs:[\n      { num:3, note:'市場経済＝価格で調整、計画経済＝国家が決定',\n        passage:'財は自給自足できないため、市場で対価を払い必要な財・サービスを入手する仕組みを{1}という。ここでは品不足が起きると{2}する。これに対し、生産する財の数量と価格を原則として国家が定める仕組みを{3}といい、品不足が起きると入手が困難になる。',\n        ans:[['市場経済','市場で対価を払い必要な財・サービスを入手する仕組み'],['価格上昇','品不足のときに市場で起こること'],['計画経済','国家が生産量と価格を決める経済体制']] },\n      { num:4, note:'超過需要→価格上昇→需給調整。一致させる価格が均衡価格',\n        passage:'完全競争市場では、需要が供給を上回る{1}が生じると価格が上昇し、その結果、需要量は減少、供給量は増加する。このように価格の変化を通して品不足や品余りが自然に解消される働きを{2}という。そして需要量と供給量を一致させる価格を{3}という。',\n        ans:[['超過需要','需要が供給を上回る状態'],['価格の自動調節機能','価格変化を通じて需給が自然に調整される働き'],['均衡価格','需要量と供給量を一致させる価格']] },\n      { num:5, note:'「市場の失敗」の3原因：競争の不完全性・情報の非対称性・公共財',\n        passage:'市場が万能でなくうまく機能しない状態を「市場の失敗」（市場の限界）という。その原因の一つが競争の{1}で、市場の寡占化・独占化が進むと財の価格が割高になる。二つ目は{2}で、財の売り手と買い手の間に情報格差があり、売り手がそれを利用して高値で売ろうとすると、買い手が売り手を信用できなくなる。',\n        ans:[['不完全性','寡占化・独占化により競争が機能しないこと'],['情報の非対称性','売り手と買い手の間に情報格差があること']] },\n      { num:6, note:'公共財＝非排除性＋非競合性。私的財はその逆',\n        passage:'「市場の失敗」の三つ目の原因は{1}である。これには、対価を支払わない人を消費から排除できない{2}と、ある人が多く消費しても他の人の消費が減ることはない{3}という性質がある。これと逆に、排除的かつ競合的な財は{4}と呼ばれる。',\n        ans:[['公共財','市場では十分に供給されにくい財（国防・道路など）'],['非排除性','対価を払わない人を消費から排除できない性質'],['非競合性','ある人の消費が他人の消費を減らさない性質'],['私的財','排除的かつ競合的な通常の財']] }\n    ]},\n    { tag:'第3節', name:'寡占下の経済活動の実態', qs:[\n      { num:7, note:'外部経済＝プラスの波及、外部不経済＝マイナスの波及（公害など）',\n        passage:'対価を支払わなくても財・サービスを享受できる場合を{1}といい、供給が過小になる（例：新駅建設による利便性の高まり）。逆に、対価を受け取ることなく不利益をこうむる場合を{2}といい、供給が過剰になる（例：公害）。後者は環境税などの課税によって{3}（外部不経済の内部化）が図られる。',\n        ans:[['外部経済','対価を払わずに利益を受けられる場合（供給が過小）'],['外部不経済','対価を受けずに不利益をこうむる場合（供給が過剰）'],['内部化','課税などで外部不経済を価格に反映させること']] },\n      { num:8, note:'カルテル＝協定、トラスト＝合同、コンツェルン＝持株会社による支配',\n        passage:'市場の集中には、数社で全体の大半を占める{1}と、一社がほとんどすべてを占める{2}がある。企業の結合形態には、同一産業の企業が協定を結ぶ{3}（企業連合）、複数企業が合同して一つになる{4}（企業合同）、親会社（持株会社）が異なる産業の企業を支配する{5}（企業連携）がある。',\n        ans:[['寡占','数社で市場の大半を占める状態'],['独占','一社がほとんどすべてを占める状態'],['カルテル','同一産業の企業が価格・生産量で協定を結ぶこと'],['トラスト','複数企業が合同して一つの企業になること'],['コンツェルン','持株会社が異業種の企業を支配する形態']] },\n      { num:9, note:'規模の経済→自然独占。デファクト・スタンダード＝事実上の標準',\n        passage:'巨大な設備が必要な産業では、生産量を増やせば単価が安くなる{1}が働く。これにより価格競争力も増し、自然に大規模化が進むことを{2}という。また情報通信産業では、通信網が広いほど利用者の利便性が増し、一つの企業が独占的に構築した事実上の基準を{3}という。',\n        ans:[['規模の経済','生産量を増やすほど単価が下がる効果'],['自然独占','規模の経済により自然に独占化が進むこと'],['デファクト・スタンダード','一企業が独占的に築いた事実上の基準']] },\n      { num:10, note:'管理価格→プライスメーカー→非価格競争。監視機関は公正取引委員会',\n        passage:'寡占下では、有力企業が利潤を確保できるように価格を設定する{1}が見られ、その価格を設定する企業を{2}（価格設定者）という。他の企業もこれに追従する。価格で競争しない代わりに、品質・デザイン・広告・宣伝で競う{3}が行われる。価格の伸縮性が失われ消費者が不利益をこうむりやすいため、{4}が定められ、{5}が監視にあたる。',\n        ans:[['管理価格','有力企業が利潤確保のために設定する価格'],['プライスメーカー','価格を設定する側の企業（価格設定者）'],['非価格競争','品質・デザイン・広告などで競うこと'],['独占禁止法','市場の独占・寡占の弊害を防ぐ法律'],['公正取引委員会','独占禁止法を運用・監視する機関']] }\n    ]},\n    { tag:'第4節', name:'国民所得と経済成長', qs:[\n      { num:11, note:'フロー＝流れ（P/L）、ストック＝蓄積（B/S）。国富はストックの代表',\n        passage:'一定期間の経済活動の流れを{1}、ある時点の蓄積を{2}という。後者の代表が一国の資産の合計である{3}である。日本では1990年まで{3}は伸びていたが、2020年までは土地項目が減少した。これは{4}によって地価が下がったためである。',\n        ans:[['フロー','一定期間の経済活動の流れ（例：GDP）'],['ストック','ある時点での蓄積（例：国富）'],['国富','一国の資産の合計。ストックの代表的指標'],['バブルの崩壊','1990年代初頭に地価が下落した出来事']] },\n      { num:12, note:'GDP＝国内で生み出された付加価値の合計。「国内」がポイント',\n        passage:'国内の各企業が生み出した付加価値を合計した指標を{1}（GDP）という。これは「国内での総生産額 − {2}」で算出される。在留外国人の所得は含まれるが、在外日本人の所得は含まれない。これを人口で割ったものを{3}という。',\n        ans:[['国内総生産','GDP。国内で生み出された付加価値の合計'],['中間生産物','総生産額から差し引く、原材料などの価値'],['一人あたりGDP','GDPを人口で割った値']] },\n      { num:13, note:'GNP＝GNI＝GNE（三面等価の原則）',\n        passage:'国民が生み出した付加価値の合計を{1}（GNP）といい、「GDP ＋（海外からの所得 − 海外への所得）」で算出される。これを所得面から捉えた指標を{2}（GNI）、支出面から捉えた指標を{3}（GNE）という。生産・分配・支出の三つの国民所得は等しくなり、これを{4}という。',\n        ans:[['国民総生産','GNP。国民が生み出した付加価値の合計'],['国民総所得','GNI。GNPを所得面から捉えた指標'],['国民総支出','GNE。GNPを支出面から捉えた指標'],['三面等価の原則','生産・分配・支出の国民所得が等しくなる原則']] },\n      { num:14, note:'GNP→（固定資本減耗を引く）→NNP→（間接税・補助金を調整）→NI',\n        passage:'国民総生産から固定資本減耗（減価償却費）を引いたものを{1}（NNP）という。さらに（間接税 − 補助金）を調整したものを{2}（NI）という。また国民福祉の指標として、国連開発計画が公表する寿命・教育・所得から算出される{3}（HDI）がある。',\n        ans:[['国民純生産','NNP。GNPから固定資本減耗を引いた指標'],['国民所得','NI。NNPから間接税を引き補助金を足した指標'],['人間開発指数','HDI。寿命・教育・所得から算出する福祉指標']] },\n      { num:15, note:'NNW＝国民純福祉。グリーンGDP＝NDP−環境破壊。実質値が実質経済成長率',\n        passage:'国民の福祉水準を示す指標として、余暇や家事労働を加味した{1}（NNW）がある。また環境を考慮した指標として、国内純生産（NDP）から環境破壊分を差し引いた{2}がある。さらに経済の規模が拡大することを{3}といい、物価変動の影響を除いた実質GDPを用いて計算した成長率を{4}という。',\n        ans:[['国民純福祉','NNW。余暇や家事労働を加味した福祉指標'],['グリーンGDP','NDPから環境破壊分を引いた環境配慮型の指標'],['経済成長','経済の規模が拡大すること'],['実質経済成長率','物価変動を除いた実質GDPで計算した成長率']] },\n      { num:16, note:'4つの波：キチン(在庫)/ジュグラー(設備)/クズネッツ(建築)/コンドラチェフ(技術)',\n        passage:'名目GDPを実質GDPで割り、物価の動きを表す指標を{1}という。好況・後退・不況・回復を繰り返す経済の波を{2}といい、不況が特に急激な場合を{3}という。この波には、約40か月で在庫変動が原因の{4}、約8〜10年で設備投資が原因の{5}、約20年で建築投資が原因の{6}、約50年で技術革新が原因の{7}がある。',\n        ans:[['GDPデフレーター','名目GDP÷実質GDPで物価変動を示す指標'],['景気循環','好況・後退・不況・回復を繰り返す波'],['恐慌','景気が急激に悪化する状態'],['キチンの波','約40か月周期。在庫変動が原因'],['ジュグラーの波','約8〜10年周期。設備投資が原因'],['クズネッツの波','約20年周期。建築投資が原因'],['コンドラチェフの波','約50年周期。技術革新が原因']] },\n      { num:17, note:'スタグフレーション＝不況＋インフレ、デフレスパイラル＝デフレの悪循環',\n        passage:'物価が持続的に上昇することを{1}、持続的に下落することを{2}という。1970年代の第一次石油危機では、不況とインフレーションが同時に起こる{3}が発生した。また1991年代のバブル崩壊では需要の落ち込みから不況とデフレーションが連鎖し、物価下落と景気悪化が悪循環する{4}に陥った。',\n        ans:[['インフレーション','物価が持続的に上昇すること'],['デフレーション','物価が持続的に下落すること'],['スタグフレーション','不況とインフレーションが同時に起こる現象'],['デフレスパイラル','物価下落と景気悪化が悪循環すること']] }\n    ]},\n    { tag:'第5節', name:'金融', qs:[\n      { num:18, note:'金本位制＝兌換紙幣、管理通貨制度＝不換紙幣',\n        passage:'貨幣には、支払い手段・価値貯蔵手段・{1}・交換手段という機能がある。1929年までは、紙幣を金と交換できる兌換紙幣を用いる{2}がとられていた。1930年からは、紙幣を金と交換できない不換紙幣を用いる{3}に移行した。',\n        ans:[['価値尺度','貨幣の機能の一つ。モノの価値を測る'],['金本位制','紙幣を金と交換できる兌換紙幣の制度'],['管理通貨制度','金と交換できない不換紙幣の制度']] },\n      { num:19, note:'発券銀行・銀行の銀行・政府の銀行。最後の貸し手も重要',\n        passage:'中央銀行には3つの役割がある。紙幣を発行する{1}、市中銀行と取引する{2}、政府の資金を扱う{3}である。金融危機の際には「{4}」として資金を供給する。',\n        ans:[['発券銀行','紙幣を発行する役割'],['銀行の銀行','市中銀行と取引する役割'],['政府の銀行','政府の資 n  // ===== 英単語（シスタン） =====\n  siData(){ return (typeof window!=='undefined' && window.SISTAN) ? window.SISTAN : []; }\n  siSetFrom(v){ let n=parseInt(v,10); if(isNaN(n))return; n=Math.max(1,Math.min(2027,n)); this.setState({siFrom:n}); }\n  siSetTo(v){ let n=parseInt(v,10); if(isNaN(n))return; n=Math.max(1,Math.min(2027,n)); this.setState({siTo:n}); }\n  siPreset(a,b){ this.setState({siFrom:a, siTo:b}); }\n  siSetDir(d){ this.setState({siDir:d}); }\n  siSetMode(m){ this.setState({siMode:m}); }\n  siSetOrder(o){ this.setState({siOrder:o}); }\n\n  _shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }\n\n  // 4択の選択肢を生成（表示テキストで重複排除し、正解と同じ訳/語は除外）\n  _choicesFrom(pool, poolIdx, dir, data){\n    const cur=pool[poolIdx]; if(!cur) return [];\n    const e2j = dir==='e2j';\n    const labelOf = (w)=> e2j ? w[2] : w[1];\n    const ansLabel = labelOf(cur);\n    const usedLabels = new Set([ansLabel]);\n    const cand=[];\n    const others = this._shuffle(pool.filter((_,i)=>i!==poolIdx));\n    for(const o of others){ if(cand.length>=3) break; const l=labelOf(o); if(!usedLabels.has(l)){ cand.push(o); usedLabels.add(l); } }\n    if(cand.length<3){\n      const g=this._shuffle(data.slice());\n      for(const o of g){ if(cand.length>=3) break; if(o[0]===cur[0]) continue; const l=labelOf(o); if(!usedLabels.has(l)){ cand.push(o); usedLabels.add(l); } }\n    }\n    return this._shuffle([cur,...cand]);\n  }\n\n  siStart(){\n    const data=this.siData();\n    let from=Math.min(this.state.siFrom,this.state.siTo);\n    let to=Math.max(this.state.siFrom,this.state.siTo);\n    const pool=data.filter(r=>r[0]>=from && r[0]<=to);\n    if(!pool.length) return;\n    let order=pool.map((_,i)=>i);\n    if(this.state.siOrder==='random') order=this._shuffle(order);\n    const choices=this._choicesFrom(pool, order[0], this.state.siDir, data);\n    this.setState({ screen:'siquiz', siPool:pool, siQueue:order, siPos:0, siReveal:false, si +q.k+q.m; }\n  startGendai(kai){\n    const idxs=[]; this.GENDAI.forEach((q,i)=>{ if(!kai||q.k===kai) idxs.push(i); });\n    this.setState({ screen:'gendai', gOrder:idxs, gIdx:0, gSel:{} });\n  }\n  gSelect(choice){\n    const q=this.GENDAI[this.state.gOrder[this.state.gIdx]]; const id=this.gid(q);\n    if(this.state.gSel[id]) return; // 回答済みは変更不可\n    const sel={...this.state.gSel}; sel[id]={pick:choice, correct:choice===q.a};\n    this.setState({gSel:sel});\n  }\n  gNext(){\n    const last=this.state.gIdx>=this.state.gOrder.length-1;\n    if(last){ this.setState({screen:'gresult'}); }\n    else { this.setState({gIdx:this.state.gIdx+1}, ()=>{ window.scrollTo&&window.scrollTo(0,0); }); }\n  }\n  gJump(globalIdx){ const pos=this.state.gOrder.indexOf(globalIdx); this.setState({gIdx:pos<0?0:pos}); }\n  gPrev(){ if(this.state.gIdx>0) this.setState({gIdx:this.state.gIdx-1}, ()=>{ window.scrollTo&&window.scrollTo(0,0); }); }\n\n  // ===== 漢字（書き取り） =====\n  kid(q){ return 'k'+q.k+q.n; }\n  startKanji(round){\n    const idxs=[]; this.KANJI.forEach((q,i)=>{ if(!round||q.k===round) idxs.push(i); });\n    this.setState({ screen:'kanji', kOrder:idxs, kIdx:0, kReveal:{} });\n  }\n  kRevealCur(){ const q=this.KANJI[this.state.kOrder[this.state.kIdx]]; const r={...this.state.kReveal}; r[this.kid(q)]=true; this.setState({kReveal:r}); }\n  kPrev(){ if(this.state.kIdx>0) this.setState({kIdx:this.state.kIdx-1}, ()=>{ window.scrollTo&&window.scrollTo(0,0); }); }\n  kGrade(kind){\n    const q=this.KANJI[this.state.kOrder[this.state.kIdx]]; const res={...this.state.results}; res[this.kid(q)]=kind;\n    const last=this.state.kIdx>=this.state.kOrder.length-1;\n    if(last){ this.setState({results:res, screen:'kresult'}); }\n    else { this.setState({results:res, kIdx:this.state.kIdx+1}, ()=>{ window.scrollTo&&window.scrollTo(0,0); }); }\n  }\n\n  componentDidMount(){\n    try{\n      const raw = localStorage.getItem(this.STORE);\n      if(raw){ const s = JSON.parse(raw); this.setState({ results:s.results||{}, _resumeDeck:s.deck||'basic', _resumeIdx:s.idx||0, _hasProg:!!(s.deck&&typeof s.idx==='number') }); }\n    }catch(e){}\n    this._onResize=()=>this.forceUpdate();\n    window.addEventListener('resize', this._onResize);\n    const done=()=>this.setState({loaded:true});\n    let fired=false; const go=()=>{ if(fired)return; fired=true; done(); };\n    try{ if(document.fonts&&document.fonts.ready){ document.fonts.ready.then(()=>setTimeout(go,450)); } }catch(e){}\n    setTimeout(go, 2600);\n  }\n  persist(){\n    try{ localStorage.setItem(this.STORE, JSON.stringify({ deck:this.state.deck, idx:this.state.idx })); }catch(e){}\n  }\n\n  // ---- helpers ----\n  deckData(d){ return (d||this.state.deck)==='alt' ? this.dataAlt : this.data; }\n  flatOf(data){ const o=[]; data.forEach((s,si)=> s.qs.forEach(q=> o.push({...q, sec:s.name, tag:s.tag, secIndex:si}))); return o; }\n  flat(){ return this.flatOf(this.deckData()); }\n  qByNum(n){ return this.flat().find(q=>q.num===n); }\n  curNum(){ return this.state.order[this.state.idx]; }\n  rkey(num){ return this.state.deck+':'+num; }\n\n  startDeck(deck, fromIdx){ const all=this.flatOf(this.deckData(deck)).map(q=>q.num); this.setState({ screen:'quiz', deck, order:all, idx:fromIdx||0, reveal:{} }, ()=>this.persist()); }\n  startSection(deck, si){ const data=this.deckData(deck); const all=this.flatOf(data).map(q=>q.num); const first=this.flatOf(data).findIndex(q=>q.secIndex===si); this.setState({ screen:'quiz', deck, order:all, idx:first<0?0:first, reveal:{} }, ()=>this.persist()); }\n  reviewVague(){ const nums=this.flat().map(q=>q.num).filter(n=>this.state.results[this.rkey(n)]==='vague'); if(!nums.length)return; this.setState({ screen:'quiz', order:nums, idx:0, reveal:{} }); }\n  goHome(){ this.setState({ screen:'home' }); this.persist(); }\n\n  tapBlank(n){ const num=this.curNum(); const r={...this.state.reveal}; const set={...(r[num]||{})}; set[n]=true; r[num]=set; this.setState({reveal:r}); }\n  revealAll(){ c
