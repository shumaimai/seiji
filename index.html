  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"bd4c3a89-5ed6-4e93-bead-38cc12b16197\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n\n<helmet>\n<script>\n(function(){try{var p1=document.createElement('link');p1.rel='preconnect';p1.href='https://fonts.googleapis.com';document.head.appendChild(p1);var p2=document.createElement('link');p2.rel='preconnect';p2.href='https://fonts.gstatic.com';p2.crossOrigin='anonymous';document.head.appendChild(p2);var l=document.createElement('link');l.rel='stylesheet';l.href='https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Shippori+Mincho:wght@500;600;700&display=swap';document.head.appendChild(l);}catch(e){}})();\n<\u002Fscript>\n<style>\n  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}\n  html,body{margin:0;padding:0;overflow:hidden}\n  body{font-family:'Zen Kaku Gothic New',sans-serif;background:#ded6c8}\n  .se-frame{scrollbar-width:none;-ms-overflow-style:none}\n  .se-frame::-webkit-scrollbar{width:0;height:0;display:none}\n  @keyframes seFade{from{transform:translateY(8px)}to{transform:none}}\n  @keyframes sePop{0%{transform:scale(.85)}60%{transform:scale(1.04)}100%{transform:scale(1)}}\n  @keyframes sePulse{0%,100%{transform:scale(1);opacity:.85}50%{transform:scale(1.08);opacity:1}}\n  @keyframes seLoad{0%{left:-42%}100%{left:100%}}<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"position:fixed;inset:0;background:#ded6c8;display:flex;align-items:center;justify-content:center;overflow:hidden\">\n<div class=\"se-frame\" style=\"width:{{ frameW }}px;height:{{ frameH }}px;transform:scale({{ frameScale }});transform-origin:center center;background:#f6f3ee;position:relative;overflow-y:auto;overflow-x:hidden;box-shadow:0 0 60px rgba(20,30,45,.28);color:#20262e\">\n\n<sc-if value=\"{{ isLoading }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"position:fixed;inset:0;z-index:50;background:#4a2436;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff\">\n  <div style=\"width:74px;height:74px;border-radius:50%;border:2px solid rgba(224,133,155,.35);display:flex;align-items:center;justify-content:center;font-family:'Shippori Mincho',serif;font-size:18px;color:#e2a8b8;animation:sePulse 1.4s ease-in-out infinite\">保健<\u002Fdiv>\n  <div style=\"font-family:'Shippori Mincho',serif;font-size:20px;margin-top:22px;letter-spacing:.06em\">保健ドリル<\u002Fdiv>\n  <div style=\"font-size:12px;color:#dcb2bf;margin-top:8px;letter-spacing:.16em\">現代社会と健康<\u002Fdiv>\n  <div style=\"width:140px;height:4px;border-radius:3px;background:rgba(255,255,255,.14);margin-top:26px;overflow:hidden;position:relative\">\n    <div style=\"position:absolute;top:0;left:0;height:100%;width:42%;border-radius:3px;background:#c0556b;animation:seLoad 1.2s ease-in-out infinite\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"font-size:11px;color:#c9a3b0;margin-top:14px\">読み込み中…<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== HKHOME(保健・メニュー) ===== -->\n<sc-if value=\"{{ isHkhome }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"animation:seFade .4s ease both\">\n  <div style=\"background:#4a2436;padding:44px 26px 34px;color:#fff;position:relative\">\n    <div style=\"font-family:'Shippori Mincho',serif;font-size:12px;letter-spacing:.32em;color:#e2a8b8;font-weight:600\">HOKEN · DRILL<\u002Fdiv>\n    <h1 style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:31px;line-height:1.32;margin:12px 0 0;letter-spacing:.02em\">現代社会と健康<\u002Fh1>\n    <div style=\"margin-top:14px;font-size:13px;color:#dcb2bf;line-height:1.7\">本文穴埋め・図表穴埋め<br>全10講で健康の基礎を固める<\u002Fdiv>\n    <div style=\"position:absolute;right:24px;top:44px;width:58px;height:58px;border:1.5px solid #c0556b;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Shippori Mincho',serif;color:#e2a8b8;font-size:13px;transform:rotate(-8deg)\">保健<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"padding:22px 22px 30px\">\n    <sc-if value=\"{{ hkHasProgress }}\" hint-placeholder-val=\"{{ true }}\">\n      <div onclick=\"{{ onHkContinue }}\" style=\"background:#fff;border:1px solid #e6ddd0;border-radius:14px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;cursor:pointer;box-shadow:0 2px 10px rgba(20,30,45,.05)\">\n        <div>\n          <div style=\"font-size:11px;color:#9aa2b0;letter-spacing:.08em\">前回の続きから<\u002Fdiv>\n          <div style=\"font-weight:700;font-size:16px;margin-top:3px;color:#4a2436\">{{ hkResumeLabel }} へ進む<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width:34px;height:34px;border-radius:50%;background:#c0556b;color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px\">→<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:11px\">\n      <div onclick=\"{{ onHkStartAnaume }}\" style=\"background:#c0556b;color:#fff;border-radius:14px;padding:16px 12px;text-align:center;cursor:pointer;box-shadow:0 6px 18px rgba(192,85,107,.24)\">\n        <div style=\"font-weight:700;font-size:15.5px;letter-spacing:.02em\">本文穴埋め<\u002Fdiv>\n        <div style=\"font-size:11px;color:#f3d3da;margin-top:3px\">全10講・通し<\u002Fdiv>\n      <\u002Fdiv>\n      <div onclick=\"{{ onHkStartZuhyou }}\" style=\"background:#4a2436;color:#fff;border-radius:14px;padding:16px 12px;text-align:center;cursor:pointer;box-shadow:0 6px 18px rgba(74,36,54,.28)\">\n        <div style=\"font-weight:700;font-size:15.5px;letter-spacing:.02em\">図表穴埋め<\u002Fdiv>\n        <div style=\"font-size:11px;color:#dcb2bf;margin-top:3px\">資料・グラフ問題<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:24px;background:#eef1f4;border-radius:12px;padding:14px 16px;font-size:12.5px;color:#5a6472;line-height:1.7\">濃い <span style=\"display:inline-block;background:#4a2436;color:#fff;border-radius:6px;padding:1px 8px;font-size:11px;font-weight:700\">①<\u002Fspan> をタップすると答えが出ます。各講を「覚えていた／あいまい」で自己採点すると、最後に実力判定が出ます。図表問題は、表の形を保ったまま答えが開きます。<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== HKQUIZ(保健・出題) ===== -->\n<sc-if value=\"{{ isHkquiz }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"height:100%;display:flex;flex-direction:column\">\n  <div style=\"flex-shrink:0;background:#f6f3ee;padding:14px 18px 10px;border-bottom:1px solid #ece4d6\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px\">\n      <div style=\"display:flex;align-items:center;gap:8px\">\n        <div onclick=\"{{ onHkHome }}\" style=\"display:flex;align-items:center;gap:3px;background:#fff;border:1px solid #ded3c4;border-radius:18px;padding:7px 13px 7px 10px;font-size:12.5px;font-weight:700;color:#4a2436;cursor:pointer;box-shadow:0 1px 3px rgba(20,30,45,.06)\">‹ メニュー<\u002Fdiv>\n        <sc-if value=\"{{ hkCanPrev }}\" hint-placeholder-val=\"{{ true }}\">\n          <div onclick=\"{{ onHkPrev }}\" style=\"display:flex;align-items:center;gap:3px;background:#f0ebe2;border:1px solid #e2d8c8;border-radius:18px;padding:7px 12px;font-size:12.5px;font-weight:700;color:#8a6d50;cursor:pointer\">↩ 前へ<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"font-size:12.5px;color:#5a6472;font-weight:700;white-space:nowrap\">{{ hkIdx1 }} <span style=\"color:#bcb0a0\">/ {{ hkTotalQ }}<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:9px;height:5px;background:#e6ddcf;border-radius:3px;overflow:hidden\">\n      <div style=\"height:100%;background:#c0556b;border-radius:3px;width:{{ hkProgress }}%;transition:width .35s ease\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"se-frame\" style=\"flex:1;overflow-y:auto;padding:18px 18px 26px\">\n    <div style=\"animation:seFade .3s ease both;max-width:880px;margin:0 auto\">\n      <div style=\"display:inline-block;background:#4a2436;color:#fff;font-size:11px;font-weight:700;letter-spacing:.08em;padding:4px 11px;border-radius:20px\">{{ hkQ.tag }}　{{ hkQ.name }}<\u002Fdiv>\n      <span style=\"display:inline-block;margin-left:7px;background:#c0556b;color:#fff;font-size:10px;font-weight:700;padding:4px 9px;border-radius:20px\">{{ hkModeLabel }}<\u002Fspan>\n\n      <sc-for list=\"{{ hkBlocks }}\" as=\"blk\" hint-placeholder-count=\"2\">\n        <div style=\"background:#fff;border:1px solid #ebe3d6;border-radius:16px;padding:18px 19px;margin-top:13px;box-shadow:0 3px 14px rgba(20,30,45,.05)\">\n          <sc-if value=\"{{ blk.hasLabel }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"font-weight:700;font-size:13px;color:#4a2436;margin-bottom:11px;display:flex;align-items:center;gap:7px\"><span style=\"width:4px;height:14px;background:#c0556b;border-radius:2px;display:inline-block;flex-shrink:0\"><\u002Fspan>{{ blk.label }}<\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ blk.isProse }}\" hint-placeholder-val=\"{{ true }}\">\n            <p style=\"margin:0;font-size:15px;line-height:2.1;color:#2a313a;font-weight:500;text-wrap:pretty\">\n              <sc-for list=\"{{ blk.parts }}\" as=\"p\" hint-placeholder-count=\"6\"><sc-if value=\"{{ p.isText }}\" hint-placeholder-val=\"{{ true }}\"><span>{{ p.text }}<\u002Fspan><\u002Fsc-if><sc-if value=\"{{ p.isBreak }}\" hint-placeholder-val=\"{{ false }}\"><br><\u002Fsc-if><sc-if value=\"{{ p.isRevealed }}\" hint-placeholder-val=\"{{ true }}\"><span onclick=\"{{ p.onTap }}\" style=\"display:inline-block;background:#fbecea;color:#c0556b;font-family:'Shippori Mincho',serif;font-weight:700;border-radius:7px;padding:1px 9px;margin:0 1px;cursor:pointer;animation:sePop .3s ease both;border-bottom:2px solid #e3a9b7\">{{ p.term }}<\u002Fspan><\u002Fsc-if><sc-if value=\"{{ p.isHidden }}\" hint-placeholder-val=\"{{ true }}\"><span onclick=\"{{ p.onTap }}\" style=\"display:inline-block;background:#4a2436;color:#fff;font-weight:700;border-radius:7px;padding:1px 11px;margin:0 1px;cursor:pointer;font-size:13.5px;vertical-align:1px\">{{ p.label }}<\u002Fspan><\u002Fsc-if><\u002Fsc-for>\n            <\u002Fp>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ blk.isTable }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"border:1px solid #ece4d6;border-radius:10px;overflow:hidden\">\n              <div style=\"display:grid;grid-template-columns:{{ blk.gridTemplate }}\">\n                <sc-for list=\"{{ blk.cols }}\" as=\"c\" hint-placeholder-count=\"3\">\n                  <div style=\"background:#4a2436;color:#f3d8de;font-size:11.5px;font-weight:700;padding:8px 9px;letter-spacing:.02em;line-height:1.4;overflow-wrap:break-word\">{{ c.label }}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <sc-for list=\"{{ blk.rows }}\" as=\"row\" hint-placeholder-count=\"4\">\n                <div style=\"display:grid;grid-template-columns:{{ blk.gridTemplate }};border-top:1px solid #ece4d6\">\n                  <sc-for list=\"{{ row.cells }}\" as=\"cell\" hint-placeholder-count=\"3\">\n                    <div style=\"padding:8px 9px;font-size:12.5px;line-height:1.65;color:#2a313a;overflow-wrap:break-word\">\n                      <sc-for list=\"{{ cell.parts }}\" as=\"p\" hint-placeholder-count=\"2\"><sc-if value=\"{{ p.isText }}\" hint-placeholder-val=\"{{ true }}\"><span>{{ p.text }}<\u002Fspan><\u002Fsc-if><sc-if value=\"{{ p.isBreak }}\" hint-placeholder-val=\"{{ false }}\"><br><\u002Fsc-if><sc-if value=\"{{ p.isRevealed }}\" hint-placeholder-val=\"{{ true }}\"><span onclick=\"{{ p.onTap }}\" style=\"display:inline-block;background:#fbecea;color:#c0556b;font-family:'Shippori Mincho',serif;font-weight:700;border-radius:6px;padding:0 6px;margin:0 1px;cursor:pointer;animation:sePop .3s ease both;border-bottom:2px solid #e3a9b7\">{{ p.term }}<\u002Fspan><\u002Fsc-if><sc-if value=\"{{ p.isHidden }}\" hint-placeholder-val=\"{{ true }}\"><span onclick=\"{{ p.onTap }}\" style=\"display:inline-block;background:#4a2436;color:#fff;font-weight:700;border-radius:6px;padding:0 8px;margin:0 1px;cursor:pointer;font-size:12px\">{{ p.label }}<\u002Fspan><\u002Fsc-if><\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n      <div onclick=\"{{ onHkRevealAll }}\" style=\"margin-top:13px;text-align:center;font-size:13px;font-weight:700;color:#4a2436;background:#eef1f4;border-radius:10px;padding:11px;cursor:pointer\">{{ hkRevealAllLabel }}<\u002Fdiv>\n\n      <div style=\"margin-top:13px;background:#fff;border:1px solid #ebe3d6;border-radius:14px;overflow:hidden\">\n        <div style=\"background:#c0556b;color:#fff;font-weight:700;font-size:13.5px;padding:9px 15px;letter-spacing:.05em\">答え合わせ<\u002Fdiv>\n        <sc-for list=\"{{ hkAnswerRows }}\" as=\"r\" hint-placeholder-count=\"8\">\n          <div onclick=\"{{ r.onTap }}\" style=\"display:flex;gap:11px;padding:11px 14px;border-top:1px solid #f0e9dd;background:{{ r.bg }};cursor:pointer;align-items:flex-start\">\n            <div style=\"font-family:'Shippori Mincho',serif;font-weight:700;color:#c0556b;font-size:14px;min-width:20px\">{{ r.label }}<\u002Fdiv>\n            <div style=\"flex:1\">\n              <sc-if value=\"{{ r.isRevealed }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"animation:seFade .25s ease both\">\n                  <div style=\"font-weight:700;font-size:14.5px;color:#1d2530;font-family:'Shippori Mincho',serif\">{{ r.term }}<\u002Fdiv>\n                  <div style=\"font-size:12.5px;color:#6b7382;margin-top:3px;line-height:1.6\">{{ r.desc }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ r.isHidden }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"font-size:13px;color:#b3aa99;font-weight:500\">タップして表示<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"flex-shrink:0;background:#f6f3ee;border-top:1px solid #e9e0d2;box-shadow:0 -5px 16px rgba(20,30,45,.07);padding:11px 18px 15px\">\n    <div style=\"font-size:11.5px;color:#9aa2b0;text-align:center;margin-bottom:8px\">この講、覚えていた？<\u002Fdiv>\n    <div style=\"display:flex;gap:11px;max-width:560px;margin:0 auto\">\n      <div onclick=\"{{ onHkVague }}\" style=\"flex:1;text-align:center;padding:14px;border-radius:13px;background:#fff;border:1.5px solid #e2d8c8;color:#8a6d50;font-weight:700;font-size:15px;cursor:pointer\">△ あいまい<\u002Fdiv>\n      <div onclick=\"{{ onHkGood }}\" style=\"flex:1.2;text-align:center;padding:14px;border-radius:13px;background:#4a2436;color:#fff;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 5px 14px rgba(74,36,54,.3)\">✓ 覚えていた<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== HKRESULT(保健・結果) ===== -->\n<sc-if value=\"{{ isHkresult }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"height:100%;display:flex;flex-direction:column;animation:seFade .4s ease both\">\n<div class=\"se-frame\" style=\"flex:1;min-height:0;overflow-y:auto\">\n  <div style=\"background:#4a2436;color:#fff;padding:40px 26px 34px;text-align:center\">\n    <div style=\"font-size:12px;letter-spacing:.28em;color:#dcb2bf\">RESULT · {{ hkModeLabel }}<\u002Fdiv>\n    <div style=\"margin:22px auto 0;width:150px;height:150px;border-radius:50%;border:3px solid {{ hkRank.color }};display:flex;flex-direction:column;align-items:center;justify-content:center;animation:sePop .5s ease both\">\n      <div style=\"font-family:'Shippori Mincho',serif;font-size:60px;font-weight:700;line-height:1;color:{{ hkRank.color }}\">{{ hkRank.letter }}<\u002Fdiv>\n      <div style=\"font-size:13px;color:#e2c3cd;margin-top:6px\">{{ hkPct }}% 定着<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-weight:700;font-size:18px;margin-top:18px\">{{ hkRank.label }}<\u002Fdiv>\n    <div style=\"font-size:12.5px;color:#dcb2bf;margin-top:6px;line-height:1.6\">{{ hkRank.desc }}<\u002Fdiv>\n    <div style=\"font-size:12px;color:#c9a3b0;margin-top:12px\">覚えていた {{ hkGoodCount }} 講 ／ 全 {{ hkTotal }} 講<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"padding:22px 22px 34px;max-width:640px;margin:0 auto;width:100%\">\n    <div style=\"font-size:12px;color:#9aa2b0;letter-spacing:.1em;font-weight:700;margin-bottom:12px\">講ごとの結果<\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:8px\">\n      <sc-for list=\"{{ hkLectureStats }}\" as=\"s\" hint-placeholder-count=\"10\">\n        <div onclick=\"{{ s.onJump }}\" style=\"display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #ebe3d6;border-radius:11px;padding:11px 14px;cursor:pointer\">\n          <div style=\"display:flex;align-items:center;gap:10px\">\n            <div style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:11.5px;color:#fff;background:#4a2436;border-radius:6px;padding:3px 8px\">{{ s.tag }}<\u002Fdiv>\n            <div style=\"font-size:13px;color:#2a313a;font-weight:600\">{{ s.name }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:12.5px;font-weight:700;color:{{ s.markColor }};white-space:nowrap\">{{ s.mark }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ hkHasReview }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"margin-top:26px;font-size:12px;color:#9aa2b0;letter-spacing:.1em;font-weight:700;margin-bottom:10px\">復習したい講（{{ hkReviewCount }}）<\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n        <sc-for list=\"{{ hkReviewList }}\" as=\"r\" hint-placeholder-count=\"4\">\n          <div onclick=\"{{ r.onJump }}\" style=\"background:#fbecea;color:#c0556b;border:1px solid #eecdc7;border-radius:9px;padding:8px 12px;font-size:12.5px;font-weight:700;cursor:pointer\">{{ r.tag }} {{ r.hint }}<\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"margin-top:28px;display:flex;flex-direction:column;gap:11px\">\n      <sc-if value=\"{{ hkHasReview }}\" hint-placeholder-val=\"{{ true }}\">\n        <div onclick=\"{{ onHkReviewVague }}\" style=\"background:#c0556b;color:#fff;border-radius:13px;padding:16px;text-align:center;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 5px 14px rgba(192,85,107,.25)\">あいまいな講だけ復習（{{ hkReviewCount }}講）<\u002Fdiv>\n      <\u002Fsc-if>\n      <div onclick=\"{{ onHkRetry }}\" style=\"background:#fff;border:1.5px solid #e2d8c8;border-radius:13px;padding:16px;text-align:center;font-weight:700;font-size:15px;color:#4a2436;cursor:pointer\">もう一度すべて解く<\u002Fdiv>\n      <div onclick=\"{{ onHkHome }}\" style=\"text-align:center;padding:8px;font-size:13px;color:#9aa2b0;cursor:pointer\">保健メニューに戻る<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:24px;background:#4a2436;color:#fff;border-radius:12px;padding:15px 17px;font-size:13px;line-height:1.7;text-align:center\">資料の数字や語句はセットで覚えるのが近道！<br>{{ hkOtherModeHint }}<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844}}\">\nclass Component extends DCLogic {\n  CIRC = ['','①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳'];\n  HKSTORE = 'hoken-progress-v1';\n\n  // ===== 保健（現代社会と健康）・本文穴埋め =====\n  hokenAnaume = [\n    { num:1, tag:'第01講', name:'健康の考え方と成り立ち', page:'p.4-5',\n      passage:'世界保健機関（{1}）憲章は、1946年に「健康とは、{2}、精神的、社会的に完全に良好な状態であり、たんに{3}あるいは虚弱でないことではない」と定義しました。ここでは健康を「{3}ではない状態」という{4}なとらえ方ではなく、{2}な健康はもちろん、精神的な状態や社会的な状態を含めた上で、{5}にとらえています。\\n\\nたとえば、障害や慢性的な{3}があっても、人生の{6}をもち、やりがいのある仕事や役割をみつけて、いきいきとした生活を送っていれば十分健康だと考える人もいるでしょう。このように、1人ひとりが自分なりの{6}をもち、{7}や満足感をもった{8}を送ることができる状態、すなわち{9}を重視した健康観が生まれています。WHOも1986年に「健康は生きることの目的ではなく、より良く生きるための資源である」と宣言しています。',\n      ans:[['WHO','世界保健機関(World Health Organization)'],['身体的','健康を構成する3要素の一つ'],['病気','「〜ではない状態」では不十分とされたもの'],['消極的','病気でなければよいという、後ろ向きのとらえ方'],['積極的','心身・社会の良好さを前向きにとらえる考え方'],['目標','生きがいを重視する健康観のキーワード'],['生きがい','やりがいのある仕事や役割から得られるもの'],['生活','生きがいや満足感をもって送るもの'],['生活の質','QOL。WHOが1986年に重視を宣言']] },\n    { num:2, tag:'第02講', name:'私たちの健康のすがた', page:'p.6-7',\n      passage:'ある集団の健康の程度を{1}といいます。集団の{1}を考える際には、死亡数や患者数などをもとにします。たとえば、平均寿命や{2}、受療率などで、それらは{3}と呼ばれます。\\n\\nわが国における平均寿命をみてみると、1900年代初期までは低い水準にとどまっていましたが、その後急速にのび続け、2024年には、男性{4}年、女性{5}年と世界最高水準となっています。こうした平均寿命ののびは、かつては{2}が大幅に改善されたために、近年では{6}の死亡率が改善されたために達成されました。\\n\\n{1}が向上してきた背景には、{7}の発展があります。社会が豊かになることで、人々の{8}や衛生状態が改善されました。それにより、病気に対する抵抗力が増したり、生活が衛生的になったりして、{9}による死亡率が大幅に低下しました。また科学技術の発展にともなう{10}の充実も、死亡率全体の低下に貢献しています。',\n      ans:[['健康水準','集団の健康の程度を表す言葉'],['乳児死亡率','健康水準の指標の一つ'],['健康指標','平均寿命・乳児死亡率・受療率などの総称'],['81.09','2024年の男性の平均寿命(年)'],['87.13','2024年の女性の平均寿命(年)'],['高齢者','近年、死亡率改善の中心となった層'],['経済','健康水準向上の背景にある発展'],['栄養状態','社会が豊かになって改善されたもの'],['感染症','衛生状態の改善で死亡率が低下した病気'],['保健・医療サービス','科学技術の発展にともない充実したもの']] },\n    { num:3, tag:'第03講', name:'生活習慣病の予防と回復', page:'p.10-11',\n      passage:'心臓病、脳卒中などの病気の発病や進行には、運動不足、不適切な{1}、喫煙といった若いころからの生活習慣の積み重ねが関係していることが明らかになっています。このように運動習慣、{1}、休養、飲酒などの生活習慣が、その発病・進行に関連する病気のことを{2}といいます。\\n\\nかつて{2}は「{6}」と呼ばれていました。そのときには、病気を早期発見・早期治療するという対策に重点が置かれていました。しかし、生活習慣を改善すれば発病そのものを予防できるという考えから、健康増進をはかる対策を進めることを意図して、{2}と呼ばれるようになっています。\\n\\n{2}には、心臓病、脳卒中、{3}などがあります。そのうち、心臓病、脳卒中、脂質異常症、{3}、高血圧症などは、運動習慣や{1}と関係があります。また、{4}は{1}やブラッシング、喫煙などと関係があります。\\n\\n{2}は、{5}に多くみられます。しかし、病気とはいえないまでも、{2}につながる体のなかの変化は、若いころから始まっています。',\n      ans:[['食習慣','運動習慣・休養・飲酒と並ぶ生活習慣の一つ'],['生活習慣病','発病・進行に生活習慣が関係する病気の総称'],['糖尿病','心臓病・脳卒中と並ぶ生活習慣病の代表例'],['歯周病','食習慣やブラッシング・喫煙と関係する病気'],['中高年','生活習慣病が多くみられる年代'],['成人病','生活習慣病のかつての呼び名']] },\n    { num:4, tag:'第04講', name:'がんの原因と予防', page:'p.12-13',\n      passage:'私たちの体には約37兆個の細胞があり、それぞれの細胞には新しい細胞をつくるための遺伝子が入っています。通常、遺伝子は正確に複製されて細胞が生まれ変わります。その際、遺伝子が傷つけられたり、複製ミスを繰り返したりすることで、異常な細胞が生み出され、その細胞が無秩序に増殖し、体の働きを妨げることがあります。これががんという病気であり、現在、日本における死因の第{4}位となっています。\\n\\nがんには、肺がん、大腸がん、胃がん、乳がんなどさまざまな種類があります。\\n\\nがんは、{1}、飲酒、野菜不足や過食、{2}などの生活習慣、細菌・ウイルスによる{3}などさまざまな原因によって起こります。しかし、{5}では生活習慣や細菌・ウイルスと関係ないものがほとんどであり、がんの原因のすべてがわかっているわけではありません。',\n      ans:[['喫煙','がんを起こす生活習慣の一つ'],['運動不足','飲酒・野菜不足や過食と並ぶ生活習慣の要因'],['感染','細菌・ウイルスによってがんが起こる原因'],['1(位)','日本における死因の順位'],['小児がん','生活習慣や細菌・ウイルスと関係が薄いがん']] },\n    { num:5, tag:'第05講', name:'がんの治療と回復', page:'p.14-15',\n      passage:'がんのおもな治療には、{1}、化学療法({2}など)、放射線療法があります。これらの治療法をがんの{3}や症状などにあわせて、単独であるいは複数を組みあわせておこなう{4}が推奨されています。\\n\\n患者が、医師から十分な{5}を受け、自分の病気・検査結果・治療法などについて理解した上で、どのような方法を用いるかを{6}することが重要です。治療法の選択については、医師によって異なることもあるため別の医師に{7}を求めることもできます。\\n\\nがん治療においては、患者やその家族1人ひとりの体や心などのさまざまなつらさをやわらげ、より豊かな人生を送ることができるように支えていく{8}が大切です。緩和ケアは、がんと診断されたときから治療と並行しておこなわれます。がんが治らないときでも、痛みやつらさをやわらげるための医療が末期までおこなわれます。\\n\\nがん治療の場合、体の痛みだけではなく、がんになったことへのショック、将来への不安、治療費用の負担などの問題が起こることが多く、さまざまな支援が必要です。痛みをとるための医療のほかに、生活や医療費について公的援助の紹介をするなど、それぞれの分野の{9}がチームを組んで支援にあたることで、患者とその家族の{10}を高めます。',\n      ans:[['手術療法','化学療法・放射線療法と並ぶがん治療の一つ'],['抗がん剤','化学療法で使われる医薬品'],['種類','治療法を選ぶ基準となる、がんの分類'],['標準治療','複数の治療法を組み合わせておこなう、推奨される治療'],['説明','治療法を理解するために医師から受けるもの'],['選択','治療法を理解した上でおこなうこと'],['意見','別の医師に求めることができるもの(セカンドオピニオン)'],['緩和ケア','体や心のつらさをやわらげ支える取り組み'],['専門家','生活や医療費の支援にあたる、各分野の人材'],['生活の質','患者と家族の支援によって高まるもの']] },\n    { num:6, tag:'第06講', name:'運動と健康', page:'p.18-19',\n      passage:'運動は、{1}の維持・向上に役立つだけではありません。{2}などの予防、{3}の促進、老化の防止によい影響を及ぼすなど、こんにちの生活になくてはならない重要な意義をもっています。運動は、{4}として楽しみながら、家族や仲間との交流をはかることができ、さらに、{5}の解消など、心の健康にも効果的な側面をもっています。\\n\\n現代社会では、家事や仕事の省力化や交通手段の発達によって身体活動量が低下しています。また、運動をする子どもとそうでない子どもの二極化や若い世代の運動不足が指摘されています。その結果、さまざまな健康問題が深刻化しています。\\n\\n健康のための運動には、適切な運動量が必要です。運動量が少ない場合、たとえば{6}になる可能性が高まるなど、体にさまざまな影響が出てきます。ただし、過度な運動もよくありません。{7}をしたり、身体的な{8}を負ったりすることもあるからです。女性アスリートに生じやすい健康影響も課題となっています。',\n      ans:[['体力','運動によって維持・向上するもの'],['生活習慣病','運動によって予防される病気'],['発育・発達','運動によって促進されるもの'],['スポーツ','楽しみながら交流をはかれる運動の形'],['ストレス','運動によって解消される心の負担'],['心臓病','運動量が少ない場合になる可能性が高まる病気'],['けが','過度な運動でしてしまうことがあるもの'],['障害','過度な運動で負ってしまうことがあるもの']] },\n    { num:7, tag:'第07講', name:'食事と健康', page:'p.20-21',\n      passage:'私たちが成長し、健康に生きていくためにはさまざまな{1}が必要であり、私たちは、それらを毎日の食事からとり入れています。各{1}の必要量は、性別や年齢、体の大きさ、{2}などによって異なります。とくに活動量が多く、体に変化がみられる高校生は、日々の生活のなかで食事の質と量に留意する必要があります。\\n\\nまた、食事は人と人との大切な{3}の場にもなり、食事を楽しむことにより心豊かな生活を送ることもできます。このように食事は{4}の健康にとって重要な意義をもっています。\\n\\n健康によい食生活を実現するためには栄養のバランスを考えることが重要です。たとえば、数多くの食材を組みあわせることで{7}を摂取することができ、それがバランスのよい食事につながります。とくに{9}の欠食は午前中の活力を低下させるだけでなく、1日の活動に必要な栄養素を偏りなくとり入れることも難しくするなど、健康にとってさまざまな影響があります。\\n\\nまた、栄養素を補うためにいわゆる{5}を摂取する人もいますが、本来、食事からの栄養摂取や食生活の改善が基本です。{5}の摂取にあたっては、機能性や{6}など公開されている情報を十分に確認する必要があります。\\n\\n生活リズムは、食事、運動、睡眠、排便などを{8}におこなうことで整えられます。とくに、朝、昼、夜の食事を規則的にとることで、生活のリズムがつくられます。\\n\\n健康的な食生活には三食のバランスだけでなく、食材の選択、調理方法、{12}など、さまざまな要因がかかわってきます。また、生活リズムの観点から、{10}や{11}との関連を考えることも忘れてはいけません。',\n      ans:[['栄養素','成長し健康に生きていくために必要なもの'],['身体活動量','栄養素の必要量を左右する要素の一つ'],['コミュニケーション','食事が人と人との間に生む、大切な場'],['心身両面','食事が重要な意義をもつ、健康の側面'],['サプリメント','栄養素を補うために摂取する人もいるもの'],['目安量','サプリメント摂取時に確認すべき公開情報'],['多様な栄養素','数多くの食材を組み合わせて摂取できるもの'],['規則的','食事・運動・睡眠・排便などをおこなう望ましい仕方'],['朝食','欠食すると午前中の活力を低下させる食事'],['運動','生活リズムの観点から関連を考えるべきものの一つ'],['睡眠','生活リズムの観点から関連を考えるべきものの一つ'],['誰と食べたか','食材の選択・調理方法と並ぶ食生活の要因']] },\n    { num:8, tag:'第08講', name:'休養・睡眠と健康', page:'p.22-23',\n      passage:'運動や勉強、仕事などで体や脳が疲れると、{2}の働きが弱まったり、{3}が鈍って事故を招いたりするなどして、健康を損ねることにもなります。疲労はまた、{4}を不安定にし、{5}を低下させるなど、{6}に大きく影響します。したがって、適度な{1}によって疲労を取り除くことが重要です。\\n\\n省力化が進んだ現代の生活では、パソコン使用にみられるように、目や指先など、体の一部分を使う活動が多くなっています。こうした活動を続けると、目や手など体の一部分だけの疲労(局所疲労)や精神的な疲労が起こります。それらは全身疲労に比べて休養の必要性が自覚されにくく、知らない間に疲労を蓄積させることになります。疲労が蓄積した場合でも、適切に休養をとれば疲労は回復し、活力がよみがえります。\\n\\n休養のとり方はさまざまです。作業の途中で休息や休憩をとることによって、こまめに疲労を回復することが有効です。また、たんに体を休めるだけではなく、スポーツなどで積極的に体を動かすことや趣味を楽しんだりすることによる{7}も効果的です。{7}は、体の疲労を回復するとともに、ストレスの解消にもつながります。\\n\\n{8}は、体や脳の疲労を回復したり、発育・発達を促したりする重要な役割を担っているだけでなく、健康の保持増進にも重要な働きをしています。',\n      ans:[['休養','疲労を取り除くために必要な、適度なもの'],['免疫','疲れると働きが弱まるもの'],['判断力','疲れると鈍り、事故を招くことがあるもの'],['情緒','疲労によって不安定になるもの'],['活力','疲労によって低下するもの'],['生活の質','疲労が大きく影響をおよぼすもの'],['積極的休養','スポーツや趣味で積極的に体を動かす休養法'],['睡眠','疲労回復や発育・発達を促す重要な役割をもつもの']] },\n    { num:9, tag:'第09講', name:'喫煙と健康', page:'p.26-27',\n      passage:'たばこの煙には多くの{1}が含まれるため、喫煙は心身の健康にさまざまな悪影響を及ぼします。たとえば、運動時に{2}する、肌の{3}を早めるという影響は、吸い始めて間もなくあらわれます(急性影響)。さらに喫煙を続けると、がんや心臓病、COPDなどの{4}を発病しやすくなります(慢性影響)。これらの害は、喫煙開始時期が早いほど大きくなります。それは、発育途上にある体の諸器官が有害物質の影響を受けやすいためです。\\n\\nまた、喫煙者以外の人が健康被害を受ける{5}の害も深刻です。たとえば夫が喫煙者の場合、非喫煙者である妻の{6}死亡率も高くなります。また妊婦の喫煙によって、早産や{7}などの可能性が高まります。さらに喫煙による病気や死亡のために医療費が増大したり、貴重な労働力が失われたりするなど、社会全体に大きな損失をもたらします。',\n      ans:[['有害物質','たばこの煙に多く含まれるもの'],['息切れ','喫煙の急性影響の一つ(運動時に起こる)'],['老化','喫煙によって早まる、肌の変化'],['生活習慣病','喫煙の慢性影響として発病しやすくなるもの'],['受動喫煙','喫煙者以外が健康被害を受けること'],['肺がん','受動喫煙によって死亡率が高くなる、非喫煙者の妻に多い病気'],['流産','妊婦の喫煙によって可能性が高まるものの一つ']] },\n    { num:10, tag:'第10講', name:'飲酒と健康', page:'p.28-29',\n      passage:'{1}には、脳の働きを抑制する作用があります。少量であれば、食欲が増す、リラックスするなどの効用もありますが、量が増えると{2}や体の動きが鈍くなり、転倒・転落や「イッキ飲み」にともなう{3}による死亡など、さまざまな問題を起こします。また、妊婦の飲酒は、アルコールが胎児の発育に悪影響を及ぼし、{4}や脳の障害などを引き起こす可能性があります。\\n\\n長期にわたって大量に飲酒すると、高血圧症、糖尿病、食道がん、アルコール性肝炎、肝硬変、肝臓がん、胃潰瘍、脳の萎縮などが起こりやすくなります。また、{6}になることもあります。\\n\\n飲酒は、健康影響だけでなく、さまざまな社会問題をもたらします。自制心が弱くなることで、{5}など倫理的な問題を起こしたり、{6}になると、家庭生活や仕事で問題を起こしたりします。また、自殺に結びつくこともあります。{7}は、交通事故を引き起こし、他人にも大きな被害をもたらすことがあります。',\n      ans:[['アルコール','脳の働きを抑制する作用をもつもの'],['判断力','飲酒量が増えると鈍くなるもの'],['急性アルコール中毒','「イッキ飲み」にともなう、死亡につながる危険な状態'],['低体重','妊婦の飲酒によって引き起こされる可能性があるもの'],['暴力','自制心が弱くなることで起こる倫理的な問題'],['アルコール依存症','家庭生活や仕事に問題を起こす状態'],['飲酒運転','交通事故を引き起こし他人にも被害をもたらすもの']] }\n  ];\n\n  // ===== 保健（現代社会と健康）・図表（資料）穴埋め =====\n  hokenZuhyou = [\n    { num:1, tag:'第01講', name:'健康の考え方と成り立ち',\n      blocks:[\n        { kind:'prose', label:'資料1　健康のさまざまなとらえ方', body:'3つの側面は互いに{1}している。そのため1つの側面に区分できない要素もある。' },\n        { kind:'table', label:'', widths:[1,2.3], cols:['側面','内容'], rows:[\n          ['{2}的側面','精神の状態、知的能力、満足感 など kIdx:0, hkReveal:{}, _hkResumeMode:'anaume', _hkResumeIdx:0, _hkHasProg:false };\n\n  _frameEl(){ try{ return document.querySelector('.se-frame'); }catch(e){ return null; } }\n\n  // ===== 保健(現代社会と健康) =====\n  hkDataFor(mode){ return mode==='zuhyou' ? this.hokenZuhyou : this.hokenAnaume; }\n  hkData(){ return this.hkDataFor(this.state.hkMode); }\n  hkRkeyFor(mode, num){ return 'hk'+(mode==='zuhyou'?'Z':'A')+':'+num; }\n  hkRkey(num){ return this.hkRkeyFor(this.state.hkMode, num); }\n  hkStart(mode, fromIdx){\n    const list=this.hkDataFor(mode).map(q=>q.num);\n    this.setState({ screen:'hkquiz', hkMode:mode, hkOrder:list, hkIdx:fromIdx||0, hkReveal:{} }, ()=>{ this.hkPersist(); const f=this._frameEl(); if(f)f.scrollTop=0; });\n  }\n  hkCurNum(){ return this.state.hkOrder[this.state.hkIdx]; }\n  hkByNum(num){ return this.hkData().find(q=>q.num===num); }\n  hkTapBlank(n){ const num=this.hkCurNum(); const r={...this.state.hkReveal}; const set={...(r[num]||{})}; set[n]=true; r[num]=set; this.setState({hkReveal:r}); }\n  hkRevealAll(){\n    const num=this.hkCurNum(); const q=this.hkByNum(num); const r={...this.state.hkReveal}; const set={...(r[num]||{})};\n    const allOn=q.ans.every((a,i)=>set[i+1]);\n    q.ans.forEach((a,i)=>{ set[i+1]=!allOn; }); r[num]=set; this.setState({hkReveal:r});\n  }\n  hkGrade(kind){\n    const num=this.hkCurNum(); const res={...this.state.results}; res[this.hkRkey(num)]=kind;\n    const last=this.state.hkIdx>=this.state.hkOrder.length-1;\n    if(last){ this.setState({results:res, screen:'hkresult'}, ()=>this.hkPersist()); }\n    else { this.setState({results:res, hkIdx:this.state.hkIdx+1, hkReveal:{...this.state.hkReveal}}, ()=>{ this.hkPersist(); const f=this._frameEl(); if(f)f.scrollTop=0; }); }\n  }\n  hkPrev(){ if(this.state.hkIdx>0) this.setState({hkIdx:this.state.hkIdx-1}, ()=>{ this.hkPersist(); const f=this._frameEl(); if(f)f.scrollTop=0; }); }\n  hkJumpTo(mode, num){ const list=this.hkDataFor(mode).map(q=>q.num); const i=list.indexOf(num); this.setState({screen:'hkquiz', hkMode:mode, hkOrder:list, hkIdx:i<0?0:i, hkReveal:{}}, ()=>this.hkPersist()); }\n  hkReviewVague(){ const mode=this.state.hkMode; const nums=this.hkData().map(q=>q.num).filter(n=>this.state.results[this.hkRkeyFor(mode,n)]==='vague'); if(!nums.length) return; this.setState({ screen:'hkquiz', hkOrder:nums, hkIdx:0, hkReveal:{} }); }\n  hkGoHome(){ this.setState({ screen:'hkhome' }); this.hkPersist(); }\n  hkPersist(){ try{ localStorage.setItem(this.HKSTORE, JSON.stringify({ mode:this.state.hkMode, idx:this.state.hkIdx })); }catch(e){} }\n  _hkParts(q, text, revealSet){\n    const out=[];\n    const segs=(text||'').split(/\\{(\\d+)\\}/);\n    segs.forEach((seg,i)=>{\n      if(i%2===0){\n        if(!seg) return;\n        // データ内の改行は明示的な改行パーツにする(pre-lineに頼らない)\n        seg.split('\\n').forEach((ln,li)=>{\n          if(li>0) out.push({isText:false, isBreak:true, isRevealed:false, isHidden:false});\n          if(ln) out.push({isText:true, isBreak:false, text:ln, isRevealed:false, isHidden:false});\n        });\n      }else{\n        const n=parseInt(seg,10); const a=(q.ans[n-1])||['',''];\n        const rev=!!revealSet[n];\n        out.push({isText:false, isBreak:false, isRevealed:rev, isHidden:!rev, label:this.CIRC[n], term:a[0], onTap:()=>this.hkTapBlank(n)});\n      }\n    });\n    return out;\n  }\n\n  rankFor(pct){\n    if(pct>=90) return {letter:'S',label:'実力者・合格圏',desc:'ほぼ完璧。この調子で語句の意味も固めよう。',color:'#e8c170'};\n    if(pct>=75) return {letter:'A',label:'あと一歩',desc:'土台は十分。あいまいな数問を潰せば安定する。',color:'#7fb88f'};\n    if(pct>=55) return {letter:'B',label:'基礎は固まりつつある',desc:'主要語は押さえている。反復で取りこぼしを減らそう。',color:'#6fa3c4'};\n    if(pct>=35) return {letter:'C',label:'まずは反復を',desc:'文章ごと音読して、用語と意味をセットで覚えよう。',color:'#d99a6c'};\n    return {letter:'D',label:'ここから伸ばそう',desc:'焦らず1節ずつ。まず文章を丸ごと覚えるのが近道。',color:'#cf7e72'};\n  }\n\n  componentDidMount(){\n    try{\n      const raw2 = localStorage.getItem(this.HKSTORE);\n      if(raw2){ const s2 = JSON.parse(raw2); this.setState({ _hkResumeMode:s2.mode||'anaume', _hkResumeIdx:s2.idx||0, _hkHasProg:!!(s2.mode&&typeof s2.idx==='number') }); }\n    }catch(e){}\n    this._onResize=()=>this.forceUpdate();\n    window.addEventListener('resize', this._onResize);\n    const done=()=>this.setState({loaded:true});\n    let fired=false; const go=()=>{ if(fired)return; fired=true; done(); };\n    try{ if(document.fonts&&document.fonts.ready){ document.fonts.ready.then(()=>setTimeout(go,450)); } }catch(e){}\n    setTimeout(go, 2600);\n  }\n  componentWillUnmount(){ if(this._onResize) window.removeEventListener('resize', this._onResize); }\n\n  viewport(){\n    const vw=(typeof window!=='undefined'?window.innerWidth:430);\n    const vh=(typeof window!=='undefined'?window.innerHeight:820);\n    // PC(横長・広い画面)で保健の図表問題を開いているときは、表を見やすい広い枠にする\n    const wide = this.state.screen==='hkquiz' && this.state.hkMode==='zuhyou' && vw>=1024 && vw>vh;\n    const baseW = wide ? 880 : 430;\n    let scale=Math.min(vw/(baseW+12), vh/600);\n    if(scale>2.4) scale=2.4;\n    if(scale<0.55) scale=0.55;\n    const frameH=Math.round(vh/scale);\n    return { frameScale:Math.round(scale*1000)/1000, frameH, frameW:baseW };\n  }\n\n  renderVals(){\n    const st=this.state;\n    const screen=st.screen;\n    const vp=this.viewport();\n\n    const hkModeLabel = st.hkMode==='zuhyou' ? '図表穴埋め' : '本文穴埋め';\n    let hkQ={tag:'',name:'',num:''}, hkBlocks=[], hkAnswerRows=[], hkIdx1=1, hkTotalQ=0, hkProgress=0, hkRevealAllLabel='答えをすべて見る';\n    if(screen==='hkquiz' && st.hkOrder.length){\n      const num=this.hkCurNum(); const qq=this.hkByNum(num);\n      const set=st.hkReveal[num]||{};\n      const allOn=qq.ans.every((a,i)=>set[i+1]);\n      hkQ={ tag:qq.tag, name:qq.name, num:qq.num };\n      const rawBlocks = st.hkMode==='zuhyou' ? qq.blocks : [{kind:'prose', body:qq.passage}];\n      hkBlocks = rawBlocks.map(blk=>{\n        if(blk.kind==='table'){\n          const sum=blk.widths.reduce((a,b)=>a+b,0);\n          const pcts=blk.widths.map(w=>Math.round(w/sum*10000)/100);\n          const gridTemplate=pcts.map(p=>p+'%').join(' ');\n          const cols=blk.cols.map(c=>({label:c}));\n          const rows=blk.rows.map(row=>({cells:row.map(cellText=>({parts:this._hkParts(qq,cellText,set)}))}));\n          return { isProse:false, isTable:true, hasLabel:!!blk.label, label:blk.label||'', gridTemplate, cols, rows };\n        }\n        return { isProse:true, isTable:false, hasLabel:!!blk.label, label:blk.label||'', parts:this._hkParts(qq, blk.body, set) };\n      });\n      hkAnswerRows = qq.ans.map((a,i)=>{ const rev=!!set[i+1]; return { label:this.CIRC[i+1], term:a[0], desc:a[1], isRevealed:rev, isHidden:!rev, bg: rev?'#fdf6f4':'#fff', onTap:()=>this.hkTapBlank(i+1) }; });\n      hkIdx1=st.hkIdx+1; hkTotalQ=st.hkOrder.length; hkProgress=Math.round((st.hkIdx/st.hkOrder.length)*100);\n      hkRevealAllLabel= allOn?'答えを隠す':'答えをすべて見る';\n    }\n    const hkFlat=this.hkData();\n    const hkTotal=hkFlat.length;\n    const hkGoodCount=hkFlat.filter(qi=>st.results[this.hkRkeyFor(st.hkMode,qi.num)]==='good').length;\n    const hkPct= hkTotal? Math.round(hkGoodCount/hkTotal*100):0;\n    const hkRank=this.rankFor(hkPct);\n    const hkLectureStats=hkFlat.map(qi=>{\n      const got=st.results[this.hkRkeyFor(st.hkMode,qi.num)];\n      const isGood=got==='good', isVague=got==='vague';\n      return { tag:qi.tag, name:qi.name, mark: isGood?'✓ 覚えていた':isVague?'△ あいまい':'ー 未回答', markColor: isGood?'#3f8f63':isVague?'#b5762e':'#b3aa99', onJump:()=>this.hkJumpTo(st.hkMode,qi.num) };\n    });\n    const hkReviewItems=hkFlat.filter(qi=>st.results[this.hkRkeyFor(st.hkMode,qi.num)]==='vague');\n    const hkReviewList=hkReviewItems.map(qi=>({ tag:qi.tag, hint:qi.name.slice(0,10), onJump:()=>this.hkJumpTo(st.hkMode,qi.num) }));\n    const hkOtherModeHint = st.hkMode==='zuhyou' ? '次は本文穴埋めにも挑戦しよう。' : '次は図表穴埋めにも挑戦しよう。';\n    const hkResumeModeLabel = st._hkResumeMode==='zuhyou' ? '図表穴埋め' : '本文穴埋め';\n    const hkResumeData = this.hkDataFor(st._hkResumeMode);\n    const hkResumeItem = hkResumeData[st._hkResumeIdx] || hkResumeData[0];\n    const hkResumeLabel = hkResumeModeLabel+' '+hkResumeItem.tag;\n\n    return {\n      frameScale:vp.frameScale, frameH:vp.frameH, frameW:vp.frameW,\n      isLoading:!st.loaded,\n      isHkhome:screen==='hkhome', isHkquiz:screen==='hkquiz', isHkresult:screen==='hkresult',\n      onHkHome:()=>this.hkGoHome(), onHkStartAnaume:()=>this.hkStart('anaume',0), onHkStartZuhyou:()=>this.hkStart('zuhyou',0),\n      hkHasProgress:!!st._hkHasProg, hkResumeLabel,\n      onHkContinue:()=>this.hkStart(st._hkResumeMode||'anaume', st._hkResumeIdx||0),\n      hkModeLabel, hkQ, hkBlocks, hkAnswerRows, hkIdx1, hkTotalQ, hkProgress, hkRevealAllLabel,\n      onHkRevealAll:()=>this.hkRevealAll(), onHkGood:()=>this.hkGrade('good'), onHkVague:()=>this.hkGrade('vague'),\n      hkCanPrev: st.hkIdx>0, onHkPrev:()=>this.hkPrev(),\n      hkRank, hkPct, hkGoodCount, hkTotal, hkLectureStats,\n      hkHasReview: hkReviewList.length>0, hkReviewCount: hkReviewList.length, hkReviewList,\n      onHkReviewVague:()=>this.hkReviewVague(), hkOtherModeHint,\n      onHkRetry:()=>{ const r={...st.results}; hkFlat.forEach(qi=>{ delete r[this.hkRkeyFor(st.hkMode,qi.num)]; }); this.setState({results:r},()=>this.hkStart(st.hkMode,0)); }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
