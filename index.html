document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

er-count=\"4\">\n          <div onclick=\"{{ r.onTap }}\" style=\"display:flex;gap:11px;padding:11px 14px;border-top:1px solid #f0e9dd;background:{{ r.bg }};cursor:pointer;align-items:flex-start\">\n            <div style=\"font-family:'Shippori Mincho',serif;font-weight:700;color:#c0392b;font-size:14px;min-width:18px\">{{ r.label }}<\u002Fdiv>\n            <div style=\"flex:1\">\n              <sc-if value=\"{{ r.isRevealed }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"animation:seFade .25s ease both\">\n                  <div style=\"font-weight:700;font-size:14.5px;color:#1d2530;font-family:'Shippori Mincho',serif\">{{ r.term }}<\u002Fdiv>\n                  <div style=\"font-size:12.5px;color:#6b7382;margin-top:3px;line-height:1.6\">{{ r.desc }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ r.isHidden }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"font-size:13px;color:#b3aa99;font-weight:500\">タップして表示<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <sc-if value=\"{{ q.noteVisible }}\" hint-placeholder-val=\"ヒント\">\n          <div style=\"border-top:1px solid #f0e9dd;background:#fdf8f2;padding:11px 14px;font-size:12px;color:#7c8593;line-height:1.65;display:flex;gap:7px\">\n            <span style=\"color:#c0392b;font-weight:700;flex-shrink:0\">補足<\u002Fspan><span>{{ q.note }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"flex-shrink:0;background:#f6f3ee;border-top:1px solid #e9e0d2;box-shadow:0 -5px 16px rgba(20,30,45,.07);padding:11px 18px 15px\">\n    <div style=\"font-size:11.5px;color:#9aa2b0;text-align:center;margin-bottom:8px\">この問題、覚えていた？<\u002Fdiv>\n    <div style=\"display:flex;gap:11px\">\n      <div onclick=\"{{ onVague }}\" style=\"flex:1;text-align:center;padding:14px;border-radius:13px;backgro 5\">\n        <div>\n          <div style=\"display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px\">\n            <span style=\"font-weight:700;color:#2a313a\">{{ s.tag }} {{ s.name }}<\u002Fspan>\n            <span style=\"color:#8a93a2\">{{ s.good }}/{{ s.total }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"height:8px;background:#e6ddcf;border-radius:4px;overflow:hidden\">\n            <div style=\"height:100%;border-radius:4px;background:{{ s.color }};width:{{ s.pct }}%;animation:seGrow .7s ease both\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ hasReview }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"margin-top:26px;font-size:12px;color:#9aa2b0;letter-spacing:.1em;font-weight:700;margin-bottom:10px\">復習したい問題（{{ reviewCount }}）<\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n        <sc-for list=\"{{ reviewList }}\" as=\"r\" hint-placeholder-count=\"4\">\n          <div onclick=\"{{ r.onJump }}\" style=\"background:#fbecea;color:#c0392b;border:1px solid #eecdc7;border-radius:9px;padding:8px 12px;font-size:12.5px;font-weight:700;cursor:pointer\">問{{ r.num }} {{ r.hint }}<\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"margin-top:28px;display:flex;flex-direction:column;gap:11px\">\n      <sc-if value=\"{{ hasReview }}\" hint-placeholder-val=\"{{ true }}\">\n        <div onclick=\"{{ onReviewVague }}\" style=\"background:#c0392b;color:#fff;border-radius:13px;padding:16px;text-align:center;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 5px 14px rgba(192,57,43,.25)\">あいまいな問題だけ復習（{{ reviewCount }}問）<\u002Fdiv>\n      <\u002Fsc-if>\n      <div onclick=\"{{ onRetry }}\" style=\"background:#fff;border:1.5px solid #e2d8c8;border-radius:13px;padding:16px;text-align:center;font-weight:700;font-size:15px;color:#14293f;cursor:pointer\">もう一度すべて解く<\u002Fdiv>\n      <div onclick=\"{{ onHome }}\" style=\"text-align:center;padding:8px;font-size:13px;color:#9aa2b0;cursor:pointer\">ホームに戻る<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:24px;background:#14293f;color:#fff;border-radius:12px;padding:15px 17px;font-size:13px;line-height:1.7;text-align:center\">まずは文章ごと覚えるのが近道！<br>次は語句の意味チェックで仕上げよう。<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== GOKU (語句確認・赤シート) ===== -->\n<sc-if value=\"{{ isGoku }}\" hint-placeholder-val=\"{{ true }}\">\n<div>\n  <div style=\"position:sticky;top:0;z-index:5;background:#14293f;color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between\">\n    <div onclick=\"{{ onHome }}\" style=\"display:flex;align-items:center;gap:3px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:7px 13px 7px 10px;font-size:12.5px;font-weight:700;color:#fff;cursor:pointer\">‹ メニュー<\u002Fdiv>\n    <div style=\"font-weight:700;font-size:14px\">語句確認 <span style=\"color:#8298b0;font-size:12px\">一問一答<\u002Fspan><\u002Fdiv>\n    <div onclick=\"{{ onToggleSheet }}\" style=\"font-size:11.5px;font-weight:700;cursor:pointer;padding:6px 12px;border-radius:20px;background:{{ sheetTabBg }};color:{{ sheetTabFg }};border:1px solid #355\">{{ sheetLabel }}<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"padding:6px 16px 60px;animation:seFade .35s ease both\">\n    <div style=\"font-size:12px;color:#9aa2b0;text-align:center;padding:12px 0 4px\">説明を読んで語句を答えよう（全{{ gokuCount }}語）。<br>赤い部分をタップすると個別に確認できます。<\u002Fdiv>\n    <sc-for list=\"{{ gokuSections }}\" as=\"s\" hint-placeholder-count=\"5\">\n      <div style=\"margin-top:16px\">\n        <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:9px\">\n          <div style=\"font-family:'Shippori Mincho',serif;font-weight:700;color:#fff;background:#c0392b;width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px\">{{ s.tag }}<\u002Fdiv>\n          <div style=\"font-weight:700;font-size:14.5px;color:#1d2530\">{{ s.name }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #ebe3d6;border-radius:13px;overflow:hidden\">\n          <sc-for list=\"{{ s.rows }}\" as=\"r\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex;align-items:stretch;border-top:1px solid #f0e9dd\">\n              <div style=\"flex:1.3;padding:11px 13px;font-size:13px;line-height:1.55;color:#34404d;display:flex;align-items:center\">{{ r.q }}<\u002Fdiv>\n              <div onclick=\"{{ r.onTap }}\" style=\"flex:1;min-width:118px;border-left:1px solid #f0e9dd;display:flex;align-items:center;cursor:pointer\">\n                <sc-if value=\"{{ r.isShown }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"padding:11px 13px;font-family:'Shippori Mincho',serif;font-weight:700;color:#c0392b;font-size:13.5px;line-height:1.4;animation:seFade .2s ease both\">{{ r.a }}<\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ r.isCovered }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"margin:7px 9px;padding:9px 13px;background:#e23b2e;border-radius:6px;width:100%;text-align:center;color:#e23b2e;font-size:12px;user-select:none\">タップ<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n    <div style=\"margin-top:22px;background:#14293f;color:#fff;border-radius:12px;padding:15px 17px;font-size:13px;line-height:1.7;text-align:center\">一問一答で語句を固めれば、<br>穴埋めも記述もぐっと楽になる！<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== OUYOU (応用問題) ===== -->\n<sc-if value=\"{{ isOuyou }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"height:100%;display:flex;flex-direction:column\">\n  <div style=\"flex-shrink:0;background:#f6f3ee;padding:14px 18px 10px;border-bottom:1px solid #ece4d6\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px\">\n      <div style=\"display:flex;align-items:center;gap:8px\">\n        <div onclick=\"{{ onHome }}\" style=\"display:flex;align-items:center;gap:3px;background:#fff;border:1px solid #ded3c4;border-radius:18px;padding:7px 13px 7px 10px;font-size:12.5px;font-weight:700;color:#14293f;cursor:pointer;box-shadow:0 1px 3px rgba(20,30,45,.06)\">‹ メニュー<\u002Fdiv>\n        <sc-if value=\"{{ oCanPrev }}\" hint-placeholder-val=\"{{ true }}\">\n          <div onclick=\"{{ onOPrev }}\" style=\"display:flex;align-items:center;gap:3px;background:#f0ebe2;border:1px solid #e2d8c8;border-radius:18px;padding:7px 12px;font-size:12.5px;font-weight:700;color:#8a6d50;cursor:pointer\">↩ 前へ<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"font-size:12.5px;color:#5a6472;font-weight:700;white-space:nowrap\">問 {{ oIdx1 }} <span style=\"color:#bcb0a0\">/ {{ oTotal }}<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:9px;height:5px;background:#e6ddcf;border-radius:3px;overflow:hidden\">\n      <div style=\"height:100%;background:#14293f;border-radius:3px;width:{{ oProgress }}%;transition:width .35s ease\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"se-frame\" style=\"flex:1;overflow-y:auto;padding:18px 18px 26px\">\n    <div style=\"animation:seFade .3s ease both\">\n      <div style=\"display:inline-block;background:#14293f;color:#fff;font-size:11px;font-weight:700;letter-spacing:.08em;padding:4px 11px;border-radius:20px\">{{ oCard.part }}　{{ oCard.pt }}<\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #ebe3d6;border-radius:16px;padding:20px 19px;margin-top:13px;box-shadow:0 3px 14px rgba(20,30,45,.05)\">\n        <div style=\"display:flex;align-items:baseline;gap:9px;margin-bottom:11px\">\n          <span style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:20px;color:#14293f\">問{{ oCard.num }}<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:0;font-size:15.5px;line-height:2;color:#2a313a;font-weight:500;white-space:pre-line;text-wrap:pretty\">{{ oCard.prompt }}<\u002Fp>\n        <sc-if value=\"{{ oCard.hasChoices }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"margin-top:14px;display:flex;flex-direction:column;gap:8px\">\n            <sc-for list=\"{{ oCard.choices }}\" as=\"c\" hint-placeholder-count=\"4\">\n              <div style=\"background:#f4f2ec;border:1px solid #ece4d6;border-radius:9px;padding:10px 13px;font-size:14px;color:#34404d;line-height:1.5\">{{ c }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ oCard.hasHint }}\" hint-placeholder-val=\"ヒント\">\n          <div style=\"margin-top:13px;background:#eef1f4;border-radius:9px;padding:10px 13px;font-size:12.5px;color:#5a6472;line-height:1.6;display:flex;gap:7px\"><span style=\"color:#14293f;font-weight:700;flex-shrink:0\">公式<\u002Fspan><span>{{ oCard.hint }}<\u002Fspan><\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ oCard.revealed }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"margin-top:13px;background:#fff;border:1px solid #ebe3d6;border-radius:14px;overflow:hidden;animation:seFade .25s ease both\">\n          <div style=\"background:#c0392b;color:#fff;font-weight:700;font-size:13.5px;padding:9px 15px\">解答<\u002Fdiv>\n          <div style=\"padding:13px 15px;font-family:'Shippori Mincho',serif;font-weight:700;font-size:16px;color:#c0392b;line-height:1.5\">{{ oCard.ans }}<\u002Fdiv>\n          <div style=\"border-top:1px solid #f0e9dd;background:#eef7f0;padding:12px 15px;font-size:13px;color:#2f6b4a;line-height:1.7;display:flex;gap:7px\"><span style=\"font-weight:700;flex-shrink:0\">解説<\u002Fspan><span>{{ oCard.exp }}<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ oCard.hidden }}\" hint-placeholder-val=\"{{ false }}\"><\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"flex-shrink:0;background:#f6f3ee;border-top:1px solid #e9e0d2;box-shadow:0 -5px 16px rgba(20,30,45,.07);padding:12px 18px 15px\">\n    <sc-if value=\"{{ oCard.revealed }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"font-size:11.5px;color:#9aa2b0;text-align:center;margin-bottom:8px\">自分の答えは合っていた？<\u002Fdiv>\n      <div style=\"display:flex;gap:11px\">\n        <div onclick=\"{{ onOVague }}\" style=\"flex:1;text-align:center;padding:14px;border-radius:13px;background:#fff;border:1.5px solid #e2d8c8;color:#8a6d50;font-weight:700;font-size:15px;cursor:pointer\">△ できなかった<\u002Fdiv>\n        <div onclick=\"{{ onOGood }}\" style=\"flex:1.2;text-align:center;padding:14px;border-radius:13px;background:#14293f;color:#fff;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 5px 14px rgba(20,41,63,.3)\">✓ 正解できた<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ oCard.hidden }}\" hint-placeholder-val=\"{{ true }}\">\n      <div onclick=\"{{ onOReveal }}\" style=\"text-align:center;padding:15px;border-radius:13px;background:#c0392b;color:#fff;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 5px 14px rgba(192,57,43,.28)\">答えを見る<\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== OUYOU RESULT ===== -->\n<sc-if value=\"{{ isOresult }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"height:100%;display:flex;flex-direction:column;animation:seFade .4s ease both\">\n<div class=\"se-frame\" style=\"flex:1;min-height:0;overflow-y:auto\">\n  <div style=\"background:#14293f;color:#fff;padding:40px 26px 34px;text-align:center\">\n    <div style=\"font-size:12px;letter-spacing:.28em;color:#aebccd\">RESULT · 応用問題<\u002Fdiv>\n    <div style=\"margin:22px auto 0;width:150px;height:150px;border-radius:50%;border:3px solid {{ oRank.color }};display:flex;flex-direction:column;align-items:center;justify-content:center;animation:sePop .5s ease both\">\n      <div style=\"font-family:'Shippori Mincho',serif;font-size:60px;font-weight:700;line-height:1;color:{{ oRank.color }}\">{{ oRank.letter }}<\u002Fdiv>\n      <div style=\"font-size:13px;color:#cdd6e0;margin-top:6px\">{{ oPct }}% 正解<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-weight:700;font-size:18px;margin-top:18px\">{{ oRank.label }}<\u002Fdiv>\n    <div style=\"font-size:12.5px;color:#aebccd;margin-top:6px;line-height:1.6\">{{ oRank.desc }}<\u002Fdiv>\n    <div style=\"font-size:12px;color:#8aa;margin-top:12px\">正解できた {{ oGood }} 問 ／ 全 {{ oTotal }} 問<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"padding:24px 22px 34px;display:flex;flex-direction:column;gap:11px\">\n    <div onclick=\"{{ oRetry }}\" style=\"background:#c0392b;color:#fff;border-radius:13px;padding:16px;text-align:center;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 5px 14px rgba(192,57,43,.25)\">もう一度チャレンジ<\u002Fdiv>\n    <div onclick=\"{{ onHome }}\" style=\"background:#fff;border:1.5px solid #e2d8c8;border-radius:13px;padding:16px;text-align:center;font-weight:700;font-size:15px;color:#14293f;cursor:pointer\">ホームに戻る<\u002Fdiv>\n    <div style=\"margin-top:14px;background:#14293f;color:#fff;border-radius:12px;padding:15px 17px;font-size:13px;line-height:1.7;text-align:center\">具体例・計算・正誤で問われても<br>答えられれば本番も安心！<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== SIHOME（英単語・範囲選択） ===== -->\n<sc-if value=\"{{ isSihome }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"height:100%;display:flex;flex-direction:column;animation:seFade .4s ease both\">\n  <div style=\"background:#243b34;padding:42px 26px 28px;color:#fff;position:relative;flex-shrink:0\">\n    <div onclick=\"{{ onTop }}\" style=\"font-size:12.5px;color:#a9c6b6;cursor:pointer;margin-bottom:14px\">‹ 教科選択<\u002Fdiv>\n    <div style=\"font-family:'Shippori Mincho',serif;font-size:12px;letter-spacing:.32em;color:#9ecbb0;font-weight:600\">SISTAN · 5th<\u002Fdiv>\n    <h1 style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:29px;line-height:1.3;margin:12px 0 0;letter-spacing:.02em\">英単語<\u002Fh1>\n    <div style=\"margin-top:12px;font-size:13px;color:#a9c6b6;line-height:1.7\">範囲・出題方向・形式を選んでスタート<\u002Fdiv>\n    <div style=\"position:absolute;right:24px;top:42px;width:58px;height:58px;border:1.5px solid #3f8f63;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Shippori Mincho',serif;color:#8fc7a4;font-size:13px;transform:rotate(-8deg)\">英単<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"se-frame\" style=\"flex:1;overflow-y:auto;padding:20px 20px 30px\">\n    <!-- 範囲を選ぶ -->\n    <div style=\"background:#eef4f0;border:1px solid #d4e4da;border-radius:13px;padding:15px 16px;margin-bottom:20px\">\n      <div style=\"font-size:11.5px;color:#3f8f63;font-weight:700;letter-spacing:.08em;margin-bottom:9px\">📌 出題範囲を選ぶ<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:7px\">\n        <div onclick=\"{{ onSiPresetEC }}\" style=\"display:flex;align-items:center;justify-content:space-between;background:{{ siPresetECBg }};border:1.5px solid {{ siPresetECBd }};border-radius:9px;padding:11px 13px;cursor:pointer\">\n          <span style=\"display:flex;align-items:center;gap:8px\">\n            <span style=\"width:16px;height:16px;border-radius:50%;border:2px solid {{ siPresetECDot }};display:flex;align-items:center;justify-content:center\"><span style=\"width:8px;height:8px;border-radius:50%;background:{{ siPresetECDotFill }}\"><\u002Fspan><\u002Fspan>\n            <span style=\"font-size:14px;color:#2a313a;font-weight:700\">英コミュ<\u002Fspan>\n            <span style=\"font-size:11px;color:#8a9a90\">60語<\u002Fspan>\n          <\u002Fspan>\n          <span style=\"font-family:'Shippori Mincho',serif;font-size:14px;color:#3f8f63;font-weight:700\">1711 〜 1770<\u002Fspan>\n        <\u002Fdiv>\n        <div onclick=\"{{ onSiPresetLR }}\" style=\"display:flex;align-items:center;justify-content:space-between;background:{{ siPresetLRBg }};border:1.5px solid {{ siPresetLRBd }};border-radius:9px;padding:11px 13px;cursor:pointer\">\n          <span style=\"display:flex;align-items:center;gap:8px\">\n            <span style=\"width:16px;height:16px;border-radius:50%;border:2px solid {{ siPresetLRDot }};display:flex;align-items:center;justify-content:center\"><span style=\"width:8px;height:8px;border-radius:50%;background:{{ siPresetLRDotFill }}\"><\u002Fspan><\u002Fspan>\n            <span style=\"font-size:14px;color:#2a313a;font-weight:700\">論理表現<\u002Fspan>\n            <span style=\"font-size:11px;color:#8a9a90\">85語<\u002Fspan>\n          <\u002Fspan>\n          <span style=\"font-family:'Shippori Mincho',serif;font-size:14px;color:#3f8f63;font-weight:700\">1531 〜 1615<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 出題方向 -->\n    <div style=\"font-size:12px;color:#9aa2b0;letter-spacing:.1em;font-weight:700;margin:22px 0 11px\">出題方向<\u002Fdiv>\n    <div style=\"display:flex;gap:10px\">\n      <div onclick=\"{{ onSiDirE2J }}\" style=\"flex:1;text-align:center;padding:14px;border-radius:12px;cursor:pointer;font-weight:700;font-size:14.5px;background:{{ siDirE2JBg }};border:1.5px solid {{ siDirE2JBd }};color:{{ siDirE2JFg }}\">英語 → 日本語<\u002Fdiv>\n      <div onclick=\"{{ onSiDirJ2E }}\" style=\"flex:1;text-align:center;padding:14px;border-radius:12px;cursor:pointer;font-weight:700;font-size:14.5px;background:{{ siDirJ2EBg }};border:1.5px solid {{ siDirJ2EBd }};color:{{ siDirJ2EFg }}\">日本語 → 英語<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 形式 -->\n    <div style=\"font-size:12px;color:#9aa2b0;letter-spacing:.1em;font-weight:700;margin:22px 0 11px\">出題形式<\u002Fdiv>\n    <div style=\"display:flex;gap:10px\">\n      <div onclick=\"{{ onSiModeCard }}\" style=\"flex:1;padding:15px 13px;border-radius:12px;cursor:pointer;background:{{ siModeCardBg }};border:1.5px solid {{ siModeCardBd }}\">\n        <div style=\"font-weight:700;font-size:14.5px;color:{{ siModeCardFg }}\">カード式<\u002Fdiv>\n        <div style=\"font-size:11px;color:{{ siModeCardSub }};margin-top:3px;line-height:1.5\">めくって自己採点<\u002Fdiv>\n      <\u002Fdiv>\n      <div onclick=\"{{ onSiModeQuad }}\" style=\"flex:1;padding:15px 13px;border-radius:12px;cursor:pointer;background:{{ siModeQuadBg }};border:1.5px solid {{ siModeQuadBd }}\">\n        <div style=\"font-weight:700;font-size:14.5px;color:{{ siModeQuadFg }}\">4択<\u002Fdiv>\n        <div style=\"font-size:11px;color:{{ siModeQuadSub }};margin-top:3px;line-height:1.5\">近い番号から選択肢<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 出題順 -->\n    <div style=\"font-size:12px;color:#9aa2b0;letter-spacing:.1em;font-weight:700;margin:22px 0 11px\">出題順<\u002Fdiv>\n    <div style=\"display:flex;gap:10px\">\n      <div onclick=\"{{ onSiOrderRandom }}\" style=\"flex:1;text-align:center;padding:14px;border-radius:12px;cursor:pointer;font-weight:700;font-size:14.5px;background:{{ siOrderRandomBg }};border:1.5px solid {{ siOrderRandomBd }};color:{{ siOrderRandomFg }}\">ランダム<\u002Fdiv>\n      <div onclick=\"{{ onSiOrderSeq }}\" style=\"flex:1;text-align:center;padding:14px;border-radius:12px;cursor:pointer;font-weight:700;font-size:14.5px;background:{{ siOrderSeqBg }};border:1.5px solid {{ siOrderSeqBd }};color:{{ siOrderSeqFg }}\">番号順<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div onclick=\"{{ onSiStart }}\" style=\"margin-top:24px;background:#3f8f63;color:#fff;border-radius:13px;padding:17px;text-align:center;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 6px 18px rgba(63,143,99,.28)\">スタート<\u002Fdiv>\n    <div style=\"margin-top:13px;background:#eef1f4;border-radius:11px;padding:12px 15px;font-size:12px;color:#5a6472;line-height:1.7\">まちがえた語は、数問あとにもう一度出題されます。全部正解できたら終了です。<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== SIQUIZ（英単語・出題） ===== -->\n<sc-if value=\"{{ isSiquiz }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"height:100%;display:flex;flex-direction:column\">\n  <div style=\"flex-shrink:0;background:#f6f3ee;padding:14px 18px 10px;border-bottom:1px solid #ece4d6\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px\">\n      <div style=\"display:flex;align-items:center;gap:8px\">\n        <div onclick=\"{{ onSihome }}\" style=\"display:flex;align-items:center;gap:3px;background:#fff;border:1px solid #ded3c4;border-radius:18px;padding:7px 13px 7px 10px;font-size:12.5px;font-weight:700;color:#243b34;cursor:pointer;box-shadow:0 1px 3px rgba(20,30,45,.06)\">‹ 範囲選択<\u002Fdiv>\n        <sc-if value=\"{{ siCanPrev }}\" hint-placeholder-val=\"{{ true }}\">\n          <div onclick=\"{{ onSiPrev }}\" style=\"display:flex;align-items:center;gap:3px;background:#f0ebe2;border:1px solid #e2d8c8;border-radius:18px;padding:7px 12px;font-size:12.5px;font-weight:700;color:#577;cursor:pointer\">↩ 前へ<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"font-size:12px;color:#5a6472;font-weight:700;white-space:nowrap\">残り {{ siRemain }} 語<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:9px;height:5px;background:#e6ddcf;border-radius:3px;overflow:hidden\">\n      <div style=\"height:100%;background:#3f8f63;border-radius:3px;width:{{ siProgress }}%;transition:width .35s ease\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"se-frame\" style=\"flex:1;overflow-y:auto;padding:18px 18px 26px\">\n    <div style=\"animation:seFade .3s ease both\">\n      <div style=\"display:flex;align-items:center;gap:8px\">\n        <div style=\"display:inline-block;background:#243b34;color:#fff;font-size:11px;font-weight:700;letter-spacing:.06em;padding:4px 11px;border-radius:20px\">No.{{ siCard.num }}<\u002Fdiv>\n        <div style=\"font-size:11px;color:#9aa2b0;font-weight:700\">{{ siCard.sub }}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- カード式 -->\n      <sc-if value=\"{{ siIsCard }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"background:#fff;border:1px solid #e6ddca;border-radius:18px;padding:38px 22px;margin-top:13px;box-shadow:0 4px 18px rgba(20,30,45,.07);text-align:center;min-height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center\">\n          <div style=\"font-size:11px;color:#b3aa99;font-weight:700;letter-spacing:.1em;margin-bottom:12px\">問題<\u002Fdiv>\n          <div style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:30px;color:#243b34;line-height:1.35;word-break:break-word\">{{ siCard.front }}<\u002Fdiv>\n          <sc-if value=\"{{ siRevealed }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"margin-top:20px;padding-top:18px;border-top:1px dashed #e0d8c8;width:100%;animation:seFlip .35s ease both\">\n              <div style=\"font-size:11px;color:#3f8f63;font-weight:700;letter-spacing:.1em;margin-bottom:8px\">こたえ<\u002Fdiv>\n              <div style=\"font-size:21px;color:#2a313a;font-weight:700;line-height:1.6\">{{ siCard.back }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ siHidden }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"margin-top:18px;font-size:12.5px;color:#b3aa99\">下のボタンでこたえを表示<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- 4択 -->\n      <sc-if value=\"{{ siIsQuad }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"background:#fff;border:1px solid #e6ddca;border-radius:18px;padding:26px 22px;margin-top:13px;box-shadow:0 4px 18px rgba(20,30,45,.07);text-align:center\">\n          <div style=\"font-size:11px;color:#b3aa99;font-weight:700;letter-spacing:.1em;margin-bottom:10px\">次の意味は？<\u002Fdiv>\n          <div style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:28px;color:#243b34;line-height:1.35;word-break:break-word\">{{ siCard.front }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:13px;display:flex;flex-direction:column;gap:9px\">\n          <sc-for list=\"{{ siQuad }}\" as=\"c\" hint-placeholder-count=\"4\">\n            <div onclick=\"{{ c.onTap }}\" style=\"display:flex;align-items:center;gap:11px;background:{{ c.bg }};border:1.5px solid {{ c.bd }};border-radius:12px;padding:14px 15px;cursor:pointer\">\n              <div style=\"flex:1;font-size:15px;color:{{ c.fg }};line-height:1.5;font-weight:500\">{{ c.label }}<\u002Fdiv>\n              <div style=\"font-size:14px;font-weight:700;color:{{ c.fg }}\">{{ c.mark }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"flex-shrink:0;background:#f6f3ee;border-top:1px solid #e9e0d2;box-shadow:0 -5px 16px rgba(20,30,45,.07);padding:12px 18px 15px\">\n    <!-- カード式の操作 -->\n    <sc-if value=\"{{ siIsCard }}\" hint-placeholder-val=\"{{ true }}\">\n      <sc-if value=\"{{ siHidden }}\" hint-placeholder-val=\"{{ true }}\">\n        <div onclick=\"{{ onSiReveal }}\" style=\"text-align:center;padding:15px;border-radius:13px;background:#243b34;color:#fff;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 5px 14px rgba(36,59,52,.28)\">こたえを見る<\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ siRevealed }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"font-size:11.5px;color:#9aa2b0;text-align:center;margin-bottom:8px\">覚えていた？<\u002Fdiv>\n        <div style=\"display:flex;gap:11px\">\n          <div onclick=\"{{ onSiBad }}\" style=\"flex:1;text-align:center;padding:14px;border-radius:13px;background:#fff;border:1.5px solid #e2c8c2;color:#b23a2c;font-weight:700;font-size:15px;cursor:pointer\">✗ まちがえた<\u002Fdiv>\n          <div onclick=\"{{ onSiGood }}\" style=\"flex:1.2;text-align:center;padding:14px;border-radius:13px;background:#3f8f63;color:#fff;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 5px 14px rgba(63,143,99,.3)\">✓ 覚えていた<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsc-if>\n    <!-- 4択の操作 -->\n    <sc-if value=\"{{ siIsQuad }}\" hint-placeholder-val=\"{{ true }}\">\n      <sc-if value=\"{{ siQuadHint }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"text-align:center;font-size:12.5px;color:#a59a8c;padding:13px\">選択肢から答えを選んでください<\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ siQuadAnswered }}\" hint-placeholder-val=\"{{ true }}\">\n        <div onclick=\"{{ onSiQuadNext }}\" style=\"text-align:center;padding:15px;border-radius:13px;background:#243b34;color:#fff;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 5px 14px rgba(36,59,52,.28)\">次へ ›<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== SIRESULT（英単語・結果） ===== -->\n<sc-if value=\"{{ isSiresult }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"height:100%;display:flex;flex-direction:column;animation:seFade .4s ease both\">\n<div class=\"se-frame\" style=\"flex:1;min-height:0;overflow-y:auto\">\n  <div style=\"background:#243b34;color:#fff;padding:40px 26px 34px;text-align:center\">\n    <div style=\"font-size:12px;letter-spacing:.28em;color:#a9c6b6\">RESULT · 英単語<\u002Fdiv>\n    <div style=\"margin:22px auto 0;width:150px;height:150px;border-radius:50%;border:3px solid {{ siRank.color }};display:flex;flex-direction:column;align-items:center;justify-content:center;animation:sePop .5s ease both\">\n      <div style=\"font-family:'Shippori Mincho',serif;font-size:60px;font-weight:700;line-height:1;color:{{ siRank.color }}\">{{ siRank.letter }}<\u002Fdiv>\n      <div style=\"font-size:13px;color:#a9c6b6;margin-top:6px\">{{ siPct }}% 一発正解<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-weight:700;font-size:18px;margin-top:18px\">{{ siRank.label }}<\u002Fdiv>\n    <div style=\"font-size:12.5px;color:#a9c6b6;margin-top:6px;line-height:1.6\">{{ siRank.desc }}<\u002Fdiv>\n    <div style=\"font-size:12px;color:#8aa99a;margin-top:12px\">一発正解 {{ siFirstTry }} 語 ／ 全 {{ siDoneCount }} 語<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"padding:24px 22px 34px\">\n    <sc-if value=\"{{ siHasWrong }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"font-size:12px;color:#9aa2b0;letter-spacing:.1em;font-weight:700;margin-bottom:10px\">まちがえた語（{{ siWrongCount }}）<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:7px;margin-bottom:22px\">\n        <sc-for list=\"{{ siWrongList }}\" as=\"w\" hint-placeholder-count=\"3\">\n          <div style=\"display:flex;align-items:baseline;gap:10px;background:#fff;border:1px solid #ece3d4;border-radius:9px;padding:10px 13px\">\n            <span style=\"font-size:10.5px;color:#b3aa99;font-weight:700;min-width:38px\">No.{{ w.num }}<\u002Fspan>\n            <span style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:15px;color:#243b34\">{{ w.en }}<\u002Fspan>\n            <span style=\"font-size:12.5px;color:#6b7382;flex:1\">{{ w.ja }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <div style=\"display:flex;flex-direction:column;gap:11px\">\n      <sc-if value=\"{{ siHasWrong }}\" hint-placeholder-val=\"{{ true }}\">\n        <div onclick=\"{{ onSiRetryWrong }}\" style=\"background:#3f8f63;color:#fff;border-radius:13px;padding:16px;text-align:center;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 5px 14px rgba(63,143,99,.25)\">まちがえた語だけ復習<\u002Fdiv>\n      <\u002Fsc-if>\n      <div onclick=\"{{ onSiRetry }}\" style=\"background:#fff;border:1.5px solid #e2d8c8;border-radius:13px;padding:16px;text-align:center;font-weight:700;font-size:15px;color:#243b34;cursor:pointer\">同じ範囲をもう一度<\u002Fdiv>\n      <div onclick=\"{{ onSihome }}\" style=\"text-align:center;padding:8px;font-size:13px;color:#9aa2b0;cursor:pointer\">範囲選択に戻る<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== PHOME（物理・メニュー） ===== -->\n<sc-if value=\"{{ isPhome }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"animation:seFade .4s ease both\">\n  <div style=\"background:#16323d;padding:44px 26px 34px;color:#fff;position:relative\">\n    <div onclick=\"{{ onTop }}\" style=\"font-size:12.5px;color:#9fc3d2;cursor:pointer;margin-bottom:14px\">‹ 教科選択<\u002Fdiv>\n    <div style=\"font-family:'Shippori Mincho',serif;font-size:12px;letter-spacing:.32em;color:#7fb6cb;font-weight:600\">PHYSICS · DRILL<\u002Fdiv>\n    <h1 style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:30px;line-height:1.32;margin:12px 0 0;letter-spacing:.02em\">力と運動の法則<\u002Fh1>\n    <div style=\"margin-top:14px;font-size:13px;color:#9fc3d2;line-height:1.7\">公式ごとに分けた計算演習。<br>「どの場面でどの式を使うか」を体で覚える。<\u002Fdiv>\n    <div style=\"position:absolute;right:24px;top:44px;width:58px;height:58px;border:1.5px solid #2f7da0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Shippori Mincho',serif;color:#8fc0d4;font-size:13px;transform:rotate(-8deg)\">物理<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"padding:22px 20px 30px;max-width:820px;margin:0 auto\">\n    <div style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:15px;color:#16323d;display:flex;align-items:center;gap:8px\"><span style=\"width:4px;height:16px;background:#2f7da0;border-radius:2px;display:inline-block\"><\u002Fspan>公式ごとの計算演習<\u002Fdiv>\n    <div style=\"font-size:11.5px;color:#8a93a0;margin:5px 0 13px\">使う公式で分かれています。1つずつ完成させよう。<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:11px\">\n      <sc-for list=\"{{ phyGroupCards }}\" as=\"g\" hint-placeholder-count=\"6\">\n        <div onclick=\"{{ g.onTap }}\" style=\"position:relative;background:#fff;border:1px solid #ebe3d6;border-left:5px solid {{ g.color }};border-radius:13px;padding:14px 15px;cursor:pointer;box-shadow:0 2px 8px rgba(20,30,45,.05)\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px\">\n            <div style=\"font-weight:700;font-size:15.5px;color:#1c2630\">{{ g.name }}<\u002Fdiv>\n            <div style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:15px;color:{{ g.color }};white-space:nowrap\">{{ g.formula }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:11.5px;color:#6b7682;margin-top:5px;line-height:1.5\">{{ g.sub }}<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-top:11px\">\n            <div style=\"font-size:11px;color:#9aa2ad\">全{{ g.count }}問　正解 {{ g.good }}<\u002Fdiv>\n            <sc-if value=\"{{ g.allDone }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:11px;font-weight:700;color:{{ g.color }}\">完了 ✓<\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:15px;color:#16323d;display:flex;align-items:center;gap:8px;margin-top:26px\"><span style=\"width:4px;height:16px;background:#16323d;border-radius:2px;display:inline-block\"><\u002Fspan>覚える<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:11px;margin-top:12px\">\n      <div onclick=\"{{ onOpenPFx }}\" style=\"background:#16323d;color:#fff;border-radius:13px;padding:15px 16px;cursor:pointer;box-shadow:0 5px 14px rgba(22,50,61,.2);display:flex;align-items:center;justify-content:space-between\">\n        <div>\n          <div style=\"font-weight:700;font-size:15.5px\">公式マスター<\u002Fdiv>\n          <div style=\"font-size:11.5px;color:#9fc3d2;margin-top:3px\">場面 → 公式・赤シート<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;font-size:17px\">∑<\u002Fdiv>\n      <\u002Fdiv>\n      <div onclick=\"{{ onOpenPGoku }}\" style=\"background:#fff;border:1px solid #ebe3d6;border-radius:13px;padding:15px 16px;cursor:pointer;box-shadow:0 2px 8px rgba(20,30,45,.05);display:flex;align-items:center;justify-content:space-between\">\n        <div>\n          <div style=\"font-weight:700;font-size:15.5px;color:#1c2630\">語句確認<\u002Fdiv>\n          <div style=\"font-size:11.5px;color:#6b7682;margin-top:3px\">重要語10・赤シート<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width:32px;height:32px;border-radius:50%;background:#eef3f5;display:flex;align-items:center;justify-content:center;font-size:17px;color:#2f7da0\">語<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:24px;background:#eef3f5;border-radius:12px;padding:14px 16px;font-size:12.5px;color:#4f5c66;line-height:1.7\">各演習は「自分で計算 → 答えを見る → 図つき解説で理解」の順に。スマホでは図→問題→解説と縦に並び、パソコンの広い画面では図と問題が横に並びます。<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== PCALC（物理・計算演習） ===== -->\n<sc-if value=\"{{ isPcalc }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"height:100%;display:flex;flex-direction:column\">\n  <div style=\"flex-shrink:0;background:#f6f3ee;padding:14px 18px 10px;border-bottom:1px solid #ece4d6\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px\">\n      <div style=\"display:flex;align-items:center;gap:8px\">\n        <div onclick=\"{{ onOpenPhys }}\" style=\"display:flex;align-items:center;gap:3px;background:#fff;border:1px solid #ded3c4;border-radius:18px;padding:7px 13px 7px 10px;font-size:12.5px;font-weight:700;color:#16323d;cursor:pointer;box-shadow:0 1px 3px rgba(20,30,45,.06)\">‹ メニュー<\u002Fdiv>\n        <sc-if value=\"{{ pCanPrev }}\" hint-placeholder-val=\"{{ true }}\">\n          <div onclick=\"{{ onPPrev }}\" style=\"display:flex;align-items:center;gap:3px;background:#f0ebe2;border:1px solid #e2d8c8;border-radius:18px;padding:7px 12px;font-size:12.5px;font-weight:700;color:#577;cursor:pointer\">↩ 前へ<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"font-size:12.5px;color:#5a6472;font-weight:700;white-space:nowrap\">{{ pIdx1 }} <span style=\"color:#bcb0a0\">/ {{ pTotalG }}<\u002Fspan><\u002Fdiv>\n
