        <sc-if value=\"{{ r.isCovered }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"margin:7px 9px;padding:9px 13px;background:#e23b2e;border-radius:6px;width:100%;text-align:center;color:#e23b2e;font-size:12px;user-select:none\">タップ<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"margin-top:22px;background:#16323d;color:#fff;border-radius:12px;padding:15px 17px;font-size:13px;line-height:1.7;text-align:center\">公式は「何を求める式か」とセットで覚える。<br>場面が浮かべば、計算は半分終わったも同然！<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== KOHOME（古文単語・メニュー） ===== -->\n<sc-if value=\"{{ isKohome }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"animation:seFade .4s ease both\">\n  <div style=\"background:#3a2c44;padding:44px 26px 34px;color:#fff;position:relative\">\n    <div onclick=\"{{ onTop }}\" style=\"font-size:12.5px;color:#c4b4dc;cursor:pointer;margin-bottom:14px\">‹ 教科選択<\u002Fdiv>\n    <div style=\"font-family:'Shippori Mincho',serif;font-size:12px;letter-spacing:.32em;color:#b89fd6;font-weight:600\">KOBUN · WORDS<\u002Fdiv>\n    <h1 style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:30px;line-height:1.32;margin:12px 0 0;letter-spacing:.02em\">重要古語<\u002Fh1>\n    <div style=\"margin-top:14px;font-size:13px;color:#c4b4dc;line-height:1.7\">名詞・副詞の頻出67語。<br>「現代語とちがう意味」を覚えるのが得点源。<\u002Fdiv>\n    <div style=\"position:absolute;right:24px;top:44px;width:58px;height:58px;border:1.5px solid #7a5ea8;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Shippori Mincho',serif;color:#c4b4dc;font-size:13px;transform:rotate(-8deg)\">古文<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"padding:22px 20px 30px;max-width:820px;margin:0 auto\">\n    <div style=\"font-size:12px;color:#9aa2b0;letter-spacing:.1em;font-weight:700;margin-bottom:11px\">出題形式<\u002Fdiv>\n    <div style=\"display:flex;gap:10px\">\n      <div onclick=\"{{ onKoModeQuad }}\" style=\"flex:1;padding:13px 12px;border-radius:12px;cursor:pointer;text-align:center;background:{{ koModeQuadBg }};border:1.5px solid {{ koModeQuadBd }}\">\n        <div style=\"font-weight:700;font-size:14.5px;color:{{ koModeQuadFg }}\">4択クイズ<\u002Fdiv>\n        <div style=\"font-size:11px;margin-top:2px;color:{{ koModeQuadSub }}\">意味を4つから選ぶ<\u002Fdiv>\n      <\u002Fdiv>\n      <div onclick=\"{{ onKoModeCard }}\" style=\"flex:1;padding:13px 12px;border-radius:12px;cursor:pointer;text-align:center;background:{{ koModeCardBg }};border:1.5px solid {{ koModeCardBd }}\">\n        <div style=\"font-weight:700;font-size:14.5px;color:{{ koModeCardFg }}\">カード<\u002Fdiv>\n        <div style=\"font-size:11px;margin-top:2px;color:{{ koModeCardSub }}\">めくって自己採点<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"font-size:12px;color:#9aa2b0;letter-spacing:.1em;font-weight:700;margin:18px 0 11px\">出題順<\u002Fdiv>\n    <div style=\"display:flex;gap:10px\">\n      <div onclick=\"{{ onKoOrderRandom }}\" style=\"flex:1;text-align:center;padding:13px;border-radius:12px;cursor:pointer;font-weight:700;font-size:14.5px;background:{{ koOrderRandomBg }};border:1.5px solid {{ koOrderRandomBd }};color:{{ koOrderRandomFg }}\">ランダム<\u002Fdiv>\n      <div onclick=\"{{ onKoOrderSeq }}\" style=\"flex:1;text-align:center;padding:13px;border-radius:12px;cursor:pointer;font-weight:700;font-size:14.5px;background:{{ koOrderSeqBg }};border:1.5px solid {{ koOrderSeqBd }};color:{{ koOrderSeqFg }}\">番号順<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:15px;color:#3a2c44;display:flex;align-items:center;gap:8px;margin-top:24px\"><span style=\"width:4px;height:16px;background:#7a5ea8;border-radius:2px;display:inline-block\"><\u002Fspan>範囲を選んでスタート<\u002Fdiv>\n    <div style=\"font-size:11.5px;color:#8a93a0;margin:5px 0 13px\">まちがえた語は数問あとにもう一度出題され、全問正解できるまでくり返します。<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:11px\">\n      <sc-for list=\"{{ koDeckCards }}\" as=\"g\" hint-placeholder-count=\"3\">\n        <div onclick=\"{{ g.onTap }}\" style=\"position:relative;background:#fff;border:1px solid #ebe3d6;border-left:5px solid {{ g.color }};border-radius:13px;padding:14px 15px;cursor:pointer;box-shadow:0 2px 8px rgba(20,30,45,.05)\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px\">\n            <div style=\"font-weight:700;font-size:15.5px;color:#1c2630\">{{ g.name }}<\u002Fdiv>\n            <div style=\"font-size:11px;color:{{ g.color }};font-weight:700;white-space:nowrap\">{{ g.sub }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:11.5px;color:#6b7682;margin-top:5px;line-height:1.5\">{{ g.note }}<\u002Fdiv>\n          <div style=\"font-size:11px;color:#9aa2ad;margin-top:11px\">全{{ g.count }}語 ›<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n      <div onclick=\"{{ onKoStartAll }}\" style=\"position:relative;background:#3a2c44;color:#fff;border-radius:13px;padding:14px 15px;cursor:pointer;box-shadow:0 5px 14px rgba(58,44,68,.22)\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px\">\n          <div style=\"font-weight:700;font-size:15.5px\">全範囲シャッフル<\u002Fdiv>\n          <div style=\"font-size:11px;color:#c4b4dc;font-weight:700;white-space:nowrap\">098–164<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:11.5px;color:#c4b4dc;margin-top:5px;line-height:1.5\">名詞・副詞を混ぜて総仕上げ。<\u002Fdiv>\n        <div style=\"font-size:11px;color:#a99cbb;margin-top:11px\">全{{ koCount }}語 ›<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:15px;color:#3a2c44;display:flex;align-items:center;gap:8px;margin-top:26px\"><span style=\"width:4px;height:16px;background:#3a2c44;border-radius:2px;display:inline-block\"><\u002Fspan>応用・暗記<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:11px;margin-top:12px\">\n      <div onclick=\"{{ onOpenKoOuyou }}\" style=\"background:#c0392b;color:#fff;border-radius:13px;padding:15px 16px;cursor:pointer;box-shadow:0 5px 14px rgba(192,57,43,.2);display:flex;align-items:center;justify-content:space-between\">\n        <div>\n          <div style=\"font-weight:700;font-size:15.5px\">応用問題集<\u002Fdiv>\n          <div style=\"font-size:11.5px;color:#f3cfca;margin-top:3px\">傍線部の意味を選ぶ・全{{ koOTotal }}問<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;font-size:16px\">問<\u002Fdiv>\n      <\u002Fdiv>\n      <div onclick=\"{{ onOpenKoList }}\" style=\"background:#fff;border:1px solid #ebe3d6;border-radius:13px;padding:15px 16px;cursor:pointer;box-shadow:0 2px 8px rgba(20,30,45,.05);display:flex;align-items:center;justify-content:space-between\">\n        <div>\n          <div style=\"font-weight:700;font-size:15.5px;color:#1c2630\">古語一覧・赤シート<\u002Fdiv>\n          <div style=\"font-size:11.5px;color:#6b7682;margin-top:3px\">全{{ koCount }}語・語 → 意味<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width:32px;height:32px;border-radius:50%;background:#f2eef6;display:flex;align-items:center;justify-content:center;font-size:16px;color:#7a5ea8\">語<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:24px;background:#f2eef6;border-radius:12px;padding:14px 16px;font-size:12.5px;color:#574a64;line-height:1.7\">古語は一語に複数の意味があります。①②③のうち「今の言葉とちがう意味」を特に意識して覚えましょう。4択は答えるとすぐに例文・全訳と意味が表示されます。<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== KOCARD（古文単語・出題：カード／4択） ===== -->\n<sc-if value=\"{{ isKocard }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"height:100%;display:flex;flex-direction:column\">\n  <div style=\"flex-shrink:0;background:#f6f3ee;padding:14px 18px 10px;border-bottom:1px solid #ece4d6\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px\">\n      <div style=\"display:flex;align-items:center;gap:8px\">\n        <div onclick=\"{{ onOpenKobun }}\" style=\"display:flex;align-items:center;gap:3px;background:#fff;border:1px solid #ded3c4;border-radius:18px;padding:7px 13px 7px 10px;font-size:12.5px;font-weight:700;color:#3a2c44;cursor:pointer;box-shadow:0 1px 3px rgba(20,30,45,.06)\">‹ メニュー<\u002Fdiv>\n        <sc-if value=\"{{ koCanPrev }}\" hint-placeholder-val=\"{{ true }}\">\n          <div onclick=\"{{ onKoPrev }}\" style=\"display:flex;align-items:center;gap:3px;background:#f0ebe2;border:1px solid #e2d8c8;border-radius:18px;padding:7px 12px;font-size:12.5px;font-weight:700;color:#7a6a52;cursor:pointer\">↩ 前へ<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"font-size:12px;color:#5a6472;font-weight:700;white-space:nowrap\">残り {{ koqRemain }} 語<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:9px;height:5px;background:#e6ddcf;border-radius:3px;overflow:hidden\">\n      <div style=\"height:100%;background:{{ koGrpColor }};border-radius:3px;width:{{ koqProgress }}%;transition:width .35s ease\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"se-frame\" style=\"flex:1;overflow-y:auto;padding:18px 18px 26px\">\n    <div style=\"animation:seFade .3s ease both;max-width:560px;margin:0 auto\">\n      <div style=\"display:flex;align-items:center;gap:8px\">\n        <div style=\"display:inline-block;background:#3a2c44;color:#fff;font-size:11px;font-weight:700;letter-spacing:.06em;padding:4px 11px;border-radius:20px\">{{ koCard.pos }}・{{ koCard.n }}<\u002Fdiv>\n        <div style=\"font-size:11px;color:#9aa2b0;font-weight:700\">{{ koGrpName }}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- カード式 -->\n      <sc-if value=\"{{ koIsCard }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"background:#fff;border:1px solid #e6ddca;border-radius:18px;padding:34px 22px;margin-top:13px;box-shadow:0 4px 18px rgba(20,30,45,.07);text-align:center;min-height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center\">\n          <div style=\"font-size:11px;color:#b3aa99;font-weight:700;letter-spacing:.1em;margin-bottom:12px\">この古語の意味は？<\u002Fdiv>\n          <div style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:32px;color:#2a2230;line-height:1.35;word-break:break-word\">{{ koCard.w }}<\u002Fdiv>\n          <sc-if value=\"{{ koCard.hasK }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:12.5px;color:#9a8fa8;margin-top:7px\">〔{{ koCard.k }}〕<\u002Fdiv><\u002Fsc-if>\n          <sc-if value=\"{{ koRevealed }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"margin-top:18px;padding-top:16px;border-top:1px dashed #e0d8c8;width:100%;animation:seFlip .35s ease both\">\n              <div style=\"font-size:15px;color:#2a2230;font-weight:600;line-height:1.85;text-align:left;text-wrap:pretty\">{{ koCard.mean }}<\u002Fdiv>\n              <div style=\"margin-top:12px;background:#f6f2fb;border-radius:9px;padding:10px 13px;text-align:left\">\n                <div style=\"font-family:'Shippori Mincho',serif;font-size:14px;color:#3a2c44;line-height:1.7\">{{ koCard.ex }}<\u002Fdiv>\n                <div style=\"font-size:11.5px;color:#7a6e88;margin-top:4px;line-height:1.6\">— {{ koCard.tr }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ koHidden }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"margin-top:18px;font-size:12.5px;color:#b3aa99\">下のボタンで意味を表示<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- 4択 -->\n      <sc-if value=\"{{ koIsQuad }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"background:#fff;border:1px solid #e6ddca;border-radius:18px;padding:26px 22px;margin-top:13px;box-shadow:0 4px 18px rgba(20,30,45,.07);text-align:center\">\n          <div style=\"font-size:11px;color:#b3aa99;font-weight:700;letter-spacing:.1em;margin-bottom:10px\">次の古語の意味は？<\u002Fdiv>\n          <div style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:30px;color:#2a2230;line-height:1.35;word-break:break-word\">{{ koCard.w }}<\u002Fdiv>\n          <sc-if value=\"{{ koCard.hasK }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:12px;color:#9a8fa8;margin-top:6px\">〔{{ koCard.k }}〕<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"margin-top:13px;display:flex;flex-direction:column;gap:9px\">\n          <sc-for list=\"{{ koQuad }}\" as=\"c\" hint-placeholder-count=\"4\">\n            <div onclick=\"{{ c.onTap }}\" style=\"display:flex;align-items:center;gap:11px;background:{{ c.bg }};border:1.5px solid {{ c.bd }};border-radius:12px;padding:14px 15px;cursor:pointer\">\n              <div style=\"flex:1;font-size:14.5px;color:{{ c.fg }};line-height:1.5;font-weight:500;text-align:left\">{{ c.label }}<\u002Fdiv>\n              <div style=\"font-size:14px;font-weight:700;color:{{ c.fg }}\">{{ c.mark }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-if value=\"{{ koQuadAnswered }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:13px;background:#fff;border:1px solid #ebe3d6;border-radius:14px;overflow:hidden;animation:seFade .25s ease both\">\n            <div style=\"background:#7a5ea8;color:#fff;font-weight:700;font-size:13px;padding:8px 15px\">意味と例文<\u002Fdiv>\n            <div style=\"padding:13px 15px\">\n              <div style=\"font-size:14px;color:#2a2230;line-height:1.85;text-wrap:pretty\">{{ koCard.mean }}<\u002Fdiv>\n              <div style=\"margin-top:10px;background:#f6f2fb;border-radius:9px;padding:10px 13px\">\n                <div style=\"font-family:'Shippori Mincho',serif;font-size:14px;color:#3a2c44;line-height:1.7\">{{ koCard.ex }}<\u002Fdiv>\n                <div style=\"font-size:11.5px;color:#7a6e88;margin-top:4px;line-height:1.6\">— {{ koCard.tr }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"flex-shrink:0;background:#f6f3ee;border-top:1px solid #e9e0d2;box-shadow:0 -5px 16px rgba(20,30,45,.07);padding:12px 18px 15px\">\n    <!-- カード式の操作 -->\n    <sc-if value=\"{{ koIsCard }}\" hint-placeholder-val=\"{{ true }}\">\n      <sc-if value=\"{{ koHidden }}\" hint-placeholder-val=\"{{ true }}\">\n        <div onclick=\"{{ onKoReveal }}\" style=\"text-align:center;padding:15px;border-radius:13px;background:#7a5ea8;color:#fff;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 5px 14px rgba(122,94,168,.28);max-width:560px;margin:0 auto\">意味を見る<\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ koRevealed }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"font-size:11.5px;color:#9aa2b0;text-align:center;margin-bottom:8px\">覚えていた？<\u002Fdiv>\n        <div style=\"display:flex;gap:11px;max-width:560px;margin:0 auto\">\n          <div onclick=\"{{ onKoBad }}\" style=\"flex:1;text-align:center;padding:14px;border-radius:13px;background:#fff;border:1.5px solid #e2c8c2;color:#b23a2c;font-weight:700;font-size:15px;cursor:pointer\">✗ まちがえた<\u002Fdiv>\n          <div onclick=\"{{ onKoGood }}\" style=\"flex:1.2;text-align:center;padding:14px;border-radius:13px;background:#3a2c44;color:#fff;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 5px 14px rgba(58,44,68,.3)\">✓ 覚えていた<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsc-if>\n    <!-- 4択の操作 -->\n    <sc-if value=\"{{ koIsQuad }}\" hint-placeholder-val=\"{{ true }}\">\n      <sc-if value=\"{{ koQuadHint }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"text-align:center;font-size:12.5px;color:#a59a8c;padding:13px\">選択肢から答えを選んでください<\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ koQuadAnswered }}\" hint-placeholder-val=\"{{ true }}\">\n        <div onclick=\"{{ onKoQuadNext }}\" style=\"text-align:center;padding:15px;border-radius:13px;background:#3a2c44;color:#fff;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 5px 14px rgba(58,44,68,.28);max-width:560px;margin:0 auto\">次へ ›<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== KORESULT（古文単語・結果） ===== -->\n<sc-if value=\"{{ isKoresult }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"height:100%;display:flex;flex-direction:column;animation:seFade .4s ease both\">\n<div class=\"se-frame\" style=\"flex:1;min-height:0;overflow-y:auto\">\n  <div style=\"background:#3a2c44;color:#fff;padding:40px 26px 34px;text-align:center\">\n    <div style=\"font-size:12px;letter-spacing:.28em;color:#c4b4dc\">RESULT · 古文単語<\u002Fdiv>\n    <div style=\"margin:22px auto 0;width:150px;height:150px;border-radius:50%;border:3px solid {{ koRank.color }};display:flex;flex-direction:column;align-items:center;justify-content:center;animation:sePop .5s ease both\">\n      <div style=\"font-family:'Shippori Mincho',serif;font-size:60px;font-weight:700;line-height:1;color:{{ koRank.color }}\">{{ koRank.letter }}<\u002Fdiv>\n      <div style=\"font-size:13px;color:#d6cce0;margin-top:6px\">{{ koqPct }}% 一発正解<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-weight:700;font-size:18px;margin-top:18px\">{{ koRank.label }}<\u002Fdiv>\n    <div style=\"font-size:12.5px;color:#c4b4dc;margin-top:6px;line-height:1.6\">{{ koRank.desc }}<\u002Fdiv>\n    <div style=\"font-size:12px;color:#a99cbb;margin-top:12px\">{{ koGrpName }}　一発正解 {{ koqFirstTry }} 語 ／ 全 {{ koqDoneCount }} 語<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"padding:24px 22px 34px;max-width:520px;margin:0 auto;width:100%\">\n    <sc-if value=\"{{ koHasWrong }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"font-size:12px;color:#9aa2b0;letter-spacing:.1em;font-weight:700;margin-bottom:10px\">まちがえた語（{{ koqWrongCount }}）<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:7px;margin-bottom:22px\">\n        <sc-for list=\"{{ koWrongList }}\" as=\"w\" hint-placeholder-count=\"3\">\n          <div style=\"display:flex;align-items:baseline;gap:10px;background:#fff;border:1px solid #ece3d4;border-radius:9px;padding:10px 13px\">\n            <span style=\"font-size:10.5px;color:#b3aa99;font-weight:700;min-width:30px\">{{ w.num }}<\u002Fspan>\n            <span style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:15px;color:#3a2c44\">{{ w.w }}<\u002Fspan>\n            <span style=\"font-size:12.5px;color:#6b7382;flex:1\">{{ w.mean }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <div style=\"display:flex;flex-direction:column;gap:11px\">\n      <sc-if value=\"{{ koHasWrong }}\" hint-placeholder-val=\"{{ true }}\">\n        <div onclick=\"{{ onKoRetryWrong }}\" style=\"background:#7a5ea8;color:#fff;border-radius:13px;padding:16px;text-align:center;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 5px 14px rgba(122,94,168,.25)\">まちがえた語だけ復習<\u002Fdiv>\n      <\u002Fsc-if>\n      <div onclick=\"{{ onKoRetry }}\" style=\"background:#fff;border:1.5px solid #e2d8c8;border-radius:13px;padding:16px;text-align:center;font-weight:700;font-size:15px;color:#3a2c44;cursor:pointer\">同じ範囲をもう一度<\u002Fdiv>\n      <div onclick=\"{{ onOpenKobun }}\" style=\"text-align:center;padding:8px;font-size:13px;color:#9aa2b0;cursor:pointer\">古文メニューに戻る<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== KOOUYOU（古文・応用問題集） ===== -->\n<sc-if value=\"{{ isKoouyou }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"height:100%;display:flex;flex-direction:column\">\n  <div style=\"flex-shrink:0;background:#f6f3ee;padding:14px 18px 10px;border-bottom:1px solid #ece4d6\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px\">\n      <div style=\"display:flex;align-items:center;gap:8px\">\n        <div onclick=\"{{ onOpenKobun }}\" style=\"display:flex;align-items:center;gap:3px;background:#fff;border:1px solid #ded3c4;border-radius:18px;padding:7px 13px 7px 10px;font-size:12.5px;font-weight:700;color:#3a2c44;cursor:pointer;box-shadow:0 1px 3px rgba(20,30,45,.06)\">‹ メニュー<\u002Fdiv>\n        <sc-if value=\"{{ koOCanPrev }}\" hint-placeholder-val=\"{{ true }}\">\n          <div onclick=\"{{ onKoOPrev }}\" style=\"display:flex;align-items:center;gap:3px;background:#f0ebe2;border:1px solid #e2d8c8;border-radius:18px;padding:7px 12px;font-size:12.5px;font-weight:700;color:#7a6a52;cursor:pointer\">↩ 前へ<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"font-size:12.5px;color:#5a6472;font-weight:700;white-space:nowrap\">問 {{ koOIdx1 }} <span style=\"color:#bcb0a0\">/ {{ koOTotal }}<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:9px;height:5px;background:#e6ddcf;border-radius:3px;overflow:hidden\">\n      <div style=\"height:100%;background:#c0392b;border-radius:3px;width:{{ koOProgress }}%;transition:width .35s ease\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"se-frame\" style=\"flex:1;overflow-y:auto;padding:18px 18px 26px\">\n    <div style=\"animation:seFade .3s ease both;max-width:600px;margin:0 auto\">\n      <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:12px\">\n        <div style=\"display:inline-block;background:#c0392b;color:#fff;font-size:11px;font-weight:700;letter-spacing:.06em;padding:4px 11px;border-radius:20px\">{{ koOCard.part }}<\u002Fdiv>\n        <div style=\"font-size:11.5px;color:#9aa2b0;font-weight:700\">{{ koOCard.pt }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #ebe3d6;border-radius:16px;padding:19px 18px;box-shadow:0 3px 14px rgba(20,30,45,.05)\">\n        <p style=\"margin:0;font-size:15px;line-height:1.95;color:#2a313a;font-weight:500;white-space:pre-line;text-wrap:pretty\">{{ koOCard.prompt }}<\u002Fp>\n        <sc-if value=\"{{ koOCard.hasHint }}\" hint-placeholder-val=\"ヒント\">\n          <div style=\"margin-top:13px;background:#f7eef0;border-radius:9px;padding:10px 13px;font-size:12.5px;color:#8a4a40;line-height:1.6;display:flex;gap:7px\"><span style=\"color:#c0392b;font-weight:700;flex-shrink:0\">ヒント<\u002Fspan><span>{{ koOCard.hint }}<\u002Fspan><\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:13px;display:flex;flex-direction:column;gap:9px\">\n        <sc-for list=\"{{ koOCard.choices }}\" as=\"c\" hint-placeholder-count=\"4\">\n          <div onclick=\"{{ c.onTap }}\" style=\"display:flex;align-items:center;gap:11px;background:{{ c.bg }};border:1.5px solid {{ c.bd }};border-radius:12px;padding:14px 15px;cursor:pointer\">\n            <div style=\"flex:1;font-size:14.5px;color:{{ c.fg }};line-height:1.5;font-weight:500;text-align:left\">{{ c.label }}<\u002Fdiv>\n            <div style=\"font-size:14px;font-weight:700;color:{{ c.fg }}\">{{ c.mark }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ koOCard.answered }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:14px;background:#fff;border:1px solid #ebe3d6;border-radius:14px;overflow:hidden;animation:seFade .25s ease both\">\n          <div style=\"background:#3a2c44;color:#fff;font-weight:700;font-size:13.5px;padding:9px 15px;display:flex;align-items:center;gap:8px\">解説<span style=\"font-size:11.5px;color:#c4b4dc\">正解：{{ koOCard.ans }}<\u002Fspan><\u002Fdiv>\n          <div style=\"padding:13px 15px;font-size:13.5px;color:#3a3340;line-height:1.85;text-wrap:pretty\">{{ koOCard.exp }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"flex-shrink:0;background:#f6f3ee;border-top:1px solid #e9e0d2;box-shadow:0 -5px 16px rgba(20,30,45,.07);padding:12px 18px 15px\">\n    <sc-if value=\"{{ koOCard.answered }}\" hint-placeholder-val=\"{{ false }}\">\n      <div onclick=\"{{ onKoONext }}\" style=\"text-align:center;padding:15px;border-radius:13px;background:#3a2c44;color:#fff;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 5px 14px rgba(58,44,68,.28);max-width:560px;margin:0 auto\">次へ ›<\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ koOCard.unanswered }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"text-align:center;font-size:12.5px;color:#a59a8c;padding:13px\">傍線部の意味を選んでください<\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== KOORESULT（古文・応用結果） ===== -->\n<sc-if value=\"{{ isKooresult }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"height:100%;display:flex;flex-direction:column;animation:seFade .4s ease both\">\n<div class=\"se-frame\" style=\"flex:1;min-height:0;overflow-y:auto\">\n  <div style=\"background:#c0392b;color:#fff;padding:40px 26px 34px;text-align:center\">\n    <div style=\"font-size:12px;letter-spacing:.28em;color:#f3cfca\">RESULT · 応用問題<\u002Fdiv>\n    <div style=\"margin:22px auto 0;width:150px;height:150px;border-radius:50%;border:3px solid {{ koORank.color }};display:flex;flex-direction:column;align-items:center;justify-content:center;animation:sePop .5s ease both\">\n      <div style=\"font-family:'Shippori Mincho',serif;font-size:60px;font-weight:700;line-height:1;color:{{ koORank.color }}\">{{ koORank.letter }}<\u002Fdiv>\n      <div style=\"font-size:13px;color:#f3cfca;margin-top:6px\">{{ koOPct }}% 正解<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-weight:700;font-size:18px;margin-top:18px\">{{ koORank.label }}<\u002Fdiv>\n    <div style=\"font-size:12.5px;color:#f3cfca;margin-top:6px;line-height:1.6\">{{ koORank.desc }}<\u002Fdiv>\n    <div style=\"font-size:12px;color:#e6b3ab;margin-top:12px\">正解 {{ koOGood }} ／ {{ koOTotal }} 問<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"padding:24px 22px 34px;display:flex;flex-direction:column;gap:11px;max-width:520px;margin:0 auto;width:100%\">\n    <div onclick=\"{{ onKoORetry }}\" style=\"background:#c0392b;color:#fff;border-radius:13px;padding:16px;text-align:center;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 5px 14px rgba(192,57,43,.25)\">もう一度チャレンジ<\u002Fdiv>\n    <div onclick=\"{{ onOpenKobun }}\" style=\"background:#fff;border:1.5px solid #e2d8c8;border-radius:13px;padding:16px;text-align:center;font-weight:700;font-size:15px;color:#3a2c44;cursor:pointer\">古文メニューに戻る<\u002Fdiv>\n    <div style=\"margin-top:14px;background:#3a2c44;color:#fff;border-radius:12px;padding:15px 17px;font-size:13px;line-height:1.7;text-align:center\">古語は「現代語と意味がちがう」ものが狙われる。<br>傍線部は前後の語との呼応で判断しよう！<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== KOLIST（古文単語・一覧・赤シート） ===== -->\n<sc-if value=\"{{ isKolist }}\" hint-placeholder-val=\"{{ true }}\">\n<div>\n  <div style=\"position:sticky;top:0;z-index:5;background:#3a2c44;color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between\">\n    <div onclick=\"{{ onOpenKobun }}\" style=\"display:flex;align-items:center;gap:3px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:7px 13px 7px 10px;font-size:12.5px;font-weight:700;color:#fff;cursor:pointer\">‹ メニュー<\u002Fdiv>\n    <div style=\"font-weight:700;font-size:14px\">古語一覧 <span style=\"color:#c4b4dc;font-size:12px\">全{{ koCount }}語<\u002Fspan><\u002Fdiv>\n    <div onclick=\"{{ onToggleSheet }}\" style=\"font-size:11.5px;font-weight:700;cursor:pointer;padding:6px 12px;border-radius:20px;background:{{ sheetTabBg }};color:{{ sheetTabFg }};border:1px solid #5a4a6c\">{{ sheetLabel }}<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"padding:6px 16px 60px;max-width:680px;margin:0 auto\">\n    <div style=\"font-size:12px;color:#9aa2b0;text-align:center;padding:12px 0 4px\">語を見て意味を思い出そう。<br>赤い部分をタップすると個別に確認できます。<\u002Fdiv>\n    <sc-for list=\"{{ koListSections }}\" as=\"sec\" hint-placeholder-count=\"3\">\n      <div style=\"margin-top:18px\">\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:8px\"><span style=\"width:4px;height:15px;background:{{ sec.color }};border-radius:2px;display:inline-block\"><\u002Fspan><span style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:14.5px;color:#2a2230\">{{ sec.name }}<\u002Fspan><span style=\"font-size:11px;color:#9aa2ad\">{{ sec.sub }}<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #ebe3d6;border-radius:13px;overflow:hidden\">\n          <sc-for list=\"{{ sec.rows }}\" as=\"r\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex;align-items:stretch;border-top:1px solid #f0e9dd\">\n              <div style=\"flex:1;padding:11px 13px;display:flex;flex-direction:column;justify-content:center;min-width:96px\">\n                <div style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:14px;color:#2a2230;line-height:1.35\">{{ r.w }}<\u002Fdiv>\n                <sc-if value=\"{{ r.hasSub }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:10px;color:#9a8fa8;margin-top:2px\">{{ r.sub }}<\u002Fdiv><\u002Fsc-if>\n              <\u002Fdiv>\n              <div onclick=\"{{ r.onTap }}\" style=\"flex:1.5;border-left:1px solid #f0e9dd;display:flex;align-items:center;cursor:pointer\">\n                <sc-if value=\"{{ r.isShown }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"padding:11px 13px;font-size:12px;line-height:1.6;color:#34404d;animation:seFade .2s ease both\">{{ r.a }}<\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ r.isCovered }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"margin:7px 9px;padding:9px 13px;background:#e23b2e;border-radius:6px;width:100%;text-align:center;color:#e23b2e;font-size:12px;user-select:none\">タップ<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n    <div style=\"margin-top:22px;background:#3a2c44;color:#fff;border-radius:12px;padding:15px 17px;font-size:13px;line-height:1.7;text-align:center\">古語は「現代語と意味がちがう語」が問われやすい。<br>①の意味だけでなく②③まで押さえよう！<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== EIHOME（英文法・教材一覧） ===== -->\n<sc-if value=\"{{ isEihome }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"animation:seFade .4s ease both\">\n  <div style=\"background:#3a2e22;padding:44px 26px 34px;color:#fff;position:relative\">\n    <div onclick=\"{{ onTop }}\" style=\"font-size:12.5px;color:#d8c4a6;cursor:pointer;margin-bottom:14px\">‹ 教科選択<\u002Fdiv>\n    <div style=\"font-family:'Shippori Mincho',serif;font-size:12px;letter-spacing:.3em;color:#d8b483;font-weight:600\">GRAMMAR · 比較<\u002Fdiv>\n    <h1 style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:30px;line-height:1.32;margin:12px 0 0;letter-spacing:.02em\">英文法 — 比較<\u002Fh1>\n    <div style=\"margin-top:14px;font-size:13px;color:#cbb593;line-height:1.7\">教材を選び、採点方法を決めて演習<br>自己採点型・並び替え型の2モード<\u002Fdiv>\n    <div style=\"position:absolute;right:24px;top:44px;width:58px;height:58px;border:1.5px solid #c0863c;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Shippori Mincho',serif;color:#e3c79a;font-size:13px;transform:rotate(-8deg)\">比較<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"padding:22px 22px 30px\">\n    <div style=\"font-size:12px;color:#9aa2b0;letter-spacing:.12em;font-weight:700;margin-bottom:13px\">教材を選ぶ<\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:12px\">\n      <sc-for list=\"{{ eiMatCards }}\" as=\"m\" hint-placeholder-count=\"4\">\n        <div onclick=\"{{ m.onTap }}\" style=\"background:#fff;border:1px solid #e8dcc8;border-radius:15px;padding:17px 18px;cursor:pointer;box-shadow:0 2px 10px rgba(58,46,34,.06);display:flex;align-items:center;justify-content:space-between;gap:12px\">\n          <div style=\"flex:1\">\n            <div style=\"font-weight:700;font-size:16.5px;color:#3a2e22;letter-spacing:.02em\">{{ m.name }}<\u002Fdiv>\n            <div style=\"margin-top:9px;display:flex;flex-wrap:wrap;gap:7px\">\n              <span style=\"background:#f3ece0;color:#7a6543;border-radius:7px;padding:4px 10px;font-size:11.5px;font-weight:600\">自己採点 {{ m.selfCount }}問<\u002Fspan>\n              <span style=\"background:#f3ece0;color:#7a6543;border-radius:7px;padding:4px 10px;font-size:11.5px;font-weight:600\">並び替え {{ m.arrCount }}問<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"width:34px;height:34px;border-radius:50%;background:#3a2e22;color:#e3c79a;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0\">→<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"margin-top:22px;background:#f3ece0;border-radius:12px;padding:14px 16px;font-size:12.5px;color:#6b5c45;line-height:1.7\">教材ごとに「自己採点型」と「並び替え型」を選べます。並び替えは語句タイルを左から順にタップして英文を組み立て、自己採点は答え合わせのあと○✗を自分で記録。まちがえた問題は後でもう一度出題されます。<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== EIMAT（英文法・採点方法の選択） ===== -->\n<sc-if value=\"{{ isEimat }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"animation:seFade .4s ease both\">\n  <div style=\"background:#3a2e22;padding:44px 26px 30px;color:#fff;position:relative\">\n    <div onclick=\"{{ onEiMatBack }}\" style=\"font-size:12.5px;color:#d8c4a6;cursor:pointer;margin-bottom:14px\">‹ 教材一覧<\u002Fdiv>\n    <div style=\"font-family:'Shippori Mincho',serif;font-size:12px;letter-spacing:.28em;color:#d8b483;font-weight:600\">{{ eiMatShort }}<\u002Fdiv>\n    <h1 style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:26px;line-height:1.3;margin:10px 0 0\">{{ eiMatName }}<\u002Fh1>\n    <div style=\"margin-top:12px;font-size:13px;color:#cbb593;line-height:1.6\">採点方法を選んでください<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"padding:22px 22px 30px;display:flex;flex-direction:column;gap:14px\">\n    <div onclick=\"{{ onStartEiSelf }}\" style=\"background:#b5762e;color:#fff;border-radius:16px;padding:20px;cursor:pointer;box-shadow:0 6px 18px rgba(181,118,46,.26);position:relative;overflow:hidden\">\n      <div style=\"position:absolute;right:-6px;top:-12px;font-family:'Shippori Mincho',serif;font-size:74px;color:rgba(255,255,255,.13);font-weight:700;line-height:1\">自<\u002Fdiv>\n      <div style=\"position:relative\">\n        <div style=\"font-weight:700;font-size:18px;letter-spacing:.02em\">自己採点型<\u002Fdiv>\n        <div style=\"font-size:12.5px;color:#f3ddc0;margin-top:5px;line-height:1.6\">答えと解説を見て○✗を自己採点。<br>まちがえた問題は後でもう一度出ます。<\u002Fdiv>\n        <div style=\"margin-top:12px;display:inline-block;background:rgba(255,255,255,.16);border-radius:7px;padding:4px 11px;font-size:12px;font-weight:600\">全 {{ eiSelfN }} 問<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div onclick=\"{{ onStartEiArr }}\" style=\"background:#3a2e22;color:#fff;border-radius:16px;padding:20px;cursor:pointer;box-shadow:0 6px 18px rgba(58,46,34,.26);position:relative;overflow:hidden\">\n      <div style=\"position:absolute;right:-6px;top:-12px;font-family:'Shippori Mincho',serif;font-size:74px;color:rgba(192,134,60,.2);font-weight:700;line-height:1\">並<\u002Fdiv>\n      <div style=\"position:relative\">\n        <div style=\"font-weight:700;font-size:18px;letter-spacing:.02em\">並び替え型<\u002Fdiv>\n        <div style=\"font-size:12.5px;color:#cbb593;margin-top:5px;line-height:1.6\">語句タイルを左から順にタップして<br>英文を組み立て、自動で答え合わせ。<\u002Fdiv>\n        <div style=\"margin-top:12px;display:inline-block;background:rgba(255,255,255,.12);border-radius:7px;padding:4px 11px;font-size:12px;font-weight:600\">全 {{ eiArrN }} 問<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== EISELF（自己採点型・出題） ===== -->\n<sc-if value=\"{{ isEiself }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"height:100%;display:flex;flex-direction:column\">\n  <div style=\"flex-shrink:0;background:#f6f3ee;padding:14px 18px 10px;border-bottom:1px solid #ece4d6\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px\">\n      <div style=\"display:flex;align-items:center;gap:8px\">\n        <div onclick=\"{{ onEiBackMat }}\" style=\"display:flex;align-items:center;gap:3px;background:#fff;border:1px solid #ded3c4;border-radius:18px;padding:7px 13px 7px 10px;font-size:12.5px;font-weight:700;color:#3a2e22;cursor:pointer;box-shadow:0 1px 3px rgba(20,30,45,.06)\">‹ 採点方法<\u002Fdiv>\n        <sc-if value=\"{{ eiSCanPrev }}\" hint-placeholder-val=\"{{ true }}\">\n          <div onclick=\"{{ onEiSelfPrev }}\" style=\"display:flex;align-items:center;gap:3px;background:#f0ebe2;border:1px solid #e2d8c8;border-radius:18px;padding:7px 12px;font-size:12.5px;font-weight:700;color:#7a6a52;cursor:pointer\">↩ 前へ<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"font-size:12px;color:#5a6472;font-weight:700;white-space:nowrap\">残り {{ eiSRemain }} 問<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:9px;height:5px;background:#e6ddcf;border-radius:3px;overflow:hidden\">\n      <div style=\"height:100%;background:#c0863c;border-radius:3px;width:{{ eiSProgress }}%;transition:width .35s ease\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"se-frame\" style=\"flex:1;overflow-y:auto;padding:18px 18px 26px\">\n    <div style=\"animation:seFade .3s ease both;max-width:580px;margin:0 auto\">\n      <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:12px\">\n        <div style=\"display:inline-block;background:#3a2e22;color:#fff;font-size:11px;font-weight:700;letter-spacing:.06em;padding:4px 11px;border-radius:20px\">{{ eiSCard.sec }}<\u002Fdiv>\n        <div style=\"font-size:11px;color:#9aa2b0;font-weight:700\">自己採点型<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #ebe3d6;border-radius:16px;padding:19px 18px;box-shadow:0 3px 14px rgba(20,30,45,.05)\">\n        <sc-if value=\"{{ eiSCard.hasJp }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size:13px;color:#8a7a5c;line-height:1.7;margin-bottom:11px;padding-bottom:11px;border-bottom:1px dashed #ece2cf\">{{ eiSCard.jp }}<\u002Fdiv>\n        <\u002Fsc-if>\n        <p style=\"margin:0;font-size:16px;line-height:1.95;color:#2a313a;font-weight:500;white-space:pre-line;text-wrap:pretty\">{{ eiSCard.prompt }}<\u002Fp>\n        <sc-if value=\"{{ eiSCard.hasHints }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:14px;display:flex;flex-wrap:wrap;gap:7px;align-items:center\">\n            <span style=\"font-size:11px;color:#b5762e;font-weight:700\">語句<\u002Fspan>\n            <sc-for list=\"{{ eiSCard.hints }}\" as=\"h\" hint-placeholder-count=\"1\">\n              <span style=\"background:#f7efe2;border:1px solid #e6d4b6;color:#7a5c2e;border-radius:7px;padding:4px 11px;font-size:13.5px;font-weight:600\">{{ h }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <sc-if value=\"{{ eiSReveal }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:14px;background:#fff;border:1px solid #ebe3d6;border-radius:14px;overflow:hidden;animation:seFade .25s ease both\">\n          <div style=\"background:#b5762e;color:#fff;font-weight:700;font-size:13.5px;padding:9px 15px\">解答<\u002Fdiv>\n          <div style=\"padding:14px 15px\">\n            <div style=\"font-family:'Shippori Mincho',serif;font-size:18px;color:#2a2018;font-weight:700;line-height:1.6;text-wrap:pretty\">{{ eiSCard.answer }}<\u002Fdiv>\n            <div style=\"margin-top:11px;background:#f7efe2;border-radius:9px;padding:11px 13px;font-size:13px;color:#5c4d34;line-height:1.8;text-wrap:pretty\">{{ eiSCard.exp }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"flex-shrink:0;background:#f6f3ee;border-top:1px solid #e9e0d2;box-shadow:0 -5px 16px rgba(20,30,45,.07);padding:12px 18px 15px\">\n    <sc-if value=\"{{ eiSHidden }}\" hint-placeholder-val=\"{{ true }}\">\n      <div onclick=\"{{ onEiSelfReveal }}\" style=\"text-align:center;padding:15px;border-radius:13px;background:#b5762e;color:#fff;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 5px 14px rgba(181,118,46,.28);max-width:560px;margin:0 auto\">答えを見る<\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ eiSReveal }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"font-size:11.5px;color:#9aa2b0;text-align:center;margin-bottom:8px\">正解できた？<\u002Fdiv>\n      <div style=\"display:flex;gap:11px;max-width:560px;margin:0 auto\">\n        <div onclick=\"{{ onEiSelfBad }}\" style=\"flex:1;text-align:center;padding:14px;border-radius:13px;background:#fff;border:1.5px solid #e2c8c2;color:#b23a2c;font-weight:700;font-size:15px;cursor:pointer\">✗ まちがえた<\u002Fdiv>\n        <div onclick=\"{{ onEiSelfGood }}\" style=\"flex:1.2;text-align:center;padding:14px;border-radius:13px;background:#3a2e22;color:#fff;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 5px 14px rgba(58,46,34,.3)\">✓ 正解できた<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== EIARR（並び替え型・出題） ===== -->\n<sc-if value=\"{{ isEiarr }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"height:100%;display:flex;flex-direction:column\">\n  <div style=\"flex-shrink:0;background:#f6f3ee;padding:14px 18px 10px;border-bottom:1px solid #ece4d6\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px\">\n      <div onclick=\"{{ onEiBackMat }}\" style=\"display:flex;align-items:center;gap:3px;background:#fff;border:1px solid #ded3c4;border-radius:18px;padding:7px 13px 7px 10px;font-size:12.5px;font-weight:700;color:#3a2e22;cursor:pointer;box-shadow:0 1px 3px rgba(20,30,45,.06)\">‹ 採点方法<\u002Fdiv>\n      <div style=\"font-size:12px;color:#5a6472;font-weight:700;white-space:nowrap\">問 {{ eiAIdx1 }} <span style=\"color:#bcb0a0\">/ {{ eiATotalQ }}<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:9px;height:5px;background:#e6ddcf;border-radius:3px;overflow:hidden\">\n      <div style=\"height:100%;background:#c0863c;border-radius:3px;width:{{ eiAProgress }}%;transition:width .35s ease\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"se-frame\" style=\"flex:1;overflow-y:auto;padding:18px 18px 26px\">\n    <div style=\"animation:seFade .3s ease both;max-width:580px;margin:0 auto\">\n      <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:12px\">\n        <div style=\"display:inline-block;background:#3a2e22;color:#fff;font-size:11px;font-weight:700;letter-spacing:.06em;padding:4px 11px;border-radius:20px\">{{ eiACard.sec }}<\u002Fdiv>\n        <div style=\"font-size:11px;color:#9aa2b0;font-weight:700\">並び替え型<\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ eiACard.hasJp }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"font-size:13.5px;color:#6b5c45;line-height:1.7;margin-bottom:11px\">{{ eiACard.jp }}<\u002Fdiv>\n      <\u002Fsc-if>\n      <div style=\"background:#fff;border:1px solid #ebe3d6;border-radius:16px;padding:17px 16px;box-shadow:0 3px 14px rgba(20,30,45,.05)\">\n        <div style=\"font-size:11px;color:#b3aa99;font-weight:700;letter-spacing:.08em;margin-bottom:10px\">英文を組み立てる<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:7px;align-items:center;font-size:15.5px;line-height:1.9;min-height:30px\">\n          <sc-if value=\"{{ eiACard.hasPre }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#9aa2b0;font-weight:600\">{{ eiACard.pre }}<\u002Fspan><\u002Fsc-if>\n          <sc-for list=\"{{ eiAPlaced }}\" as=\"t\" hint-placeholder-count=\"0\">\n            <span onclick=\"{{ t.onTap }}\" style=\"background:#3a2e22;color:#fff;border-radius:8px;padding:6px 12px;font-size:14.5px;font-weight:600;cursor:pointer\">{{ t.label }}<\u002Fspan>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ eiAEmpty }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"color:#c4b8a4;font-size:13px\">下の語句を順にタップ…<\u002Fspan><\u002Fsc-if>\n          <sc-if value=\"{{ eiACard.hasPost }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#9aa2b0;font-weight:600\">{{ eiACard.post }}<\u002Fspan><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:14px;display:flex;flex-wrap:wrap;gap:9px\">\n        <sc-for list=\"{{ eiABank }}\" as=\"b\" hint-placeholder-count=\"5\">\n          <span onclick=\"{{ b.onTap }}\" style=\"background:#fff;border:1.5px solid #e0d3bd;color:#3a2e22;border-radius:10px;padding:10px 15px;font-size:15px;font-weight:600;cursor:pointer;opacity:{{ b.dim }};box-shadow:0 2px 6px rgba(58,46,34,.05)\">{{ b.label }}<\u002Fspan>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <sc-if value=\"{{ eiAChecked }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:16px;background:#fff;border:1px solid #ebe3d6;border-radius:14px;overflow:hidden;animation:seFade .25s ease both\">\n          <sc-if value=\"{{ eiACorrect }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:#3f8f63;color:#fff;font-weight:700;font-size:14px;padding:10px 15px\">✓ 正解！<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ eiAWrong }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:#b23a2c;color:#fff;font-weight:700;font-size:14px;padding:10px 15px\">✗ おしい！正しい語順はこちら<\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"padding:14px 15px\">\n            <div style=\"font-family:'Shippori Mincho',serif;font-size:17px;color:#2a2018;font-weight:700;line-height:1.6;text-wrap:pretty\">{{ eiACard.answer }}<\u002Fdiv>\n            <div style=\"margin-top:11px;background:#f7efe2;border-radius:9px;padding:11px 13px;font-size:13px;color:#5c4d34;line-height:1.8;text-wrap:pretty\">{{ eiACard.exp }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"flex-shrink:0;background:#f6f3ee;border-top:1px solid #e9e0d2;box-shadow:0 -5px 16px rgba(20,30,45,.07);padding:12px 18px 15px\">\n    <sc-if value=\"{{ eiANotChecked }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;gap:10px;max-width:560px;margin:0 auto\">\n        <sc-if value=\"{{ eiACanReset }}\" hint-placeholder-val=\"{{ false }}\">\n          <div onclick=\"{{ onEiArrReset }}\" style=\"flex:0 0 auto;text-align:center;padding:14px 18px;border-radius:13px;background:#fff;border:1.5px solid #e2d8c8;color:#7a6a52;font-weight:700;font-size:14px;cursor:pointer\">リセット<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ eiAFull }}\" hint-placeholder-val=\"{{ false }}\">\n          <div onclick=\"{{ onEiArrCheck }}\" style=\"flex:1;text-align:center;padding:14px;border-radius:13px;background:#b5762e;color:#fff;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 5px 14px rgba(181,118,46,.28)\">答え合わせ<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ eiANotFull }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"flex:1;text-align:center;padding:14px;border-radius:13px;background:#eadfce;color:#a89372;font-weight:700;font-size:14.5px\">すべての語句を並べてください<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ eiAChecked }}\" hint-placeholder-val=\"{{ false }}\">\n      <div onclick=\"{{ onEiArrNext }}\" style=\"text-align:center;padding:15px;border-radius:13px;background:#3a2e22;color:#fff;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 5px 14px rgba(58,46,34,.28);max-width:560px;margin:0 auto\">次へ ›<\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== EISELFRESULT（自己採点型・結果） ===== -->\n<sc-if value=\"{{ isEiselfresult }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"height:100%;display:flex;flex-direction:column;animation:seFade .4s ease both\">\n<div class=\"se-frame\" style=\"flex:1;min-height:0;overflow-y:auto\">\n  <div style=\"background:#3a2e22;color:#fff;padding:40px 26px 34px;text-align:center\">\n    <div style=\"font-size:12px;letter-spacing:.28em;color:#d8b483\">RESULT · 自己採点<\u002Fdiv>\n    <div style=\"margin:22px auto 0;width:150px;height:150px;border-radius:50%;border:3px solid {{ eiRank.color }};display:flex;flex-direction:column;align-items:center;justify-content:center;animation:sePop .5s ease both\">\n      <div style=\"font-family:'Shippori Mincho',serif;font-size:60px;font-weight:700;line-height:1;color:{{ eiRank.color }}\">{{ eiRank.letter }}<\u002Fdiv>\n      <div style=\"font-size:13px;color:#d8c4a6;margin-top:6px\">{{ eiPct }}% 一発正解<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-weight:700;font-size:18px;margin-top:18px\">{{ eiRank.label }}<\u002Fdiv>\n    <div style=\"font-size:12.5px;color:#cbb593;margin-top:6px;line-height:1.6\">{{ eiRank.desc }}<\u002Fdiv>\n    <div style=\"font-size:12px;color:#a99275;margin-top:12px\">{{ eiMatName }}　一発正解 {{ eiFirstTry }} ／ 全 {{ eiDoneCount }} 問<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"padding:24px 22px 34px;max-width:520px;margin:0 auto;width:100%\">\n    <sc-if value=\"{{ eiHasWrong }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"font-size:12px;color:#9aa2b0;letter-spacing:.1em;font-weight:700;margin-bottom:10px\">まちがえた問題（{{ eiWrongCount }}）<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:7px;margin-bottom:22px\">\n        <sc-for list=\"{{ eiWrongListS }}\" as=\"w\" hint-placeholder-count=\"3\">\n          <div style=\"display:flex;align-items:baseline;gap:10px;background:#fff;border:1px solid #ece3d4;border-radius:9px;padding:10px 13px\">\n            <span style=\"font-size:12.5px;color:#3a2e22;flex:1;line-height:1.5\">{{ w.q }}<\u002Fspan>\n            <span style=\"font-size:12.5px;color:#b5762e;font-weight:700;text-align:right\">{{ w.a }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <div style=\"display:flex;flex-direction:column;gap:11px\">\n      <sc-if value=\"{{ eiHasWrong }}\" hint-placeholder-val=\"{{ true }}\">\n        <div onclick=\"{{ onEiSelfRetryWrong }}\" style=\"background:#b5762e;color:#fff;border-radius:13px;padding:16px;text-align:center;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 5px 14px rgba(181,118,46,.25)\">まちがえた問題だけ復習<\u002Fdiv>\n      <\u002Fsc-if>\n      <div onclick=\"{{ onEiSelfRetry }}\" style=\"background:#fff;border:1.5px solid #e2d8c8;border-radius:13px;padding:16px;text-align:center;font-weight:700;font-size:15px;color:#3a2e22;cursor:pointer\">同じ教材をもう一度<\u002Fdiv>\n      <div onclick=\"{{ onEiBackMat }}\" style=\"text-align:center;padding:8px;font-size:13px;color:#9aa2b0;cursor:pointer\">採点方法の選択に戻る<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== EIARRRESULT（並び替え型・結果） ===== -->\n<sc-if value=\"{{ isEiarrresult }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"height:100%;display:flex;flex-direction:column;animation:seFade .4s ease both\">\n<div class=\"se-frame\" style=\"flex:1;min-height:0;overflow-y:auto\">\n  <div style=\"background:#3a2e22;color:#fff;padding:40px 26px 34px;text-align:center\">\n    <div style=\"font-size:12px;letter-spacing:.28em;color:#d8b483\">RESULT · 並び替え<\u002Fdiv>\n    <div style=\"margin:22px auto 0;width:150px;height:150px;border-radius:50%;border:3px solid {{ eiRank.color }};display:flex;flex-direction:column;align-items:center;justify-content:center;animation:sePop .5s ease both\">\n      <div style=\"font-family:'Shippori Mincho',serif;font-size:60px;font-weight:700;line-height:1;color:{{ eiRank.color }}\">{{ eiRank.letter }}<\u002Fdiv>\n      <div style=\"font-size:13px;color:#d8c4a6;margin-top:6px\">{{ eiPct }}% 一発正解<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-weight:700;font-size:18px;margin-top:18px\">{{ eiRank.label }}<\u002Fdiv>\n    <div style=\"font-size:12.5px;color:#cbb593;margin-top:6px;line-height:1.6\">{{ eiRank.desc }}<\u002Fdiv>\n    <div style=\"font-size:12px;color:#a99275;margin-top:12px\">{{ eiMatName }}　一発正解 {{ eiFirstTry }} ／ 全 {{ eiDoneCount }} 問<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"padding:24px 22px 34px;max-width:520px;margin:0 auto;width:100%\">\n    <sc-if value=\"{{ eiHasWrong }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"font-size:12px;color:#9aa2b0;letter-spacing:.1em;font-weight:700;margin-bottom:10px\">まちがえた問題（{{ eiWrongCount }}）<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:7px;margin-bottom:22px\">\n        <sc-for list=\"{{ eiWrongListS }}\" as=\"w\" hint-placeholder-count=\"3\">\n          <div style=\"background:#fff;border:1px solid #ece3d4;border-radius:9px;padding:10px 13px\">\n            <div style=\"font-family:'Shippori Mincho',serif;font-size:13.5px;color:#3a2e22;font-weight:700;line-height:1.5\">{{ w.a }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <div style=\"display:flex;flex-direction:column;gap:11px\">\n      <sc-if value=\"{{ eiHasWrong }}\" hint-placeholder-val=\"{{ true }}\">\n        <div onclick=\"{{ onEiArrRetryWrong }}\" style=\"background:#b5762e;color:#fff;border-radius:13px;padding:16px;text-align:center;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 5px 14px rgba(181,118,46,.25)\">まちがえた問題だけ復習<\u002Fdiv>\n      <\u002Fsc-if>\n      <div onclick=\"{{ onEiArrRetry }}\" style=\"background:#fff;border:1.5px solid #e2d8c8;border-radius:13px;padding:16px;text-align:center;font-weight:700;font-size:15px;color:#3a2e22;cursor:pointer\">同じ教材をもう一度<\u002Fdiv>\n      <div onclick=\"{{ onEiBackMat }}\" style=\"text-align:center;padding:8px;font-size:13px;color:#9aa2b0;cursor:pointer\">採点方法の選択に戻る<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844}}\">\nclass Component extends DCLogic {\n  data = [\n    { tag:'第1節', name:'求められる経営状態の透明化', qs:[\n      { num:1, note:'ディスクロージャー＝情報開示、コーポレート・ガバナンス＝企業統治',\n        passage:'現代の企業には経営状態の透明化が求められる。企業情報を公開する{1}の推進や、経営を監視する{2}の強化（社外取締役の選任など）が進む。またバブル期には芸術・文化を支援する{3}や、福祉などへの慈善活動である{4}が行われたが、バブル崩壊後は先細りした。',\n        ans:[['ディスクロージャー','企業情報の開示・公開'],['コーポレート・ガバナンス','企業統治。経営を監視する仕組み'],['メセナ','芸術・文化への支援活動'],['フィランソロピー','福祉などへの慈善・寄付活動']] },\n      { num:2, note:'CSRの具体策：コンプライアンス・ダイバーシティ・ステークホルダー配慮・ESG投資',\n        passage:'企業が利益だけでなく社会に対して負う責任を{1}（CSR）という。これには持続可能な開発目標（SDGs）達成への対応、法令を守る{2}、人材における多様性すなわち{3}の推進、利害関係者すなわち{4}への配慮が含まれる。こうした取り組みは、環境・社会・企業統治を重視する{5}によって後押しされている。',\n        ans:[['企業の社会的責任','CSR。企業が社会に対して負う責任'],['コンプライアンス','法令遵守'],['ダイバーシティ','人材の多様性'],['ステークホルダー','利害関係者（株主・従業員・地域など）'],['ESG投資','環境・社会・企業統治を重視する投資']] }\n    ]},\n    { tag:'第2節', name:'市場経済の機能と限界', qs:[\n      { num:3, note:'市場経済＝価格で調整、計画経済＝国家が決定',\n        passage:'財は自給自足できないため、市場で対価を払い必要な財・サービスを入手する仕組みを{1}という。ここでは品不足が起きると{2}する。これに対し、生産する財の数量と価格を原則として国家が定める仕組みを{3}といい、品不足が起きると入手が困難になる。',\n        ans:[['市場経済','市場で対価を払い必要な財・サービスを入手する仕組み'],['価格上昇','品不足のときに市場で起こること'],['計画経済','国家が生産量と価格を決める経済体制']] },\n      { num:4, note:'超過需要→価格上昇→需給調整。一致させる価格が均衡価格',\n        passage:'完全競争市場では、需要が供給を上回る{1}が生じると価格が上昇し、その結果、需要量は減少、供給量は増加する。このように価格の変化を通して品不足や品余りが自然に解消される働きを{2}という。そして需要量と供給量を一致させる価格を{3}という。',\n        ans:[['超過需要','需要が供給を上回る状態'],['価格の自動調節機能','価格変化を通じて需給が自然に調整される働き'],['均衡価格','需要量と供給量を一致させる価格']] },\n      { num:5, note:'「市場の失敗」の3原因：競争の不完全性・情報の非対称性・公共財',\n        passage:'市場が万能でなくうまく機能しない状態を「市場の失敗」（市場の限界）という。その原因の一つが競争の{1}で、市場の寡占化・独占化が進むと財の価格が割高になる。二つ目は{2}で、財の売り手と買い手の間に情報格差があり、売り手がそれを利用して高値で売ろうとすると、買い手が売り手を信用できなくなる。',\n        ans:[['不完全性','寡占化・独占化により競争が機能しないこと'],['情報の非対称性','売り手と買い手の間に情報格差があること']] },\n      { num:6, note:'公共財＝非排除性＋非競合性。私的財はその逆',\n        passage:'「市場の失敗」の三つ目の原因は{1}である。これには、対価を支払わない人を消費から排除できない{2}と、ある人が多く消費しても他の人の消費が減ることはない{3}という性質がある。これと逆に、排除的かつ競合的な財は{4}と呼ばれる。',\n        ans:[['公共財','市場では十分に供給されにくい財（国防・道路など）'],['非排除性','対価を払わない人を消費から排除できない性質'],['非競合性','ある人の消費が他人の消費を減らさない性質'],['私的財','排除的かつ競合的な通常の財']] }\n    ]},\n    { tag:'第3節', name:'寡占下の経済活動の実態', qs:[\n      { num:7, note:'外部経済＝プラスの波及、外部不経済＝マイナスの波及（公害など）',\n        passage:'対価を支払わなくても財・サービスを享受できる場合を{1}といい、供給が過小になる（例：新駅建設による利便性の高まり）。逆に、対価を受け取ることなく不利益をこうむる場合を{2}といい、供給が過剰になる（例：公害）。後者は環境税などの課税によって{3}（外部不経済の内部化）が図られる。',\n        ans:[['外部経済','対価を払わずに利益を受けられる場合（供給が過小）'],['外部不経済','対価を受けずに不利益をこうむる場合（供給が過剰）'],['内部化','課税などで外部不経済を価格に反映させること']] },\n      { num:8, note:'カルテル＝協定、トラスト＝合同、コンツェルン＝持株会社による支配',\n        passage:'市場の集中には、数社で全体の大半を占める{1}と、一社がほとんどすべてを占める{2}がある。企業の結合形態には、同一産業の企業が協定を結ぶ{3}（企業連合）、複数企業が合同して一つになる{4}（企業合同）、親会社（持株会社）が異なる産業の企業を支配する{5}（企業連携）がある。',\n        ans:[['寡占','数社で市場の大半を占める状態'],['独占','一社がほとんどすべてを占める状態'],['カルテル','同一産業の企業が価格・生産量で協定を結ぶこと'],['トラスト','複数企業が合同して一つの企業になること'],['コンツェルン','持株会社が異業種の企業を支配する形態']] },\n      { num:9, note:'規模の経済→自然独占。デファクト・スタンダード＝事実上の標準',\n        passage:'巨大な設備が必要な産業では、生産量を増やせば単価が安くなる{1}が働く。これにより価格競争力も増し、自然に大規模化が進むことを{2}という。また情報通信産業では、通信網が広いほど利用者の利便性が増し、一つの企業が独占的に構築した事実上の基準を{3}という。',\n        ans:[['規模の経済','生産量を増やすほど単価が下がる効果'],['自然独占','規模の経済により自然に独占化が進むこと'],['デファクト・スタンダード','一企業が独占的に築いた事実上の基準']] },\n      { num:10, note:'管理価格→プライスメーカー→非価格競争。監視機関は公正取引委員会',\n        passage:'寡占下では、有力企業が利潤を確保できるように価格を設定する{1}が見られ、その価格を設定する企業を{2}（価格設定者）という。他の企業もこれに追従する。価格で競争しない代わりに、品質・デザイン・広告・宣伝で競う{3}が行われる。価格の伸縮性が失われ消費者が不利益をこうむりやすいため、{4}が定められ、{5}が監視にあたる。',\n        ans:[['管理価格','有力企業が利潤確保のために設定する価格'],['プライスメーカー','価格を設定する側の企業（価格設定者）'],['非価格競争','品質・デザイン・広告などで競うこと'],['独占禁止法','市場の独占・寡占の弊害を防ぐ法律'],['公正取引委員会','独占禁止法を運用・監視する機関']] }\n    ]},\n    { tag:'第4節', name:'国民所得と経済成長', qs:[\n      { num:11, note:'フロー＝流れ（P/L）、ストック＝蓄積（B/S）。国富はストックの代表',\n        passage:'一定期間の経済活動の流れを{1}、ある時点の蓄積を{2}という。後者の代表が一国の資産の合計である{3}である。日本では1990年まで{3}は伸びていたが、2020年までは土地項目が減少した。これは{4}によって地価が下がったためである。',\n        ans:[['フロー','一定期間の経済活動の流れ（例：GDP）'],['ストック','ある時点での蓄積（例：国富）'],['国富','一国の資産の合計。ストックの代表的指標'],['バブルの崩壊','1990年代初頭に地価が下落した出来事']] },\n      { num:12, note:'GDP＝国内で生み出された付加価値の合計。「国内」がポイント',\n        passage:'国内の各企業が生み出した付加価値を合計した指標を{1}（GDP）という。これは「国内での総生産額 − {2}」で算出される。在留外国人の所得は含まれるが、在外日本人の所得は含まれない。これを人口で割ったものを{3}という。',\n        ans:[['国内総生産','GDP。国内で生み出された付加価値の合計'],['中間生産物','総生産額から差し引く、原材料などの価値'],['一人あたりGDP','GDPを人口で割った値']] },\n      { num:13, note:'GNP＝GNI＝GNE（三面等価の原則）',\n        passage:'国民が生み出した付加価値の合計を{1}（GNP）といい、「GDP ＋（海外からの所得 − 海外への所得）」で算出される。これを所得面から捉えた指標を{2}（GNI）、支出面から捉えた指標を{3}（GNE）という。生産・分配・支出の三つの国民所得は等しくなり、これを{4}という。',\n        ans:[['国民総生産','GNP。国民が生み出した付加価値の合計'],['国民総所得','GNI。GNPを所得面から捉えた指標'],['国民総支出','GNE。GNPを支出面から捉えた指標'],['三面等価の原則','生産・分配・支出の国民所得が等しくなる原則']] },\n      { num:14, note:'GNP→（固定資本減耗を引く）→NNP→（間接税・補助金を調整）→NI',\n        passage:'国民総生産から固定資本減耗（減価償却費）を引いたものを{1}（NNP）という。さらに（間接税 − 補助金）を調整したものを{2}（NI）という。また国民福祉の指標として、国連開発計画が公表する寿命・教育・所得から算出される{3}（HDI）がある。',\n        ans:[['国民純生産','NNP。GNPから固定資本減耗を引いた指標'],['国民所得','NI。NNPから間接税を引き補助金を足した指標'],['人間開発指数','HDI。寿命・教育・所得から算出する福祉指標']] },\n      { num:15, note:'NNW＝国民純福祉。グリーンGDP＝NDP−環境破壊。実質値が実質経済成長率',\n        passage:'国民の福祉水準を示す指標として、余暇や家事労働を加味した{1}（NNW）がある。また環境を考慮した指標として、国内純生産（NDP）から環境破壊分を差し引いた{2}がある。さらに経済の規模が拡大することを{3}といい、物価変動の影響を除いた実質GDPを用いて計算した成長率を{4}という。',\n        ans:[['国民純福祉','NNW。余暇や家事労働を加味した福祉指標'],['グリーンGDP','NDPから環境破壊分を引いた環境配慮型の指標'],['経済成長','経済の規模が拡大すること'],['実質経済成長率','物価変動を除いた実質GDPで計算した成長率']] },\n      { num:16, note:'4つの波：キチン(在庫)/ジュグラー(設備)/クズネッツ(建築)/コンドラチェフ(技術)',\n        passage:'名目GDPを実質GDPで割り、物価の動きを表す指標を{1}という。好況・後退・不況・回復を繰り返す経済の波を{2}といい、不況が特に急激な場合を{3}という。この波には、約40か月で在庫変動が原因の{4}、約8〜10年で設備投資が原因の{5}、約20年で建築投資が原因の{6}、約50年で技術革新が原因の{7}がある。',\n        ans:[['GDPデフレーター','名目GDP÷実質GDPで物価変動を示す指標'],['景気循環','好況・後退・不況・回復を繰り返す波'],['恐慌','景気が急激に悪化する状態'],['キチンの波','約40か月周期。在庫変動が原因'],['ジュグラーの波','約8〜10年周期。設備投資が原因'],['クズネッツの波','約20年周期。建築投資が原因'],['コンドラチェフの波','約50年周期。技術革新が原因']] },\n      { num:17, note:'スタグフレーション＝不況＋インフレ、デフレスパイラル＝デフレの悪循環',\n        passage:'物価が持続的に上昇することを{1}、持続的に下落することを{2}という。1970年代の第一次石油危機では、不況とインフレーションが同時に起こる{3}が発生した。また1991年代のバブル崩壊では需要の落ち込みから不況とデフレーションが連鎖し、物価下落と景気悪化が悪循環する{4}に陥った。',\n        ans:[['インフレーション','物価が持続的に上昇すること'],['デフレーション','物価が持続的に下落すること'],['スタグフレーション','不況とインフレーションが同時に起こる現象'],['デフレスパイラル','物価下落と景気悪化が悪循環すること']] }\n    ]},\n    { tag:'第5節', name:'金融', qs:[\n      { num:18, note:'金本位制＝兌換紙幣、管理通貨制度＝不換紙幣',\n        passage:'貨幣には、支払い手段・価値貯蔵手段・{1}・交換手段という機能がある。1929年までは、紙幣を金と交換できる兌換紙幣を用いる{2}がとられていた。1930年からは、紙幣を金と交換できない不換紙幣を用いる{3}に移行した。',\n        ans:[['価値尺度','貨幣の機能の一つ。モノの価値を測る'],['金本位制','紙幣を金と交換できる兌換紙幣の制度'],['管理通貨制度','金と交換できない不換紙幣の制度']] },\n      { num:19, note:'発券銀行・銀行の銀行・政府の銀行。最後の貸し手も重要',\n        passage:'中央銀行には3つの役割がある。紙幣を発行する{1}、市中銀行と取引する{2}、政府の資金を扱う{3}である。金融危機の際には「{4}」として資金を供給する。',\n        ans:[['発券銀行','紙幣を発行する役割'],['銀行の銀行','市中銀行と取引する役割'],['政府の銀行','政府の資金を扱う役割'],['最後の貸し手','金融危機時に資金を供給する役割']] },\n      { num:20, note:'信用創造＝預金通貨を生み出す。公開市場操作（オペレーション）が現在の中心',\n        passage:'銀行が預金と貸付を繰り返すことで、最初の預金額の何倍もの預金通貨を生み出すことを{1}という。日本銀行が紙幣の価値を操作する方法のうち、現在も主に行われているのは国債などを売買する{2}である。不況時には{3}オペ、好況時には{4}オペを行う。',\n        ans:[['信用創造','銀行が預金通貨を何倍にも生み出すこと'],['公開市場操作','国債などを売買して通貨量を調整する方法'],['買い','不況時に資金を供給する操作（買いオペ）'],['売り','好況時に資金を吸収する操作（売りオペ）']] },\n      { num:21, note:'護送船団方式→日本版金融ビッグバン（1996橋本）→ペイオフ（2005）',\n        passage:'かつて日本では、行政が金融機関を保護・管理する{1}がとられていた（〜1990年）。その後、フリー・フェア・グローバルを原則とする金融の自由化が進み、1996年に橋本内閣が{2}を行った。また2005年には、銀行が破綻した際に預金の一定額のみを保護する{3}が実施された。',\n        ans:[['護送船団方式','行政が金融機関を保護・管理する方式（〜1990）'],['日本版金融ビッグバン','1996年に橋本内閣が行った金融大改革'],['ペイオフ','銀行破綻時に預金の一定額のみ保護する制度（2005）']] }\n    ]}\n  ];\n\n  CIRC = ['','①','②','③','④','⑤','⑥','⑦','⑧'];\n  STORE = 'seikei-progress-v1';\n\n  goku = [\n    { tag:'①', name:'求められる経営状態の透明化', rows:[\n      ['企業情報の開示・公開','ディスクロージャー'],\n      ['企業統治。経営を監視する仕組み','コーポレート・ガバナンス'],\n      ['芸術・文化への支援活動','メセナ'],\n      ['福祉などへの慈善・寄付活動','フィランソロピー'],\n      ['企業が社会に対して負う責任','企業の社会的責任（CSR）'],\n ormula:'合力 = 0',       sub:'静止 → はたらく力の和が0',   color:'#2f6b4a', desc:'張力・垂直抗力（動かない物体）' },\n    { key:'eom',      name:'運動方程式', formula:'ma = F',          sub:'質量 × 加速度 ＝ 力',        color:'#c0392b', desc:'加速する物体の加速度・力' },\n    { key:'friction', name:'摩擦力',   formula:'F = μN',           sub:'摩擦力 ＝ 係数 × 垂直抗力',  color:'#7a6c3a', desc:'静止摩擦・動摩擦' }\n  ];\n\n  phyCalc = [\n    // ── W = mg ──\n    { num:1, grp:'gravity', pt:'重力を求める', prompt:'質量5.0kgの物体にはたらく重力の大きさは何Nか。ただし重力加速度の大きさを9.8m/s²とする。', hint:'W = m × g　［ W：重力［N］ ／ m：質量［kg］ ／ g（重力加速度）＝9.8m/s² ］', ans:'49N', exp:'重力の公式は W = mg（W：重力［N］、m：質量［kg］、g（重力加速度）＝9.8m/s²）。重力加速度 g は「物体が落ちるとき1秒あたりに速さが何 m/s 増えるか」を表す量で、地球上ではどんな物体でも g＝9.8m/s² とあつかう。ここに m＝5.0kg、g＝9.8m/s² を代入すると W＝mg＝5.0×9.8＝49N。「質量［kg］に9.8をかけると重力［N］になる」と覚えるとよい。重力は物体の置き方や運動の有無に関係なく、つねに鉛直下向きに一定の大きさではたらく。なお質量（物体そのものの量・単位kg）と重力（はたらく力・単位N）はまったく別の量なので、混同しないこと。', efig:'fbWeight' },\n    { num:2, grp:'gravity', pt:'質量を逆算する', prompt:'ある物体にはたらく重力が29.4Nであった。この物体の質量は何kgか。重力加速度を9.8m/s²とする。', hint:'W = mg を変形 → m = W ÷ g　［ g（重力加速度）＝9.8m/s² ］', ans:'3.0kg', exp:'使う式は同じ W = mg（W：重力［N］、m：質量［kg］、g（重力加速度）＝9.8m/s²）だが、今度は質量 m を求める。式を m について解くと m＝W÷g。W＝29.4N、g＝9.8m/s² を代入して m＝29.4÷9.8＝3.0kg。公式は丸暗記するのではなく、「何を求めるか」に合わせて変形できるようにしておくことが大切。検算として、求めた m＝3.0kg を W＝mg に戻すと 3.0×9.8＝29.4N となり、問題文の重力と一致するので答えは正しい。', efig:'fbWeight' },\n    // ── F = kx ──\n    { num:3, grp:'hooke', pt:'弾性力を求める', prompt:'ばね定数3.0N/mのばねを、自然の長さから0.20m伸ばした。このときの弾性力の大きさは何Nか。', hint:'F = k × x　［ F：弾性力［N］ ／ k：ばね定数［N/m］ ／ x：自然長からの伸び［m］ ］', ans:'0.60N', exp:'ばねの弾性力（フックの法則）は F = kx（F：弾性力［N］、k：ばね定数［N/m］、x：自然の長さからの伸び［m］）。ばね定数 k はばねの「かたさ」を表し、大きいほど伸ばすのに大きな力がいる。x は「自然長からどれだけ伸び（縮み）たか」であって、ばね全体の長さではない点に注意。代入すると F＝kx＝3.0×0.20＝0.60N。伸び x が2倍・3倍になれば弾性力 F も2倍・3倍になり、弾性力は伸びに比例する（これがフックの法則）。', efig:'spring' },\n    { num:4, grp:'hooke', pt:'ばね定数を求める', prompt:'あるばねに4.0Nの力を加えると、自然の長さから0.10m伸びた。このばねのばね定数は何N/mか。', hint:'F = kx を変形 → k = F ÷ x　［ k：ばね定数［N/m］ ／ F：弾性力［N］ ／ x：伸び［m］ ］', ans:'40N/m', exp:'F = kx（F：弾性力［N］、k：ばね定数［N/m］、x：伸び［m］）を k について解くと k＝F÷x。F＝4.0N、x＝0.10m を代入して k＝4.0÷0.10＝40N/m。ばね定数の単位 N/m は「1m伸ばすのに何 N の力が必要か」を意味し、値が大きいほどかたいばね。また k は F-x グラフ（横軸：伸び x、縦軸：弾性力 F）の直線の傾きにあたり、グラフが急なほど k が大きい。' },\n    { num:5, grp:'hooke', pt:'グラフを読む', prompt:'図は、ばねA・Bの弾性力F［N］と伸びx［m］の関係を表す。ばね定数が大きいのはどちらか。理由も考えよ。', hint:'F=kx より、F-xグラフの傾き＝ばね定数 k　［ k：ばね定数 ］', ans:'ばねA', exp:'F = kx より、F-x グラフ（縦軸：弾性力 F［N］、横軸：伸び x［m］）の直線の傾きが、そのままばね定数 k になる。グラフを見ると、同じ伸び x に対して A のほうが大きな弾性力 F を示しており、直線の傾きが大きい。傾きが大きい＝ばね定数 k が大きい＝かたいばね、なのでばね定数が大きいのは A。逆に B は同じ力でもよく伸びるやわらかいばね。「グラフの傾き＝ばね定数」と結びつけて読み取るのがポイント。', fig:'spring' },\n    // ── 力の分解 ──\n    { num:6, grp:'bunkai', pt:'30°の力を分解', prompt:'x軸と30°の角をなす向きに20Nの力がはたらいている。この力のx成分・y成分はそれぞれ何Nか。ただし√3=1.73とする。', hint:'Fx = F cosθ（横）／ Fy = F sinθ（縦）　［ F：力の大きさ［N］ ／ θ：x軸となす角 ］', ans:'Fx=10√3≒17.3N ／ Fy=10N', exp:'斜めの力は直角三角形を使って水平（x）成分と鉛直（y）成分に分解する。Fx＝F cosθ（横）、Fy＝F sinθ（縦）（F：力の大きさ［N］、θ：x軸となす角）。図の直角三角形では、底辺が F cosθ、高さが F sinθ にあたる。F＝20N、θ＝30°なので、Fx＝20cos30°＝20×(√3/2)＝10√3≒17.3N、Fy＝20sin30°＝20×(1/2)＝10N。どちらに cos が付くかは「角θをどの軸から測っているか」で決まる。ここでは x 軸から測っているので、x 成分に cos が付く。', fig:'vector', efig:'tri30' },\n    { num:7, grp:'bunkai', pt:'45°の力を分解', prompt:'x軸と45°の角をなす向きに20Nの力がはたらいている。x成分・y成分はそれぞれ何Nか。ただし√2=1.41とする。', hint:'Fx = F cosθ ／ Fy = F sinθ　［ F：力の大きさ［N］ ／ θ：x軸となす角 ］', ans:'Fx=Fy=10√2≒14.1N', exp:'同じく Fx＝F cosθ、Fy＝F sinθ（F：力の大きさ［N］、θ：x軸となす角）を使う。45°では cos45°＝sin45°＝1/√2 と等しくなるのが特徴。F＝20N を代入すると Fx＝Fy＝20×(1/√2)＝10√2≒14.1N（√2＝1.41 として 10×1.41＝14.1N）。角が45°のときは水平成分と鉛直成分が必ず等しくなる、と覚えておくと検算に使える。', fig:'vector' },\n    // ── 力のつりあい ──\n    { num:8, grp:'balance', pt:'1本の糸の張力', prompt:'重さ5.0Nのおもりを、糸でつるして静止させた。このときおもりにはたらく糸の張力の大きさは何Nか。', hint:'静止 → 合力0 → 上向きの張力 ＝ 下向きの重力', ans:'5.0N', exp:'おもりは静止しているので、はたらく力はつりあっている（合力＝0）。おもりにはたらく力は「上向きの糸の張力 T」と「下向きの重力 W＝5.0N」の2つだけ。つりあいの条件から T＝W となり、T＝5.0N。静止している物体では、上向きの力の和と下向きの力の和が必ず等しくなる。張力とは「糸が物体を引く力」のこと。', efig:'fbBalance' },\n    { num:9, grp:'balance', pt:'等速で引き上げる', prompt:'質量5.0kgの物体を、一定の速さで鉛直上向きに引き上げている。引き上げる力の大きさは何Nか。重力加速度を9.8m/s²とする。', hint:'等速＝加速度0＝つりあい → 引く力 ＝ mg　［ g（重力加速度）＝9.8m/s² ］', ans:'49N', exp:'「一定の速さ（等速）」で動いている＝加速度が0なので、力はつりあっている（合力＝0）。たとえ動いていても、速さが変わらなければ「つりあい」としてあつかえる点が重要。引き上げる力 F は下向きの重力 W＝mg とつりあうので、F＝mg＝5.0×9.8＝49N（g（重力加速度）＝9.8m/s²）。「動いている＝力がはたらき続ける」とは限らず、加速していなければ合力は0、というのが慣性の考え方。', efig:'fbBalance' },\n    { num:10, grp:'balance', pt:'2本の糸（左右対称）', prompt:'重さ2.0Nの小球が、2本の糸A・Bで天井からつるされ静止している。糸A・Bはともに鉛直方向と45°をなす。糸A・Bの張力はそれぞれ何Nか。√2=1.41とする。', hint:'鉛直のつりあい：T cos45° × 2 ＝ 重力', ans:'TA=TB≒1.41N（=√2N）', exp:'小球は静止＝つりあい。糸A・Bは鉛直方向と45°で左右対称なので、張力は等しく TA＝TB＝T とおける。鉛直方向のつりあいを考えると、各張力の鉛直成分 T cos45°（鉛直から測った角なので cos）が2本分あり、これが下向きの重力2.0Nを支える。式は 2×T cos45°＝2.0 → T cos45°＝1.0 → T＝1.0÷(1/√2)＝√2≒1.41N。水平成分は左右で逆向き・同じ大きさなので、互いに打ち消し合ってつりあう。', fig:'tens45' },\n    { num:11, grp:'balance', pt:'斜め＋水平の糸', prompt:'重さ4.0Nの小球が、水平と30°をなす糸Aと、水平に張られた糸Bにつながれて静止している。糸A・Bの張力はそれぞれ何Nか。√3=1.73とする。', hint:'鉛直：TA sin30° ＝ 重力 ／ 水平：TA cos30° ＝ TB', ans:'TA=8.0N ／ TB=4√3≒6.9N', exp:'静止＝つりあい。糸Aは水平と30°、糸Bは水平に張られている。まず鉛直方向は糸Aの鉛直成分だけが重力を支えるので、TA sin30°＝4.0 → TA×0.5＝4.0 → TA＝8.0N。次に水平方向は糸Aの水平成分と糸Bの張力がつりあうので、TB＝TA cos30°＝8.0×(√3/2)＝4√3≒6.9N。力を鉛直・水平の2方向に分け、それぞれで「つりあいの式」を立てるのがコツ。', fig:'tensAB' },\n    { num:12, grp:'balance', pt:'床の垂直抗力', prompt:'重さ9.0Nの物体Aの上に、重さ3.0Nの物体Bを乗せた。物体Aが水平な床から受ける垂直抗力Nの大きさは何Nか。', hint:'静止 → 床はA・B両方の重さを支える（N ＝ Aの重さ ＋ Bの重さ）', ans:'12N', exp:'床の上にA、その上にBが乗って静止している。床はAとBを合わせた全体を支えるので、床がAに及ぼす垂直抗力 N は2つの重さの合計になる。N＝9.0＋3.0＝12N。注意点として、AとBの間ではたらく垂直抗力（Bの重さ3.0N分）と、床がAに及ぼす垂直抗力（12N）はまったく別の力なので混同しないこと。垂直抗力とは「面が物体を垂直に押し返す力」のこと。', fig:'stack' },\n    // ── 運動方程式 ──\n    { num:13, grp:'eom', pt:'加速度を求める', prompt:'なめらかな水平面上にある質量2.0kgの物体に、5.0Nの力を水平方向に加えた。物体の加速度の大きさは何m/s²か。', hint:'ma = F → a = F ÷ m　［ m：質量［kg］ ／ a：加速度［m/s²］ ／ F：合力［N］ ］', ans:'2.5m/s²', exp:'運動方程式は ma＝F（m：質量［kg］、a：加速度［m/s²］、F：物体にはたらく合力［N］）。a について解くと a＝F÷m。「なめらか」とは摩擦がないという意味なので、水平方向にはたらく力は引く力5.0Nだけ。a＝F÷m＝5.0÷2.0＝2.5m/s²。物体は力の向きに加速する。同じ力でも質量 m が大きいほど加速しにくい（a は m に反比例する）。', efig:'fbEom' },\n    { num:14, grp:'eom', pt:'グラフから加速度', prompt:'v-tグラフは、ある物体の運動を表す。グラフは点(0.2s, 0.3m/s)と点(0.6s, 0.5m/s)を通る直線である。この物体の加速度は何m/s²か。', hint:'加速度 a ＝ 速度の変化 ÷ 時間の変化（＝ v-tグラフの傾き）', ans:'0.5m/s²', exp:'加速度 a は「速度の変化÷かかった時間」で、v-t グラフ（縦軸：速度 v［m/s］、横軸：時間 t［s］）では直線の傾きにあたる。2点(0.2s, 0.3m/s)と(0.6s, 0.5m/s)から、a＝(0.5−0.3)÷(0.6−0.2)＝0.2÷0.4＝0.5m/s²。この a がそのまま運動方程式 ma＝F の a になる。グラフの傾きが急なほど加速度は大きく、傾きが0（水平な直線）なら速度が変わらない等速運動を表す。', fig:'vt' },\n    { num:15, grp:'eom', pt:'F・a・mの関係', prompt:'質量を一定にして引く力Fを2倍・3倍にすると、加速度aは図のa-Fグラフ（原点を通る直線）になった。Fとaの関係を答えよ。また力を一定にして質量mを2倍にすると、aはどうなるか。', hint:'a = F ÷ m　［ a：加速度 ／ F：合力 ／ m：質量 ］', ans:'aはFに比例 ／ mを2倍にするとaは1/2', exp:'運動方程式 ma＝F を変形すると a＝F÷m（a：加速度、F：合力、m：質量）。質量 m を一定にして力 F を2倍・3倍にすると a も2倍・3倍になる＝a は F に比例し、a-F グラフは原点を通る直線になる。逆に力 F を一定にして質量 m を2倍にすると、a＝F÷m より a は1/2倍になる＝a は m に反比例する。「重い物体ほど同じ力では加速しにくい」と日常の感覚で結びつけて理解するとよい。', fig:'aF' },\n    { num:16, grp:'eom', pt:'斜面上の運動', prompt:'水平とのなす角が30°のなめらかな斜面上で、質量2.0kgの物体に斜面上向きに3.8Nの力を加えた。物体の加速度はどちら向きに何m/s²か。重力加速度を9.8m/s²、sin30°=1/2とする。', hint:'斜面方向：ma = F − mg sin30°　［ g（重力加速度）＝9.8m/s² ］', ans:'斜面下向きに3.0m/s²', exp:'なめらかな斜面なので摩擦はない。斜面方向にはたらく力は、斜面上向きの引く力3.8Nと、斜面下向きの重力の斜面成分 mg sin30°の2つ。重力成分＝mg sin30°＝2.0×9.8×0.5＝9.8N（g（重力加速度）＝9.8m/s²）。斜面上向きを正として運動方程式 ma＝F を立てると、2.0×a＝3.8−9.8＝−6.0 → a＝−3.0m/s²。負号は「最初に決めた正の向き（斜面上向き）と逆」を意味するので、加速度は斜面下向きに3.0m/s²。引く力より重力成分のほうが大きいため、物体はずり落ちる向きに加速する。', fig:'incline' },\n    { num:17, grp:'eom', pt:'連結した物体', prompt:'なめらかな水平面上で、質量2.0kgの物体Aと質量3.0kgの物体Bを軽い糸で連結した。Bを右向きに20Nの力で引くとき、A・Bの加速度は何m/s²か。また糸の張力は何Nか。', hint:'全体：(mA+mB)a = F ／ Aだけ：mA × a = 張力T', ans:'a=4.0m/s² ／ 張力=8.0N', exp:'AとBは糸でつながって一体で動くので、加速度は共通。まず全体（質量 mA＋mB＝5.0kg）を1つの物体とみなして運動方程式を立てると、(2.0＋3.0)×a＝20 → a＝4.0m/s²。次に糸の張力 T は「Aだけ」に注目して求める。Aを動かしている力は糸の張力だけなので、mA×a＝T → T＝2.0×4.0＝8.0N。「全体で加速度を求め、部分（A）で張力を求める」のが連結問題の定石。', fig:'connect' },\n    // ── 摩擦力 ──\n    { num:18, grp:'friction', pt:'静止摩擦係数', prompt:'粗い水平面上の質量10kgの物体を水平に引く。引く力が49Nをこえたとき動き始めた。物体と面との間の静止摩擦係数μはいくらか。重力加速度を9.8m/s²とする。', hint:'最大摩擦力 F₀ = μN ／ N = mg　［ μ：静止摩擦係数 ／ N：垂直抗力 ／ g（重力加速度）＝9.8m/s² ］', ans:'μ=0.5', exp:'物体が動き出す直前、引く力は最大摩擦力 F₀ とちょうどつりあっているので、F₀＝49N。最大摩擦力は F₀＝μN（μ：静止摩擦
